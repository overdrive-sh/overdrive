openapi: 3.1.0
info:
  title: Overdrive Control Plane
  description: Phase 1 single-mode control-plane REST API (ADR-0008).
  contact:
    name: Overdrive Contributors
  license:
    name: FSL-1.1-ALv2
    identifier: FSL-1.1-ALv2
  version: 0.0.0
paths:
  /v1/allocs:
    get:
      tags:
      - observation
      summary: '`GET /v1/allocs?job=<id>` — observation read on `alloc_status`.'
      description: |-
        Reads through the `ObservationStore::alloc_status_rows` trait method
        (not the concrete `SimObservationStore` type) so Phase 2's
        `CorrosionStore` swap is a single trait-object replacement with no
        handler changes.

        The `job` query parameter is REQUIRED. The handler reads the
        `IntentStore` for `<id>`'s `Job`, returns 404 if absent, then
        projects matching rows + the `WorkloadLifecycle` view-cache restart
        counts into the populated envelope shape per ADR-0033 §1. A missing
        `?job=` query parameter returns HTTP 400 with
        `field = Some("job")`.
      operationId: alloc_status
      responses:
        '200':
          description: Allocation snapshot for the named job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocStatusResponse'
        '400':
          description: Validation error (missing or malformed job query)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /v1/cluster/info:
    get:
      tags:
      - cluster
      summary: |-
        `GET /v1/cluster/info` — mode, region, reconciler registry, broker
        counters.
      description: |-
        Post-ADR-0020 the response is the four-field shape
        `{mode, region, reconcilers, broker}`. The `commit_index` field is
        dropped wholesale (no rename to `writes_since_boot` — that
        preserves the same race conditions and reset-on-restart gap under
        a different name; see ADR-0020 §Considered alternatives §D).
        Activity-rate observability is provided by `broker.dispatched`
        plus the `reconcilers` list; cluster-level commit-rate signals
        belong on Phase 5's metrics endpoint.
      operationId: cluster_status
      responses:
        '200':
          description: Cluster status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStatus'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /v1/jobs:
    post:
      tags:
      - jobs
      summary: |-
        `POST /v1/jobs` — validate, archive via rkyv, commit through the
        intent store, return `{workload_id, spec_digest, outcome}`.
      description: |-
        Idempotency contract (ADR-0015 §4 amended by ADR-0020):

        * A spec whose rkyv-archived bytes are absent at the canonical
          `jobs/<WorkloadId>` key returns HTTP 200 with `outcome =
          IdempotencyOutcome::Inserted` and the canonical `spec_digest`
          (`PutOutcome::Inserted` path).
        * A spec whose rkyv-archived bytes are byte-identical to what is
          already stored at the same key returns HTTP 200 with `outcome =
          IdempotencyOutcome::Unchanged` and the same `spec_digest`. No
          write occurred (`PutOutcome::KeyExists { existing }` path with
          byte equality).
        * A spec whose rkyv-archived bytes DIFFER from what is stored at
          the same key returns HTTP 409 Conflict with an `ErrorBody`.
          Conflict is an HTTP-status concern; the `outcome` field is
          absent on the 409 path (ADR-0015 §4 amendment).

        `spec_digest` is the lowercase-hex SHA-256 of the canonical
        rkyv-archived bytes (ADR-0002, development.md §Hashing). On the
        `Unchanged` path the digest is computed once over the candidate
        bytes and used both for the byte-equality check (against the
        `existing` bytes returned by `PutOutcome::KeyExists`) and for the
        response body.
      operationId: submit_workload
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitWorkloadRequest'
        required: true
      responses:
        '200':
          description: Job accepted (Accept negotiates one-shot vs streaming)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitWorkloadResponse'
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/ServiceSubmitEvent'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '409':
          description: Conflict at existing key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /v1/jobs/{id}:
    get:
      tags:
      - jobs
      summary: |-
        `GET /v1/jobs/{id}` — read via `IntentStore::get`, rkyv-access the
        bytes, recompute `spec_digest = ContentHash::of(archived_bytes)`.
      description: |-
        Canonical-hashing contract (ADR-0002 + development.md §Hashing):
        the `spec_digest` returned here is SHA-256 over the exact byte
        sequence we pulled out of the `IntentStore` — i.e. the rkyv-archived
        bytes of a validated `Job`. We deliberately do NOT re-canonicalise,
        do NOT route through JCS, and do NOT hash `serde_json::to_string(&job)`
        — any of those would break the byte-identity property the rest of
        the platform depends on.

        404 contract (ADR-0015 §3): `IntentStore::get -> Ok(None)` maps to
        `ControlPlaneError::NotFound { resource: <IntentKey::as_str()> }`,
        which `to_response` renders as HTTP 404 with an `ErrorBody { error:
        "not_found", ... }`.

        Post-ADR-0020: the response shape is `{spec, spec_digest}` only.
        The `commit_index` field is dropped wholesale — there is no
        store-wide nor per-entry index on the wire (see ADR-0020).
      operationId: describe_workload
      parameters:
      - name: id
        in: path
        description: Canonical WorkloadId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Job description
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkloadDescription'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /v1/jobs/{id}/stop:
    post:
      tags:
      - jobs
      summary: |-
        `POST /v1/jobs/{id}/stop` — record a stop intent for a previously-
        submitted job. Per ADR-0027.
      description: |-
        AIP-136 prescribes `POST /v1/jobs/{id}:stop`. axum 0.7 cannot
        route the `:stop` verb suffix as a single path segment because its
        matcher (matchit) treats `:` as the path-parameter prefix —
        `/v1/jobs/:id:stop` is rejected. We use the path-subsegment form
        `/v1/jobs/{id}/stop` which is industry-standard, semantically
        equivalent, and free of framework conflict. ADR-0027's guidance
        stands; only the URL form differs.

        Idempotency: the handler writes `IntentKey::for_workload_stop(<id>)`
        via `IntentStore::put_if_absent` (atomic compare-and-set). A
        second call sees `KeyExists` and returns
        `outcome = AlreadyStopped` — no second write occurs.

        404 contract: a stop call against an `<id>` that was never
        submitted (no `IntentKey::for_workload(<id>)` row) returns HTTP 404.
        The original spec key MUST exist before a stop intent can be
        recorded — stopping a non-existent job is operator error, not an
        idempotent no-op.

        Empty request body. The response body is `{ workload_id, outcome }`.
      operationId: stop_workload
      parameters:
      - name: id
        in: path
        description: Canonical WorkloadId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Job stop recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StopWorkloadResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
  /v1/nodes:
    get:
      tags:
      - observation
      summary: '`GET /v1/nodes` — observation read on `node_health`.'
      description: |-
        Symmetric to `alloc_status` — reads through
        `ObservationStore::node_health_rows`. Fresh store → HTTP 200 with
        explicit `{"rows": []}`.
      operationId: node_list
      responses:
        '200':
          description: Node rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeList'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
components:
  schemas:
    AllocStateWire:
      type: string
      description: |-
        Wire-shaped projection of the internal `AllocState` enum.

        The internal `AllocState` (in `overdrive-core::traits::observation_store`)
        derives `rkyv::*` for the observation store. The wire shape needs
        `Serialize`/`Deserialize`/`ToSchema` and a stable lowercase string repr.
        Adding all those derives to the internal type would entangle storage
        and wire concerns, so this mirror enum exists for the wire surface
        (ADR-0032 §3, reuse-analysis CREATE NEW rationale).

        `Failed` per ADR-0032 §5 — the action shim, when handling
        `DriverError::StartRejected`, writes `state: Failed` (instead of
        `Terminated`). The internal `AllocState::Failed` variant landed in
        step 01-01; this wire type's `Failed` variant projects it.

        Conversion is mechanical via [`From<AllocState>`].
      enum:
      - pending
      - running
      - draining
      - suspended
      - terminated
      - failed
    AllocStatusResponse:
      type: object
      description: |-
        Response for `GET /v1/allocs`.

        Per ADR-0033 §1 amended 2026-04-30 / Slice 01 step 01-03 — the
        envelope carries top-level identity (`workload_id`, `spec_digest`),
        replica counts (`replicas_desired` / `replicas_running`) projected
        from the `IntentStore` + observation rows, and a `restart_budget`
        block hydrated from the `WorkloadLifecycle` reconciler view cache.

        On the empty / 200 path with no rows the envelope still carries
        `replicas_desired` (from the spec) so the CLI can render an
        honest empty state — see step 01-03 task description and
        `wave-decisions.md` [D2].
      required:
      - rows
      properties:
        kind:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkloadKind'
            description: |-
              Workload-kind discriminator per ADR-0047 §1 / step 02-02 [D4].
              The CLI render layer branches on this field.
        replicas_desired:
          type: integer
          format: int32
          description: Desired replica count from `Job.spec.replicas`.
          minimum: 0
        replicas_running:
          type: integer
          format: int32
          description: Number of `rows` whose state is `Running`.
          minimum: 0
        restart_budget:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/RestartBudget'
            description: |-
              Aggregate restart-budget block for the job — derived from the
              `WorkloadLifecycle` reconciler view cache. `max` is hard-coded to
              `RESTART_BACKOFF_CEILING` (5) in Phase 1.
        rows:
          type: array
          items:
            $ref: '#/components/schemas/AllocStatusRowBody'
        spec_digest:
          type:
          - string
          - 'null'
          description: |-
            SHA-256 (hex, 64 chars) of the canonical rkyv-archived `Job`
            bytes — see `WorkloadDescription::spec_digest`. Pinned per ADR-0002.
        vip:
          type:
          - string
          - 'null'
          description: |-
            Service-issued VIP — populated for `WorkloadKind::Service`
            reads per ADR-0049 (amended 2026-05-15). `None` for
            `Job` / `Schedule` reads. Resolved from the persistent
            allocator's content-addressed memo keyed by the workload's
            `WorkloadIntent::Service(_).spec_digest()`.

            Per the Q1.A resolution 2026-05-15: per-listener lines do
            NOT carry a per-listener VIP — listeners are `(port, protocol)`
            only; the Service-level VIP lives at this top-level field.
        workload_id:
          type:
          - string
          - 'null'
          description: |-
            Canonical job id this snapshot describes. `None` is reserved
            for forward-compat (Phase 2 may add cluster-wide reads); Phase 1
            always populates it.
    AllocStatusRowBody:
      type: object
      description: |-
        Allocation-status row body — extended per ADR-0033 §1 / Slice 01
        step 01-03.

        `state` is the typed `AllocStateWire` (promoted from `String` per
        [C9] greenfield single-cut — no parallel legacy field). `reason`
        remains the typed `Option<TransitionReason>` from ADR-0032 §3
        Amendment; the renderer calls `TransitionReason::human_readable()`
        for display. New cause-class payloads carry their structured data
        directly on the wire, and the row's `error` field carries the
        verbatim driver detail string (mirrors `AllocStatusRow.detail`).

        `last_transition` is `Option<TransitionRecord>` — populated when
        the row's `reason` is set; the renderer reads it to produce the
        `from → to reason: ... source: ... at: ...` block.
      required:
      - alloc_id
      - workload_id
      - node_id
      - state
      - resources
      properties:
        alloc_id:
          type: string
        error:
          type:
          - string
          - 'null'
          description: |-
            Verbatim driver / OS detail text — mirrors the underlying row's
            `detail: Option<String>`. This is the audit-preserving sidecar
            the typed `reason` payload cannot capture (e.g. raw `errno`
            strings).
        exit_code:
          type:
          - integer
          - 'null'
          format: int32
          description: Phase 2+ — exit code observation. `None` in Phase 1.
        last_transition:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/TransitionRecord'
            description: |-
              Last-transition structured record. `None` for never-transitioned
              rows (e.g. the very first Pending observation).
        node_id:
          type: string
        reason:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/TransitionReason'
            description: |-
              Structured cause for this row's most recent transition.
              Source-of-truth pin: this enum is identical to the streaming
              `LifecycleTransition.reason` surface; byte-equality across
              surfaces is structural ([C6]).
        resources:
          $ref: '#/components/schemas/ResourcesBody'
          description: Resource envelope this allocation requested.
        started_at:
          type:
          - string
          - 'null'
          description: |-
            Logical-timestamp string of the row's first observed transition
            to a non-Pending state. `None` for never-started Pending rows.
        state:
          $ref: '#/components/schemas/AllocStateWire'
        workload_id:
          type: string
    BackoffCause:
      type: string
      description: |-
        Disambiguator on [`ServiceFailureReason::BackoffExhausted`]
        naming the budget that ran out. Per ADR-0059 Q2.

        Phase 1 emits only [`Self::AttemptBudget`].
        [`Self::LivenessBudget`] is defined for forward-compat with
        the future `LivenessRestartGovernor` (ADR-0055 §7) — Phase 2+.
        Including the discriminator now keeps the wire shape additive
        without splitting the variant later.
      enum:
      - attempt_budget
      - liveness_budget
    BrokerCountersBody:
      type: object
      description: |-
        Broker counters rendered inside `ClusterStatus`. Tracks the
        evaluation-broker ingress / cancel / dispatch shape from ADR-0013.
      required:
      - queued
      - cancelled
      - dispatched
      properties:
        cancelled:
          type: integer
          format: int64
          minimum: 0
        dispatched:
          type: integer
          format: int64
          minimum: 0
        queued:
          type: integer
          format: int64
          minimum: 0
    CancelledBy:
      type: string
      description: Initiator of a `Cancelled` transition.
      enum:
      - operator
      - cluster
    ClusterStatus:
      type: object
      description: |-
        Response for `GET /v1/cluster/info`.

        Carries mode, region, the reconciler registry, and the broker
        counters per ADR-0013 and US-04 AC (amended by ADR-0020 — the
        `commit_index` field is dropped, no replacement).

        Activity-rate observability is provided by `broker.dispatched`
        (heartbeat reconciler ticks) plus the `reconcilers` list (the
        "did the runtime register?" wiring witness). A dedicated metrics
        endpoint covers cluster-level commit-rate signals starting in
        Phase 5; the dropped in-memory counter was not a substitute for
        it. See ADR-0020 §Considered alternatives §D for the full
        rationale.
      required:
      - mode
      - region
      - reconcilers
      - broker
      properties:
        broker:
          $ref: '#/components/schemas/BrokerCountersBody'
        mode:
          type: string
        reconcilers:
          type: array
          items:
            type: string
        region:
          type: string
    DriverInput:
      oneOf:
      - type: object
        description: Native binary under cgroups v2 — the `[exec]` table in TOML.
        required:
        - exec
        properties:
          exec:
            $ref: '#/components/schemas/ExecInput'
            description: Native binary under cgroups v2 — the `[exec]` table in TOML.
      description: |-
        Driver dispatch on a [`JobSpecInput`].

        Per ADR-0031 §2 a tagged enum with `#[serde(flatten)]` on the field
        surfaces the table name as the discriminator in TOML / JSON: `[exec]`
        → `DriverInput::Exec(...)`. `deny_unknown_fields` on the enum rejects
        unknown driver tables.

        Today: one variant (`Exec`). Future drivers (`microvm`, `wasm`) add
        new variants additively; no shape change to surrounding code.
    DriverType:
      type: string
      description: |-
        Driver class — the `driver` field in a job spec maps 1:1 to a variant.

        Stable: new drivers are appended; existing variants never change their
        wire form. [`Display`] and [`FromStr`] emit `exec`, `microvm`, `vm`,
        `unikernel`, `wasm` — matching `docs/whitepaper.md` §6 exactly. The
        `exec` vocabulary aligns with Nomad's `exec` task driver and Talos's
        terminology (see ADR-0029 amendment 2026-04-28).

        Carries `utoipa::ToSchema` so the wire-typed `TransitionSource::Driver`
        variant in `overdrive-control-plane::api` can register the schema
        transitively (DWD-03). `utoipa` is a declarative-derive crate with no
        runtime I/O — the dst-lint banned-API list does not enumerate it.
      enum:
      - exec
      - micro-vm
      - vm
      - unikernel
      - wasm
    ErrorBody:
      type: object
      description: |-
        RFC-7807-compatible subset per ADR-0015.

        The three fields — `error`, `message`, `field` — are pinned;
        renaming breaks the contract surface the CLI and external clients
        depend on. `field` is `Option<String>` because not every error class
        maps to a single field (e.g. transport-layer errors).
      required:
      - error
      - message
      properties:
        error:
          type: string
        field:
          type:
          - string
          - 'null'
        message:
          type: string
    ExecInput:
      type: object
      description: Operator-facing `[exec]` table fields per ADR-0031 §2.
      required:
      - command
      - args
      properties:
        args:
          type: array
          items:
            type: string
          description: |-
            Argv passed verbatim. Required field — an absent `args` is a
            parse error, not "default to no args" (per ADR-0031 §8). Empty
            `Vec` is the legitimate zero-args case.
        command:
          type: string
          description: |-
            Host filesystem path to the binary. Validated non-empty (after
            trim) at `JobV1::from_submit` per ADR-0031 §4.
      additionalProperties: false
    IdempotencyOutcome:
      type: string
      description: |-
        Outcome of an idempotent `POST /v1/jobs` submission.

        Distinguishes "your spec landed fresh" from "your spec was already
        there." Conflict (different spec at same key) is an HTTP-status
        concern (409), never an enumeration value here — see ADR-0015 §4
        amendment via ADR-0020.

        Wire shape: `"inserted"` | `"unchanged"` (lowercase JSON via
        `#[serde(rename_all = "lowercase")]`).
      enum:
      - inserted
      - unchanged
    JobSpecInput:
      allOf:
      - $ref: '#/components/schemas/DriverInput'
      - type: object
        required:
        - id
        - replicas
        - resources
        properties:
          id:
            type: string
          replicas:
            type: integer
            format: int32
            minimum: 0
          resources:
            $ref: '#/components/schemas/ResourcesInput'
      description: |-
        Input shape for `JobV1::from_submit`. The CLI deserialises TOML into this
        type; the server deserialises JSON into the same type; both route
        through the same constructor.

        Per ADR-0031 §2 the shape is flat top-level (`id`, `replicas`),
        `resources: ResourcesInput`, `#[serde(flatten)] driver: DriverInput`.
        `deny_unknown_fields` on every struct + a tagged enum enforce
        exactly-one driver table at parse time.

        Carries `Serialize` / `Deserialize` so REST handlers and the CLI can
        reuse this type verbatim as the body / field shape for
        `POST /v1/jobs` and `GET /v1/jobs/{id}` (ADR-0014 §Shared types).
        Carries `utoipa::ToSchema` so the generated `OpenAPI` document
        (ADR-0009, `cargo openapi-gen`) renders the spec shape
        consistently across the server and CLI lanes.
    Listener:
      type: object
      description: |-
        A single `[[listener]]` block on a `[service]` body.

        Per ADR-0047 §1 (Service listener fields) and ADR-0049 § 5 the
        listener identity is the `(port, protocol)` pair — `port` is
        non-zero (rejected at parse time per S-08-06) and `protocol` is
        `tcp` / `udp` only via the existing [`Proto`] newtype
        (case-insensitive parse, lowercase canonical render).

        The operator-supplied `vip` field was removed in
        `service-vip-allocator` step 02-01: VIPs are platform-issued via
        `ServiceVipAllocator` keyed by `spec_digest` and are structurally
        unrepresentable in the operator-facing spec. The parser rejects
        any TOML carrying `vip` on a `[[listener]]` block with a typed
        [`ParseError::UnknownField`] variant.

        Distinct from the dataplane-layer `Backend` per design Reuse
        Analysis — the spec-layer `Listener` is the OPERATOR-DECLARED
        intent, while a `Backend` is the dataplane's per-replica realised
        endpoint. The two carry the same [`Proto`] newtype but live in
        different bounded contexts.
      required:
      - port
      - protocol
      properties:
        port:
          type: integer
          format: int32
          description: |-
            Listener port — 1..=65535. `port = 0` is rejected at parse time
            per S-08-06 (`ParseError::ListenerPortZero`).
          maximum: 65535
          minimum: 1
        protocol:
          $ref: '#/components/schemas/Proto'
          description: |-
            L4 protocol — `tcp` or `udp` only. Case-insensitive at parse
            time; lowercase on canonical render.
      additionalProperties: false
    ListenerInput:
      type: object
      description: |-
        HTTP/JSON wire-shape for a single listener entry.

        Distinct from the parser-side
        [`crate::aggregate::workload_spec::Listener`] newtype in encoding
        only: the parser side carries `port: NonZeroU16` and
        `protocol: Proto` after TOML decoding; the wire side carries
        `port: u16` and `protocol: String` for JSON deserialise tolerance,
        with validation deferred to
        [`crate::aggregate::ServiceV1::from_submit`].
      required:
      - port
      - protocol
      properties:
        port:
          type: integer
          format: int32
          description: |-
            Listener port — 1..=65535. `port == 0` is rejected at admission
            inside `ServiceV1::from_submit`.
          maximum: 65535
          minimum: 1
        protocol:
          type: string
          description: |-
            L4 protocol — `tcp` / `udp` (case-insensitive). Validated at
            admission inside `ServiceV1::from_submit`.
      additionalProperties: false
    NodeList:
      type: object
      description: |-
        Response for `GET /v1/nodes`. Phase 1 always renders an empty
        `rows` array per US-03 AC — node ingestion lands in a later phase.
      required:
      - rows
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/NodeRowBody'
    NodeRowBody:
      type: object
      description: |-
        Node row body. Phase 1 shape mirrors the observation `NodeHealthRow`
        projected to the wire — minimal fields (`node_id`, `region`). Phase
        2+ adds columns additively.
      required:
      - node_id
      - region
      properties:
        node_id:
          type: string
        region:
          type: string
    ProbeWitness:
      type: object
      description: |-
        Names which probe's Pass moved the reconciler to Stable.

        Per DDD-7 (multi-probe AND-of-all semantic): when N startup
        probes are declared, all must Pass; the witness names the
        **last-to-Pass** probe. Renderer surfaces as `witness:
        startup probe #<idx> (<mechanic_summary>)`.

        Lives in `transition_reason.rs` (and is re-exported from
        `service_lifecycle.rs`) so it can be carried inside
        [`TerminalCondition::Stable`] without inducing a module-
        dependency cycle.
      required:
      - probe_idx
      - role
      - mechanic_summary
      - inferred
      properties:
        inferred:
          type: boolean
          description: |-
            `true` IFF this witness was the platform's inferred default
            probe per ADR-0058.
        mechanic_summary:
          type: string
          description: |-
            Operator-facing summary (e.g. `"tcp 0.0.0.0:8080"`,
            `"http GET http://0.0.0.0:8080/healthz"`,
            `"exec /usr/local/bin/healthcheck.sh"`). Reconciler
            composes from `ProbeDescriptor.mechanic` at the deciding
            tick.
        probe_idx:
          type: integer
          format: int32
          description: |-
            0-indexed position of the witnessing probe within its role
            array.
          minimum: 0
        role:
          type: string
          description: |-
            Operator-facing role name (`"startup"` / `"readiness"` /
            `"liveness"`). Carried as `String` to keep
            `transition_reason.rs` decoupled from `observation::ProbeRole`
            (which lives in a separate module — projection happens at the
            reconciler's emission site).
    Proto:
      type: string
      description: |-
        L4 protocol discriminator. Only `Tcp` and `Udp` are recognised in
        Phase 2.2 — these are the two protocols the egress reverse-NAT
        path supports per architecture.md § 6.
      enum:
      - tcp
      - udp
    ResourceEnvelope:
      type: object
      description: |-
        Resource envelope carried by the `NoCapacity` cause variant.

        Mirrors the production `Resources` shape from
        `overdrive_core::traits::driver` but is defined here to keep the
        `TransitionReason` self-contained without pulling the full driver
        trait surface into wire-typed contexts. The crafter wires the
        `From<&Resources> for ResourceEnvelope` projection in slice 01
        GREEN.
      required:
      - cpu_milli
      - memory_bytes
      properties:
        cpu_milli:
          type: integer
          format: int32
          minimum: 0
        memory_bytes:
          type: integer
          format: int64
          minimum: 0
    ResourcesBody:
      type: object
      description: |-
        Snapshot's per-row `resources` block per ADR-0033 §1.

        Mirrors the internal `overdrive_core::traits::driver::Resources` shape
        for the wire. Conversion is mechanical via [`From<&Resources>`].
      required:
      - cpu_milli
      - memory_bytes
      properties:
        cpu_milli:
          type: integer
          format: int32
          minimum: 0
        memory_bytes:
          type: integer
          format: int64
          minimum: 0
    ResourcesInput:
      type: object
      description: |-
        Wire-shape twin of [`Resources`].

        Per ADR-0031 §2 / `.claude/rules/development.md` § State-layer
        hygiene: the rkyv-archived intent-side `Resources` is kept clean of
        serde-only / utoipa-only concerns; this twin carries the wire-side
        derives. The projection onto `Resources` is field-by-field inside
        `JobV1::from_submit` (no `From` impl: the ≥3-call-sites rule isn't met,
        and the validation rules — `memory_bytes != 0` — must fire on the
        way through anyway).
      required:
      - cpu_milli
      - memory_bytes
      properties:
        cpu_milli:
          type: integer
          format: int32
          minimum: 0
        memory_bytes:
          type: integer
          format: int64
          minimum: 0
      additionalProperties: false
    RestartBudget:
      type: object
      description: |-
        Snapshot's restart-budget block per ADR-0033 §1.

        `exhausted` is redundant with `used >= max`; carried explicitly on the
        wire so a CLI that wants to render the `(backoff exhausted)` annotation
        does not have to compare two integers each time.

        Phase 1: `max` is hard-coded to 5 (matching the existing
        `RESTART_BUDGET_MAX` constant in `WorkloadLifecycle::reconcile`); Phase 2+
        makes it per-job-config (DESIGN [D7]).
      required:
      - used
      - max
      - exhausted
      properties:
        exhausted:
          type: boolean
        max:
          type: integer
          format: int32
          minimum: 0
        used:
          type: integer
          format: int32
          minimum: 0
    ScheduleSpecInput:
      type: object
      description: |-
        HTTP/JSON wire-shape for a Schedule submission per ADR-0051 § 3.

        The per-fire instance is a [`crate::aggregate::JobV1`] per ADR-0047
        § 1 / ADR-0050 § 2; the schedule adds the cron expression. The
        inner job body uses the same wire shape standalone Jobs use —
        operators write the schedule body and the inner job body in the
        same JSON document.
      required:
      - id
      - job
      - cron_expr
      properties:
        cron_expr:
          type: string
          description: |-
            Cron expression. String-shaped on the wire; validated and
            projected onto `CronExpr` inside `ScheduleV1::from_submit`.
        id:
          type: string
        job:
          $ref: '#/components/schemas/JobSpecInput'
          description: |-
            Inner job specification fired on each cron tick. Same wire
            shape standalone Jobs use.
      additionalProperties: false
    ServiceFailureReason:
      oneOf:
      - type: object
        description: |-
          Startup deadline elapsed before any successful probe.
          `probe_idx` names the last-attempted probe; `attempts`
          records how many attempts were made.
        required:
        - data
        - reason
        properties:
          data:
            type: object
            description: |-
              Startup deadline elapsed before any successful probe.
              `probe_idx` names the last-attempted probe; `attempts`
              records how many attempts were made.
            required:
            - probe_idx
            - attempts
            properties:
              attempts:
                type: integer
                format: int32
                minimum: 0
              probe_idx:
                type: integer
                format: int32
                minimum: 0
          reason:
            type: string
            enum:
            - startup_timeout
      - type: object
        description: |-
          Startup probe exhausted `max_attempts` without a Pass result
          within `startup_deadline`. `last_fail` carries the last
          observed `ProbeStatus::Fail.last_fail_reason` for direct
          operator-renderable surface.
        required:
        - data
        - reason
        properties:
          data:
            type: object
            description: |-
              Startup probe exhausted `max_attempts` without a Pass result
              within `startup_deadline`. `last_fail` carries the last
              observed `ProbeStatus::Fail.last_fail_reason` for direct
              operator-renderable surface.
            required:
            - probe_idx
            - last_fail
            - attempts
            properties:
              attempts:
                type: integer
                format: int32
                minimum: 0
              last_fail:
                type: string
              probe_idx:
                type: integer
                format: int32
                minimum: 0
          reason:
            type: string
            enum:
            - startup_probe_failed
      - type: object
        description: |-
          Workload exited before any startup probe could pass AND
          within `startup_deadline` window. Closes RCA-A coinflip
          case per US-08.
        required:
        - data
        - reason
        properties:
          data:
            type: object
            description: |-
              Workload exited before any startup probe could pass AND
              within `startup_deadline` window. Closes RCA-A coinflip
              case per US-08.
            required:
            - exit_code
            properties:
              exit_code:
                type: integer
                format: int32
          reason:
            type: string
            enum:
            - early_exit
      - type: object
        description: |-
          Liveness probe consecutive-failure count reached its
          threshold AND restart-budget reached
          `RESTART_BACKOFF_CEILING`. Composes with the existing
          `BackoffExhausted` JobLifecycle pathway for Service-kind
          liveness-driven restart attempts.
        required:
        - data
        - reason
        properties:
          data:
            type: object
            description: |-
              Liveness probe consecutive-failure count reached its
              threshold AND restart-budget reached
              `RESTART_BACKOFF_CEILING`. Composes with the existing
              `BackoffExhausted` JobLifecycle pathway for Service-kind
              liveness-driven restart attempts.
            required:
            - probe_idx
            - attempts
            properties:
              attempts:
                type: integer
                format: int32
                minimum: 0
              probe_idx:
                type: integer
                format: int32
                minimum: 0
          reason:
            type: string
            enum:
            - liveness_probe_failed
      - type: object
        description: |-
          Service-kind workload exhausted the general restart-attempt
          budget (`WorkloadLifecycleView::restart_counts >=
          RESTART_BACKOFF_CEILING`). Distinct from
          [`Self::LivenessProbeFailed`] (which fires when liveness
          consecutive-failures + restart-budget jointly exhaust).

          `attempts` is the count at the deciding tick. `cause`
          disambiguates the budget that ran out; `last_exit_code` is
          read from the latest `AllocStatusRow.exit_code` observation
          at projection time. Per ADR-0059 Q2.
        required:
        - data
        - reason
        properties:
          data:
            type: object
            description: |-
              Service-kind workload exhausted the general restart-attempt
              budget (`WorkloadLifecycleView::restart_counts >=
              RESTART_BACKOFF_CEILING`). Distinct from
              [`Self::LivenessProbeFailed`] (which fires when liveness
              consecutive-failures + restart-budget jointly exhaust).

              `attempts` is the count at the deciding tick. `cause`
              disambiguates the budget that ran out; `last_exit_code` is
              read from the latest `AllocStatusRow.exit_code` observation
              at projection time. Per ADR-0059 Q2.
            required:
            - attempts
            - cause
            properties:
              attempts:
                type: integer
                format: int32
                minimum: 0
              cause:
                $ref: '#/components/schemas/BackoffCause'
              last_exit_code:
                type:
                - integer
                - 'null'
                format: int32
          reason:
            type: string
            enum:
            - backoff_exhausted
      - type: object
        description: |-
          Fallback projection for third-party WASM reconciler terminals
          (`TerminalCondition::Custom`). `source` carries the
          reconciler's canonical name (`type_name`); `message` carries
          the rendered detail bytes (UTF-8 if valid, lowercase-hex
          otherwise). Per ADR-0059 Q3.
        required:
        - data
        - reason
        properties:
          data:
            type: object
            description: |-
              Fallback projection for third-party WASM reconciler terminals
              (`TerminalCondition::Custom`). `source` carries the
              reconciler's canonical name (`type_name`); `message` carries
              the rendered detail bytes (UTF-8 if valid, lowercase-hex
              otherwise). Per ADR-0059 Q3.
            required:
            - source
            - message
            properties:
              message:
                type: string
              source:
                type: string
          reason:
            type: string
            enum:
            - other
      - type: object
        description: |-
          Streaming-loop wall-clock cap timer expired before any
          terminal arrived. Synthesised by `build_stream`; the
          reconciler MUST NOT emit this variant. Per ADR-0059 Q4.
        required:
        - data
        - reason
        properties:
          data:
            type: object
            description: |-
              Streaming-loop wall-clock cap timer expired before any
              terminal arrived. Synthesised by `build_stream`; the
              reconciler MUST NOT emit this variant. Per ADR-0059 Q4.
            required:
            - after_seconds
            properties:
              after_seconds:
                type: integer
                format: int32
                minimum: 0
          reason:
            type: string
            enum:
            - timeout
      - type: object
        description: |-
          Broadcast channel closed mid-stream (server shutdown / action
          shim teardown). Synthesised by `build_stream`; the reconciler
          MUST NOT emit this variant. Per ADR-0059 Q4.
        required:
        - reason
        properties:
          reason:
            type: string
            enum:
            - stream_interrupted
      description: |-
        Reason a Service alloc transitioned to a terminal Failed state.

        Per ADR-0055 § 4 + ADR-0056 (wire projection): single
        `#[non_exhaustive]` enum; additive variants only.

        Lives in `transition_reason.rs` (and is re-exported from
        `service_lifecycle.rs`) so it can be carried inside
        [`TerminalCondition::ServiceFailed`] without inducing a module-
        dependency cycle. The Service-lifecycle reconciler is the sole
        constructor; downstream consumers branch on the variant for
        operator-facing render.
    ServiceSpecInput:
      allOf:
      - $ref: '#/components/schemas/DriverInput'
      - type: object
        required:
        - id
        - replicas
        - resources
        - listeners
        properties:
          id:
            type: string
          listeners:
            type: array
            items:
              $ref: '#/components/schemas/ListenerInput'
            description: |-
              Operator-declared listeners in declaration order. Validated at
              admission inside [`crate::aggregate::ServiceV1::from_submit`]:
              at least one element; no two share `(port, protocol)`; protocol
              is `tcp` / `udp` only.
          replicas:
            type: integer
            format: int32
            minimum: 0
          resources:
            $ref: '#/components/schemas/ResourcesInput'
      description: |-
        HTTP/JSON wire-shape for a Service submission per ADR-0051 § 3.

        Mirrors [`crate::aggregate::JobSpecInput`]'s `(id, replicas,
        resources, driver)` shape plus operator-declared listeners.

        Per ADR-0049 § 5 and ADR-0051 § 2 listeners carry `(port, protocol)`
        only — NO operator-supplied VIP. The platform issues VIPs via
        `ServiceVipAllocator` keyed by
        `WorkloadIntent::Service(_).spec_digest()` after admission; the
        operator never names a VIP on the wire or in TOML.
    ServiceSubmitEvent:
      oneOf:
      - type: object
        description: Submit was accepted. Mirrors `SubmitEvent::Accepted`.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: Submit was accepted. Mirrors `SubmitEvent::Accepted`.
            required:
            - spec_digest
            - intent_key
            - outcome
            properties:
              intent_key:
                type: string
              outcome:
                $ref: '#/components/schemas/IdempotencyOutcome'
              spec_digest:
                type: string
          kind:
            type: string
            enum:
            - accepted
      - type: object
        description: |-
          Terminal — service reached the Stable state per ADR-0055
          (all declared startup probes passed within `startup_deadline`).
          `settled_in_ms` is the wall-clock interval (in milliseconds)
          from alloc start to the deciding tick that observed the
          last-to-Pass startup probe. `witness` names which probe's
          Pass moved the reconciler to Stable.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Terminal — service reached the Stable state per ADR-0055
              (all declared startup probes passed within `startup_deadline`).
              `settled_in_ms` is the wall-clock interval (in milliseconds)
              from alloc start to the deciding tick that observed the
              last-to-Pass startup probe. `witness` names which probe's
              Pass moved the reconciler to Stable.
            required:
            - alloc_id
            - settled_in_ms
            - witness
            properties:
              alloc_id:
                type: string
              settled_in_ms:
                type: integer
                format: int64
                minimum: 0
              witness:
                $ref: '#/components/schemas/ProbeWitness'
          kind:
            type: string
            enum:
            - stable
      - type: object
        description: |-
          Terminal — service convergence failed. `reason` carries the
          typed `ServiceFailureReasonWire` cause discriminator per
          ADR-0055 §4 / ADR-0056. `stderr_tail` is the last-N lines of
          the workload's stderr (populated by ExitObserver in slice
          03-02; Option<String> here so the wire shape is stable
          against the future plumbing).
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Terminal — service convergence failed. `reason` carries the
              typed `ServiceFailureReasonWire` cause discriminator per
              ADR-0055 §4 / ADR-0056. `stderr_tail` is the last-N lines of
              the workload's stderr (populated by ExitObserver in slice
              03-02; Option<String> here so the wire shape is stable
              against the future plumbing).
            required:
            - reason
            properties:
              alloc_id:
                type:
                - string
                - 'null'
              reason:
                $ref: '#/components/schemas/ServiceFailureReason'
              stderr_tail:
                type:
                - string
                - 'null'
          kind:
            type: string
            enum:
            - failed
      - type: object
        description: |-
          Terminal — service stopped (by operator or by reconciler-
          observed process exit / system gc). Per ADR-0059 Q1 this is
          a sibling variant of `Failed`, NOT folded into it — CLI
          exit-code semantics diverge (Stopped exits 0 / 130; Failed
          exits with the failure-specific code). Mirrors the
          `JobSubmitEvent::Stopped` sibling convention.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Terminal — service stopped (by operator or by reconciler-
              observed process exit / system gc). Per ADR-0059 Q1 this is
              a sibling variant of `Failed`, NOT folded into it — CLI
              exit-code semantics diverge (Stopped exits 0 / 130; Failed
              exits with the failure-specific code). Mirrors the
              `JobSubmitEvent::Stopped` sibling convention.
            required:
            - alloc_id
            - by
            properties:
              alloc_id:
                type: string
              by:
                $ref: '#/components/schemas/StoppedBy'
          kind:
            type: string
            enum:
            - stopped
      description: |-
        Streaming events emitted by the Service submit sub-path.

        Per ADR-0056 / DDD-11: V2 wire shape. Terminal events:
        * `Stable { settled_in_ms, witness }` — convergence reached the
          `TerminalCondition::Stable` shape (all declared startup probes
          passed within `startup_deadline`).
        * `Failed { reason, stderr_tail }` — convergence failed with a
          typed `ServiceFailureReason` cause (startup-timeout, startup-
          probe-failed, early-exit, liveness-probe-failed).

        The wire projection is byte-equal with the row's typed
        `TerminalCondition` carried in `AllocStatusRow.terminal` — both
        surfaces project from the same `Action.terminal` value in the
        same action-shim call frame per ADR-0037 §4.
    ServiceVip:
      type: string
      description: |-
        Virtual IP a kernel-side XDP program matches incoming packets
        against. Stored host-order; converted at the kernel boundary
        per architecture.md § 11.

        Userspace control-plane newtype only — `service_backends`
        observation rows continue to carry `vip: Ipv4Addr` as their
        wire-shape field; the hydrator wraps at the read boundary
        (architecture.md § 5).

        # Wire form

        `Display` emits the canonical `IpAddr` string form (e.g.
        `10.0.0.1`, `::1`). `FromStr` parses any [`std::net::IpAddr`]-
        compatible string. Empty input and non-IP strings surface as
        structured [`IdParseError`] variants.
      example: 10.0.0.1
    StopOutcome:
      type: string
      description: Outcome of `POST /v1/jobs/{id}/stop` per ADR-0027.
      enum:
      - stopped
      - already_stopped
    StopWorkloadResponse:
      type: object
      description: |-
        Response for `POST /v1/jobs/{id}/stop`. Per ADR-0027 the body shape
        is `{ workload_id, outcome }` where `outcome ∈ { "stopped",
        "already_stopped" }`. 404 on unknown job (separate path).

        `outcome` is wire-stringly-typed (lowercase JSON via
        `#[serde(rename_all = "snake_case")]`) so future verbs (start,
        restart, cancel) can extend the enum additively.
      required:
      - workload_id
      - outcome
      properties:
        outcome:
          $ref: '#/components/schemas/StopOutcome'
        workload_id:
          type: string
    StoppedBy:
      type: string
      description: Initiator of a `Stopped` transition.
      enum:
      - operator
      - reconciler
      - process
      - system_gc
    SubmitSpecInput:
      oneOf:
      - allOf:
        - $ref: '#/components/schemas/JobSpecInput'
          description: |-
            Run-to-completion workload — see
            [`crate::aggregate::JobSpecInput`] for the per-kind shape.
        - type: object
          required:
          - kind
          properties:
            kind:
              type: string
              enum:
              - job
        description: |-
          Run-to-completion workload — see
          [`crate::aggregate::JobSpecInput`] for the per-kind shape.
      - allOf:
        - $ref: '#/components/schemas/ServiceSpecInput'
          description: |-
            Long-running supervised workload with operator-declared
            listeners — see [`ServiceSpecInput`].
        - type: object
          required:
          - kind
          properties:
            kind:
              type: string
              enum:
              - service
        description: |-
          Long-running supervised workload with operator-declared
          listeners — see [`ServiceSpecInput`].
      - allOf:
        - $ref: '#/components/schemas/ScheduleSpecInput'
          description: Cron-scheduled `Job` — see [`ScheduleSpecInput`].
        - type: object
          required:
          - kind
          properties:
            kind:
              type: string
              enum:
              - schedule
        description: Cron-scheduled `Job` — see [`ScheduleSpecInput`].
      description: |-
        HTTP/JSON wire-shape for `POST /v1/workloads` (and the streaming
        sibling). Per ADR-0051 this is the wire-side member of the three-
        layer Rust universe — distinct from the parser-side
        [`crate::aggregate::workload_spec::WorkloadSpec`] (TOML) and the
        persisted [`crate::aggregate::WorkloadIntent`] (rkyv).

        Tagged JSON via `#[serde(tag = "kind", rename_all = "snake_case")]`
        — the `kind` field discriminates `job` / `service` / `schedule` and
        the per-variant fields populate the rest of the body.

        `utoipa::ToSchema` renders this as a `oneOf`-discriminated schema in
        the generated OpenAPI document per ADR-0051 OQ-7.

        Listener `vip` is structurally unrepresentable per ADR-0049 § 5;
        `deny_unknown_fields` rejects any incoming JSON carrying it.
    SubmitWorkloadRequest:
      type: object
      description: |-
        Body of `POST /v1/jobs`. Carries the operator-submitted workload
        spec verbatim per ADR-0051 (Accepted 2026-05-15); the server
        dispatches on the [`SubmitSpecInput`] variant and routes each
        arm through the per-kind validating constructor
        (`JobV1::from_submit` / `ServiceV1::from_submit` /
        `ScheduleV1::from_submit`) to derive the intent key / digest.

        Per ADR-0051 § 6 the wire-side `kind` tag inside `SubmitSpecInput`
        is the SOLE workload-kind discriminator carrier — the previous
        optional top-level `workload_kind: Option<String>` field was
        deleted in step 02-03b. Legacy clients that sent
        `workload_kind = "job"` migrate to `spec = { kind: "job", ... }`;
        `kind` is required (not optional) and the JSON shape is
        `oneOf`-discriminated.
      required:
      - spec
      properties:
        spec:
          $ref: '#/components/schemas/SubmitSpecInput'
    SubmitWorkloadResponse:
      type: object
      description: |-
        Response for `POST /v1/jobs`. Carries `workload_id`, the canonical
        `spec_digest`, and the idempotency `outcome` per ADR-0008 and
        ADR-0020.

        Idempotency contract (ADR-0015 §4 amended by ADR-0020):

        * Fresh insert → `outcome = IdempotencyOutcome::Inserted`, HTTP 200.
        * Byte-identical resubmission of the same spec at the same key →
          `outcome = IdempotencyOutcome::Unchanged`, HTTP 200. No write
          occurred; `spec_digest` is stable across N retries.
        * Different spec at the same key → HTTP 409 Conflict, no `outcome`
          field on the wire (conflict is an HTTP-status concern, never an
          enum value — see ADR-0015 §4 amendment via ADR-0020).

        `workload_id` is rendered as a `String` at the wire boundary; the server
        converts back to `overdrive_core::id::WorkloadId` in handlers.
        `spec_digest` is the lowercase-hex SHA-256 of the canonical
        rkyv-archived `Job` bytes (ADR-0002, development.md §Hashing); 64
        characters.
      required:
      - workload_id
      - spec_digest
      - outcome
      properties:
        outcome:
          $ref: '#/components/schemas/IdempotencyOutcome'
        spec_digest:
          type: string
        vip:
          type:
          - string
          - 'null'
          description: |-
            Service-issued VIP — populated for `WorkloadKind::Service`
            submissions per ADR-0049 (amended 2026-05-15). `None` for
            `Job` / `Schedule` submissions (those kinds carry no service-
            level VIP). Rendered as the canonical dotted-decimal IPv4
            form (e.g. `"10.96.0.2"`).

            Per the Q1.A resolution 2026-05-15: this is a top-level
            `Option<String>` rather than a per-kind discriminated oneOf
            response shape. The symmetric oneOf shape is deferred (would
            pull in Job / Schedule response migration not in this
            feature's scope).
        workload_id:
          type: string
    TransitionReason:
      oneOf:
      - type: object
        description: Reconciler picked a placement; action was emitted.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - scheduling
      - type: object
        description: Driver invocation underway.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - starting
      - type: object
        description: Driver returned `Ok(handle)`.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - started
      - type: object
        description: |-
          Reconciler holding off restart per backoff window.
          `attempt` is the 1-indexed retry number that will fire when the
          backoff elapses (matches `WorkloadLifecycleView::restart_counts + 1`).
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Reconciler holding off restart per backoff window.
              `attempt` is the 1-indexed retry number that will fire when the
              backoff elapses (matches `WorkloadLifecycleView::restart_counts + 1`).
            required:
            - attempt
            properties:
              attempt:
                type: integer
                format: int32
                minimum: 0
          kind:
            type: string
            enum:
            - backoff_pending
      - type: object
        description: |-
          Reconciler observed terminal stop. `by` carries who initiated:
          `"operator"` for explicit stop intent, `"reconciler"` for
          converged terminal state.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Reconciler observed terminal stop. `by` carries who initiated:
              `"operator"` for explicit stop intent, `"reconciler"` for
              converged terminal state.
            required:
            - by
            properties:
              by:
                $ref: '#/components/schemas/StoppedBy'
          kind:
            type: string
            enum:
            - stopped
      - type: object
        description: |-
          `spawn(2)` returned ENOENT for the configured binary path.
          Replaces the previous state-class `DriverStartFailed` for the
          missing-binary case; the broken-binary regression target
          (US-02 KPI-02) emits this variant.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              `spawn(2)` returned ENOENT for the configured binary path.
              Replaces the previous state-class `DriverStartFailed` for the
              missing-binary case; the broken-binary regression target
              (US-02 KPI-02) emits this variant.
            required:
            - path
            properties:
              path:
                type: string
          kind:
            type: string
            enum:
            - exec_binary_not_found
      - type: object
        description: |-
          `spawn(2)` returned EACCES — the binary exists but is not
          executable by the running uid.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              `spawn(2)` returned EACCES — the binary exists but is not
              executable by the running uid.
            required:
            - path
            properties:
              path:
                type: string
          kind:
            type: string
            enum:
            - exec_permission_denied
      - type: object
        description: |-
          `spawn(2)` returned ENOEXEC / ELIBBAD / similar — the file is
          not a valid executable for this kernel/architecture.
          `kind` carries the OS-reported sub-cause (e.g. `"not_executable"`,
          `"bad_elf"`, `"wrong_arch"`).
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              `spawn(2)` returned ENOEXEC / ELIBBAD / similar — the file is
              not a valid executable for this kernel/architecture.
              `kind` carries the OS-reported sub-cause (e.g. `"not_executable"`,
              `"bad_elf"`, `"wrong_arch"`).
            required:
            - path
            - kind
            properties:
              kind:
                type: string
              path:
                type: string
          kind:
            type: string
            enum:
            - exec_binary_invalid
      - type: object
        description: |-
          Cgroup setup failed (scope mkdir, PID enrolment, limit write).
          `kind` is one of `"create_scope"`, `"place_pid"`,
          `"write_limits"`; `source` is the verbatim `std::io::Error`
          `Display`.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Cgroup setup failed (scope mkdir, PID enrolment, limit write).
              `kind` is one of `"create_scope"`, `"place_pid"`,
              `"write_limits"`; `source` is the verbatim `std::io::Error`
              `Display`.
            required:
            - kind
            - source
            properties:
              kind:
                type: string
              source:
                type: string
          kind:
            type: string
            enum:
            - cgroup_setup_failed
      - type: object
        description: |-
          Driver returned an uncategorised failure that did not fit any
          of the more specific cause variants. Falls back on the verbatim
          driver `Display` text in `detail`. Operators seeing this variant
          have a signal to file an issue — the driver should grow a more
          specific variant.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Driver returned an uncategorised failure that did not fit any
              of the more specific cause variants. Falls back on the verbatim
              driver `Display` text in `detail`. Operators seeing this variant
              have a signal to file an issue — the driver should grow a more
              specific variant.
            required:
            - detail
            properties:
              detail:
                type: string
          kind:
            type: string
            enum:
            - driver_internal_error
      - type: object
        description: |-
          Reconciler hit restart budget; will not emit further restart
          actions for this alloc id. `last_cause_summary` carries the
          `human_readable()` rendering of the most recent failure cause-
          variant the reconciler observed, so the operator sees both
          "we gave up" and "this is what kept failing" in one transition.
          `attempts` is the count of attempts made (= the budget max in
          Phase 1, hard-coded to 5).

          **Why `String` and not `Box<TransitionReason>`**: rkyv's
          `Archive` derive cannot resolve a recursive enum — the
          archived-size computation overflows. The reconciler renders the
          prior cause via `human_readable()` at observe time; the
          rendered prose IS the auditable artifact, and the structured
          per-attempt history (cause-of-each-attempt) lives in the
          reconciler's private libSQL view (`NextView`), not on the wire.
          The wire only carries the terminal "we gave up because of X"
          summary.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Reconciler hit restart budget; will not emit further restart
              actions for this alloc id. `last_cause_summary` carries the
              `human_readable()` rendering of the most recent failure cause-
              variant the reconciler observed, so the operator sees both
              "we gave up" and "this is what kept failing" in one transition.
              `attempts` is the count of attempts made (= the budget max in
              Phase 1, hard-coded to 5).

              **Why `String` and not `Box<TransitionReason>`**: rkyv's
              `Archive` derive cannot resolve a recursive enum — the
              archived-size computation overflows. The reconciler renders the
              prior cause via `human_readable()` at observe time; the
              rendered prose IS the auditable artifact, and the structured
              per-attempt history (cause-of-each-attempt) lives in the
              reconciler's private libSQL view (`NextView`), not on the wire.
              The wire only carries the terminal "we gave up because of X"
              summary.
            required:
            - attempts
            - last_cause_summary
            properties:
              attempts:
                type: integer
                format: int32
                minimum: 0
              last_cause_summary:
                type: string
          kind:
            type: string
            enum:
            - restart_budget_exhausted
      - type: object
        description: |-
          Operator submitted a stop intent and the reconciler converged
          the allocation to the terminal state in response.
          `by` distinguishes operator stop from cluster-driven stop
          (e.g. node drain — Phase 2+).
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Operator submitted a stop intent and the reconciler converged
              the allocation to the terminal state in response.
              `by` distinguishes operator stop from cluster-driven stop
              (e.g. node drain — Phase 2+).
            required:
            - by
            properties:
              by:
                $ref: '#/components/schemas/CancelledBy'
          kind:
            type: string
            enum:
            - cancelled
      - type: object
        description: |-
          Scheduler returned `NoCapacity`. Carries the requested vs free
          resource envelope at the time of the placement attempt; the
          previous string-formatted "requested X / free Y" diagnostic
          becomes typed structured data.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Scheduler returned `NoCapacity`. Carries the requested vs free
              resource envelope at the time of the placement attempt; the
              previous string-formatted "requested X / free Y" diagnostic
              becomes typed structured data.
            required:
            - requested
            - free
            properties:
              free:
                $ref: '#/components/schemas/ResourceEnvelope'
              requested:
                $ref: '#/components/schemas/ResourceEnvelope'
          kind:
            type: string
            enum:
            - no_capacity
      - type: object
        description: |-
          Cgroup OOM-killed the workload. Requires Phase 2 `ExecDriver`
          cgroup-events subscription; defined now for wire-shape forward-
          compatibility.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Cgroup OOM-killed the workload. Requires Phase 2 `ExecDriver`
              cgroup-events subscription; defined now for wire-shape forward-
              compatibility.
            required:
            - peak_bytes
            - limit_bytes
            properties:
              limit_bytes:
                type: integer
                format: int64
                minimum: 0
              peak_bytes:
                type: integer
                format: int64
                minimum: 0
          kind:
            type: string
            enum:
            - out_of_memory
      - type: object
        description: |-
          Workload exited with a non-zero status or signal within the
          post-spawn settle window. Emitted by the `ExitObserver` when
          `ExitKind::Crashed` is received from the driver — `ExecDriver`
          already performs `child.wait()` in Phase 1 and that is exactly
          how `ExitKind::Crashed` is produced. The `exit_code` field
          carries the process exit status (`None` for signal-only exits);
          `signal` carries the signal number cast to `u8` (`None` when
          absent); `stderr_tail` carries the last few lines of stderr
          captured by the driver's ring buffer.
        required:
        - data
        - kind
        properties:
          data:
            type: object
            description: |-
              Workload exited with a non-zero status or signal within the
              post-spawn settle window. Emitted by the `ExitObserver` when
              `ExitKind::Crashed` is received from the driver — `ExecDriver`
              already performs `child.wait()` in Phase 1 and that is exactly
              how `ExitKind::Crashed` is produced. The `exit_code` field
              carries the process exit status (`None` for signal-only exits);
              `signal` carries the signal number cast to `u8` (`None` when
              absent); `stderr_tail` carries the last few lines of stderr
              captured by the driver's ring buffer.
            properties:
              exit_code:
                type:
                - integer
                - 'null'
                format: int32
              signal:
                type:
                - integer
                - 'null'
                format: int32
                minimum: 0
              stderr_tail:
                type:
                - string
                - 'null'
          kind:
            type: string
            enum:
            - workload_crashed_immediately
      description: |-
        Structured reason for a lifecycle transition.

        Phase 1 variants per ADR-0032 §3 (additive going forward — `#[non_exhaustive]`).
        `#[serde(tag = "kind", content = "data", rename_all = "snake_case")]`
        gives a self-describing wire shape: `{"kind": "exec_binary_not_found",
        "data": {"path": "/usr/local/bin/payments"}}` for cause-class variants;
        `{"kind": "scheduling"}` for progress markers (serde elides the empty
        `data` for unit variants by default).

        | Variant | Class | Emitted by | Phase 1 emit? |
        |---|---|---|---|
        | `Scheduling` | progress | reconciler — placement decided, action emitted | yes |
        | `Starting` | progress | reconciler — driver invocation underway | yes |
        | `Started` | progress | driver(exec) — driver returned `Ok(handle)` | yes |
        | `BackoffPending { attempt }` | progress | reconciler — holding off restart | yes |
        | `Stopped { by }` | progress | reconciler — observed terminal stop | yes |
        | `ExecBinaryNotFound { path }` | cause | `ExecDriver` — `spawn(2)` ENOENT | yes |
        | `ExecPermissionDenied { path }` | cause | `ExecDriver` — `spawn(2)` EACCES | yes |
        | `ExecBinaryInvalid { path, kind }` | cause | `ExecDriver` — `spawn(2)` ENOEXEC / ELIBBAD | yes |
        | `CgroupSetupFailed { kind, source }` | cause | `ExecDriver` — cgroup mkdir / write failure | yes |
        | `DriverInternalError { detail }` | cause | `ExecDriver` — uncategorised driver failure | yes |
        | `RestartBudgetExhausted { attempts, last_cause_summary }` | cause | reconciler — restart budget hit | yes |
        | `Cancelled { by }` | cause | reconciler — operator stop intent observed | yes |
        | `NoCapacity { requested, free }` | cause | reconciler — scheduler returned `NoCapacity` | yes |
        | `OutOfMemory { peak_bytes, limit_bytes }` | cause | `ExecDriver` — cgroup OOM-killed | NO — Phase 2 |
        | `WorkloadCrashedImmediately { exit_code, signal, stderr_tail }` | cause | `ExecDriver` — post-spawn exit-code observation | yes |

        **Phase 2 emit-deferred variants**: `OutOfMemory` requires cgroup-events
        subscription not yet present in the Phase 1 `ExecDriver`; it is defined
        now for wire-shape forward-compatibility and will be emitted in Phase 2.
        `WorkloadCrashedImmediately` is emitted in Phase 1 — `ExecDriver` already
        performs `child.wait()` and produces `ExitKind::Crashed`; the
        `ExitObserver` maps that to this variant directly.

        **Cause-class payloads carry typed cause-specific data**, NOT a
        free-form `detail: String`. The previous state-class shape relied on
        `AllocStatusRow.detail: Option<String>` to encode the cause, which
        stringly-typed every renderer and forced re-parsing on every read.
        The cause-class refactor moves that data into the type system. The
        `detail` field on the row remains for verbatim driver text the
        payload does not capture (e.g. the raw `errno`-decorated message
        from `std::io::Error::Display`).
    TransitionRecord:
      type: object
      description: |-
        Lifecycle-transition record carried inside the snapshot's
        `last_transition` block per ADR-0033 §1 and on the streaming
        `SubmitEvent::LifecycleTransition` event per ADR-0032 §3.

        Both surfaces share the SAME `TransitionRecord` shape — the
        type-identity assertion in
        `tests/acceptance/transition_reason_type_identity.rs` (S-AS-02)
        pins this at compile time so byte-equality across surfaces is
        structural rather than discipline.

        `from` is `None` for the very first transition emitted for an
        allocation (there is no prior state); subsequent transitions carry
        the previous wire-state. `to` is always populated.

        `at` is the logical-timestamp string from `LogicalTimestamp::Display`
        (Phase 1: `(counter, writer)` rendered via the existing observation
        timestamp shape). The wire keeps it stringly-typed because the CLI
        renders it verbatim and never round-trips it through arithmetic; a
        future phase that needs structured wall-clock can split into
        `at_logical` + `at_wallclock` fields additively.
      required:
      - to
      - reason
      - source
      - at
      properties:
        at:
          type: string
          description: |-
            Logical-timestamp string for this transition. Stringly-typed on
            the wire — see struct-level docs.
        from:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AllocStateWire'
            description: |-
              Wire-state the allocation was in before this transition.
              `None` for the first transition emitted for an alloc id.
        reason:
          $ref: '#/components/schemas/TransitionReason'
          description: |-
            Structured cause for this transition. SAME enum as the streaming
            `SubmitEvent::LifecycleTransition.reason` — pinned by
            S-AS-02's compile-time witness.
        source:
          $ref: '#/components/schemas/TransitionSource'
          description: Who/what produced this row write.
        to:
          $ref: '#/components/schemas/AllocStateWire'
          description: Wire-state the allocation moved to.
    TransitionSource:
      oneOf:
      - type: object
        description: Reconciler emitted the action that produced this row.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - reconciler
      - type: object
        description: Driver (named) produced this row directly.
        required:
        - data
        - kind
        properties:
          data:
            $ref: '#/components/schemas/DriverType'
            description: Driver (named) produced this row directly.
          kind:
            type: string
            enum:
            - driver
      description: |-
        Source of a lifecycle transition — who/what produced the row write.

        Phase 1 has two variants:

        | Variant | When emitted |
        |---|---|
        | `Reconciler` | the `WorkloadLifecycle` reconciler converged a state and emitted an `Action::*` that the action shim materialised into an `AllocStatusRow` write |
        | `Driver(DriverType)` | the action shim observed a driver `start`/`stop`/`status` result and wrote the row directly (post-spawn settle, immediate failure, etc.) |

        The `Driver(DriverType)` carries the driver kind so a CLI rendering
        the snapshot can say `from driver=exec` without round-tripping
        through cluster-info to look up the active drivers. Phase 2+ may add
        more variants (operator action, gateway redirect, sidecar) — the
        enum is `#[non_exhaustive]` to make additions additive.

        Wire shape via `#[serde(tag = "kind", content = "data", rename_all =
        "snake_case")]` — `{"kind": "reconciler"}` for the unit variant,
        `{"kind": "driver", "data": "exec"}` for the typed variant
        (`DriverType` itself serialises as a kebab-case string per its own
        `#[serde(rename_all = "kebab-case")]`).
    WorkloadDescription:
      type: object
      description: |-
        Response for `GET /v1/jobs/{id}`. Carries the re-hydrated spec and
        the canonical spec digest per ADR-0014 and US-03 AC (amended by
        ADR-0020).

        `spec` is typed (`JobSpecInput`), never `serde_json::Value` — the
        CLI parses this response into a concrete type rather than a value
        bag. `spec_digest` equals the lowercase-hex SHA-256 of the
        rkyv-archived bytes pulled out of the `IntentStore` — i.e. the
        same value the original `POST /v1/jobs` returned for this `workload_id`.
      required:
      - spec
      - spec_digest
      properties:
        spec:
          $ref: '#/components/schemas/JobSpecInput'
        spec_digest:
          type: string
    WorkloadKind:
      type: string
      description: |-
        Three-way kind discriminator. Mirrors the variant tags of
        [`WorkloadSpec`] and [`WorkloadSpecInput`].

        `Default == Service` per ADR-0037 Amendment 2026-05-10 / ADR-0047 §1:
        before slice 02-04 the reconciler was kind-agnostic and emulated the
        Service shape (long-running, restart-budget-driven). Defaulting to
        `Service` preserves that behavior at every call site that has not
        yet been wired through to populate the kind explicitly.
      enum:
      - Service
      - Job
      - Schedule
tags:
- name: jobs
  description: Job lifecycle endpoints
- name: cluster
  description: Cluster status endpoints
- name: observation
  description: Observation-store read endpoints
