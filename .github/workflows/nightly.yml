# Overdrive nightly — full-workspace mutation testing, trend tracking.
#
# Scope: nightly soak; NOT gating PRs. Per-PR mutation testing is
# diff-scoped in ci.yml. The nightly job exists to catch baseline drift
# that a diff-scoped run cannot see (e.g. a test refactor that weakens
# assertions on code outside the current PR).
#
# Baseline lives under `mutants-baseline/main/` and is maintained by the
# platform team — this workflow compares the nightly run against it.
#
# References:
#   - .claude/rules/testing.md §Mutation testing (cargo-mutants) —
#     "Regression gate on direction, not just level."
#   - CI topology job I: `cargo xtask mutants --workspace` full corpus;
#     trend tracking.
#
# Behaviour:
#   - Drift > 2 percentage points below baseline → soft-fail (warn via
#     GitHub step summary; does NOT block main).
#   - Absolute kill rate < 60% (critical regression) → hard-fail, open
#     issue via gh-cli in a follow-up workflow.
#
# This job is NOT in the required-status-checks set for branch
# protection. It runs on schedule, writes a report, and annotates.

name: Nightly

on:
  schedule:
    # 03:13 UTC — off-peak for US/EU runner pools; the 13-minute offset
    # prevents piling up against the top-of-hour cron wave that other
    # projects tend to use.
    - cron: '13 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  mutants-workspace:
    name: cargo mutants (full workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h ceiling; full corpus takes as long as it takes
    steps:
      - uses: actions/checkout@v4

      - name: Install Lima
        uses: lima-vm/lima-actions/setup@v1

      - name: Cache Lima VM
        id: lima-cache
        uses: actions/cache@v4
        with:
          path: ~/.lima/overdrive
          key: lima-${{ hashFiles('infra/lima/overdrive-dev.yaml') }}-${{ runner.arch }}

      - name: Provision Lima VM (cache miss)
        if: steps.lima-cache.outputs.cache-hit != 'true'
        run: limactl start --timeout=30m --name=overdrive --tty=false infra/lima/overdrive-dev.yaml

      - name: Start cached Lima VM
        if: steps.lima-cache.outputs.cache-hit == 'true'
        run: limactl start --timeout=30m overdrive

      - name: cargo xtask mutants --workspace
        run: |
          limactl shell overdrive bash -lc \
            'sudo -E env "HOME=$HOME" "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
             cargo xtask mutants --workspace --features integration-tests'

      # Render the nightly trend table into the job summary from the
      # structured JSON produced by xtask — the same pattern the dst job
      # uses on failure. Non-blocking: a missing summary means xtask
      # failed earlier in the run (which already surfaced its own error).
      - name: Render trend summary
        if: always()
        run: |
          SUMMARY=target/xtask/mutants-summary.json
          if [ ! -f "$SUMMARY" ]; then
            echo "no mutants-summary.json — xtask did not produce a report"
            exit 0
          fi
          RATE=$(jq -r '.kill_rate_pct // "unknown"' "$SUMMARY")
          BASELINE=$(jq -r '.baseline_pct // "n/a"' "$SUMMARY")
          DRIFT=$(jq -r '.drift_pp // "n/a"' "$SUMMARY")
          TOTAL=$(jq -r '.total_mutants // 0' "$SUMMARY")
          CAUGHT=$(jq -r '.caught // 0' "$SUMMARY")
          MISSED=$(jq -r '.missed // 0' "$SUMMARY")
          UNVIABLE=$(jq -r '.unviable // 0' "$SUMMARY")
          STATUS=$(jq -r '.status // "unknown"' "$SUMMARY")
          {
            echo "## Nightly mutation testing"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Total mutations | $TOTAL |"
            echo "| Caught | $CAUGHT |"
            echo "| Missed | $MISSED |"
            echo "| Unviable | $UNVIABLE |"
            echo "| Kill rate | ${RATE}% |"
            echo "| Baseline | ${BASELINE}% |"
            echo "| Delta | ${DRIFT} pp |"
            echo "| Status | \`$STATUS\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload nightly mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-nightly-report
          path: |
            target/xtask/mutants-summary.json
            target/xtask/mutants.out/
          retention-days: 30
          if-no-files-found: warn

      - name: Stop Lima VM (release disk before cache save)
        if: always()
        run: limactl stop overdrive || true
