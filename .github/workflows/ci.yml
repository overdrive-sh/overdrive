# Overdrive CI — Phase 1 foundation + Phase 2.1 eBPF scaffolding.
#
# Scope: Tier 1 of the four-tier model in `.claude/rules/testing.md`,
# plus Tier 2 (BPF unit tests) added by #23 (Phase 2.1 aya-rs
# scaffolding) per ADR-0038. The single-kernel slice of Tier 3
# (`integration-test-vm-latest`) is deferred to #152 per
# upstream-issues.md §A3 (the LVH `images pull` step requires Docker,
# which the Lima dev VM does not provision; resolved by deferring the
# nested-VM harness wholesale). The full Tier 3 kernel matrix
# (integration-test vm against [5.10, 5.15, 6.1, 6.6, latest LTS,
# bpf-next]) and all of Tier 4 (veristat / xdp-perf / PREVAIL) remain
# deferred to #29 — wiring those against a no-op program would produce
# meaningless baselines.
#
# Required status checks for branch protection on `main` (configure on
# GitHub under Settings > Branches > Branch protection rules; operators
# mirror this list in the GitHub branch-protection UI after the first
# observed pass per `branching-strategy.md` §2):
#
#   - fmt-clippy
#   - test
#   - dst
#   - dst-lint
#   - yaml-free-cli
#   - mutants-diff
#   - bpf-build       (added in #23 — Phase 2.1)
#   - bpf-unit        (added in #23 — Phase 2.1)
#
# Rationale references:
#   - ADR-0006  (`cargo dst` + `dst-lint` are the required CI checks;
#                seed surfaced on failure; text + JSON artifacts uploaded)
#   - ADR-0005  (test distribution — drives `cargo test` targets)
#   - ADR-0003  (`package.metadata.overdrive.crate_class` labels; `dst-lint`
#                uses these to identify core crates)
#   - ADR-0019  (operator config is TOML; `yaml-free-cli` asserts no
#                `serde_yaml`/`serde_yml` in the `overdrive-cli` graph)
#   - brief.md §9  (enforcement tooling surface)
#   - .claude/rules/testing.md  (Tier 1 CI topology + mandatory mutation
#                                testing kill-rate gate)
#   - outcome-kpis.md  (K1: DST wall-clock < 60s; K2: lint gate 100%
#                       effective, 0 false positives; K3: seed reproduces
#                       bit-for-bit)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Kill stale runs on force-push. Every run of the critical path rebuilds
# the workspace; letting duplicates run is wasted runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Proptest default matches .claude/rules/testing.md — CI runs 1024 cases
  # per PR; nightly soaks higher elsewhere. Do not lower to dodge slow
  # generators — fix the generator.
  PROPTEST_CASES: "1024"
  # sccache + cargo incremental do not compose: incremental wins, sccache
  # silently misses every rustc invocation. Disable incremental at workflow
  # level so every sccache-using job (host + Lima) actually hits the cache.
  # See https://github.com/mozilla/sccache#known-caveats §"Rust caveats".
  CARGO_INCREMENTAL: "0"
  # NOTE: RUSTC_WRAPPER and SCCACHE_GHA_ENABLED are intentionally NOT set
  # here. They are exported by each job's sccache setup step only when
  # that step succeeds — so a GHA cache backend outage degrades the build
  # to direct rustc (slow but successful) instead of failing every job
  # before cargo runs. See docs/research/ci/sccache-gha-outage-hardening.md
  # and mozilla/sccache#1751 (SCCACHE_IGNORE_SERVER_IO_ERROR does NOT
  # cover backend startup probe failures).
  #
  # Lima-using jobs also need ACTIONS_CACHE_URL and ACTIONS_RUNTIME_TOKEN
  # forwarded into the guest — those are exported to $GITHUB_ENV by the
  # mozilla-actions/sccache-action step, then plumbed through `limactl
  # shell env ... bash -lc 'sudo -E env "X=$X" ...'` so sccache running
  # inside the VM can reach the GHA cache HTTP service.

jobs:
  # -------------------------------------------------------------------
  # Format + Clippy — fastest feedback. Lefthook pre-commit runs the
  # same checks locally (see lefthook.yml); CI is the authoritative gate.
  # -------------------------------------------------------------------
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-latest
    # Workspace clippy compiles overdrive-dataplane, whose build.rs
    # requires target/bpf/overdrive_bpf.o on Linux per
    # ADR-0038 §3.2. Pull the artifact from bpf-build rather than
    # rebuilding it here.
    needs: bpf-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Pinned via rust-toolchain.toml (stable, rustfmt + clippy).
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # mold is the linker per .cargo/config.toml; ubuntu-latest does
      # not ship it.
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends mold

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "phase-1-fmt-clippy"

      # MUST run AFTER Swatinem/rust-cache@v2: the cached tarball is the
      # entire workspace `target/` directory and its restore step
      # extracts over `target/bpf/`, clobbering anything
      # written there by an earlier `download-artifact` invocation.
      # Downloading after the cache restore guarantees the BPF object is
      # the file present when build.rs runs.
      - name: Download BPF object artifact
        uses: actions/download-artifact@v4
        with:
          name: bpf-object
          path: target/bpf/
          if-no-files-found: error

      # sccache setup is soft-fail: if the GHA cache backend is unreachable
      # (as happened on 2026-04-23), RUSTC_WRAPPER is left unset and cargo
      # runs rustc directly. Slower, but green. See
      # docs/research/ci/sccache-gha-outage-hardening.md §"Concrete Recommendation".
      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        # `--features integration-tests` (NOT `--all-features`) on the
        # host: `overdrive-bpf` declares `build-bpf-target` to gate its
        # `#![no_std] #![no_main]` kernel-side bin (see ADR-0038 §3.1 /
        # `cargo xtask bpf-build`). Enabling that feature on the host
        # target makes rustc reject the bin with "unwinding panics are
        # not supported without std". The dedicated `bpf-build` job
        # exercises the kernel-side compile path with the right
        # toolchain (`cargo +nightly build --target bpfel-unknown-none
        # -Z build-std=core`).
        run: cargo clippy --workspace --all-targets --features integration-tests -- -D warnings

  # -------------------------------------------------------------------
  # Unit + proptest — `cargo nextest run` for the main suite,
  # `cargo test --doc` for rustdoc examples (nextest does not run
  # doctests — https://nexte.st/book/usage.html#limitations).
  #
  # Default feature set only — slow / real-infra tests gated behind the
  # `integration-tests` feature run in the dedicated `integration` job
  # below. Splitting keeps this job under the K1 wall-clock budget and
  # lets the slow lane fail independently without blocking unit
  # feedback.
  #
  # Covers:
  #   - Newtype roundtrip proptest (K5, K6)
  #   - Trait non-substitutability compile-fail tests (trybuild)
  #   - Rustdoc examples per `.claude/rules/development.md` §Documentation
  #
  # Does NOT cover:
  #   - Snapshot roundtrip proptest (K6) — runs in `integration` job
  #   - DST harness — runs in `dst` job below
  # -------------------------------------------------------------------
  test:
    name: nextest + doctests
    runs-on: ubuntu-latest
    # Workspace nextest + `cargo test --doc --workspace` compile
    # overdrive-dataplane, whose build.rs requires the BPF artifact on
    # Linux per ADR-0038 §3.2.
    needs: bpf-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Lima
        uses: lima-vm/lima-actions/setup@v1

      - name: Cache Lima VM
        id: lima-cache
        uses: actions/cache@v4
        with:
          path: ~/.lima/overdrive
          key: lima-${{ hashFiles('infra/lima/overdrive-dev.yaml') }}-${{ runner.arch }}

      - name: Provision Lima VM (cache miss)
        if: steps.lima-cache.outputs.cache-hit != 'true'
        run: limactl start --timeout=30m --name=overdrive --tty=false infra/lima/overdrive-dev.yaml

      - name: Start cached Lima VM
        if: steps.lima-cache.outputs.cache-hit == 'true'
        run: limactl start --timeout=30m overdrive

      # BPF artifact is downloaded to the host and visible inside the
      # VM via the home-directory mount.
      - name: Download BPF object artifact
        uses: actions/download-artifact@v4
        with:
          name: bpf-object
          path: target/bpf/
          if-no-files-found: error

      # sccache setup is soft-fail (see fmt-clippy job for rationale). The
      # action exports ACTIONS_CACHE_URL + ACTIONS_RUNTIME_TOKEN to
      # $GITHUB_ENV; the limactl invocation below forwards them into the
      # guest so sccache (running inside the VM) can reach the GHA cache.
      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo nextest run --workspace (profile=ci)
        # PROPTEST_CASES is inherited from the workflow-level env:
        # declared at the top of this file (1024 per testing.md).
        # Profile config lives in `.config/nextest.toml`.
        # The Lima VM has cargo-nextest, mold, sccache, and the full
        # Rust toolchain pre-provisioned.
        run: |
          limactl shell overdrive env \
            "RUSTC_WRAPPER=${RUSTC_WRAPPER:-}" \
            "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED:-}" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:-}" \
            bash -lc 'sudo -E env "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
                      "RUSTC_WRAPPER=$RUSTC_WRAPPER" \
                      "SCCACHE_GHA_ENABLED=$SCCACHE_GHA_ENABLED" \
                      "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" \
                      "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" \
                      cargo nextest run --workspace --locked --profile ci'

      - name: cargo test --doc --workspace
        # Nextest does not execute doctests. Run them in a separate step
        # so rustdoc examples are still verified — per
        # `.claude/rules/development.md` §Documentation.
        run: |
          limactl shell overdrive env \
            "RUSTC_WRAPPER=${RUSTC_WRAPPER:-}" \
            "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED:-}" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:-}" \
            bash -lc 'sudo -E env "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
                      "RUSTC_WRAPPER=$RUSTC_WRAPPER" \
                      "SCCACHE_GHA_ENABLED=$SCCACHE_GHA_ENABLED" \
                      "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" \
                      "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" \
                      cargo test --doc --workspace --locked'

      - name: Show sccache stats
        if: always() && steps.sccache-setup.outcome == 'success'
        run: |
          limactl shell overdrive bash -lc 'sccache --show-stats' || true

      - name: Upload nextest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit
          path: target/nextest/ci/junit.xml
          retention-days: 14
          if-no-files-found: warn

      # Stop the VM so the cache-save post-step can read ~/.lima/overdrive/disk
      # without tripping `file changed as we read it`. `|| true` so a never-started
      # VM (early step failure) doesn't fail the post-cleanup.
      - name: Stop Lima VM (release disk before cache save)
        if: always()
        run: limactl stop overdrive || true

  # -------------------------------------------------------------------
  # Integration tests — slow / real-infra suites gated behind each
  # crate's `integration-tests` feature. Per `.claude/rules/testing.md`
  # §"Integration vs unit gating", any test that uses real infra,
  # touches the filesystem, or otherwise exceeds the unit-test budget
  # belongs here.
  #
  # Covers:
  #   - Snapshot roundtrip proptest (K6 — LocalStore export → bootstrap
  #     → export bit-identical) via overdrive-store-local
  #
  # Runs in parallel with the `test` job above so a slow integration
  # failure does not delay unit-suite feedback.
  # -------------------------------------------------------------------
  integration:
    name: nextest (integration-tests)
    runs-on: ubuntu-latest
    needs: bpf-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Lima
        uses: lima-vm/lima-actions/setup@v1

      - name: Cache Lima VM
        id: lima-cache
        uses: actions/cache@v4
        with:
          path: ~/.lima/overdrive
          key: lima-${{ hashFiles('infra/lima/overdrive-dev.yaml') }}-${{ runner.arch }}

      - name: Provision Lima VM (cache miss)
        if: steps.lima-cache.outputs.cache-hit != 'true'
        run: limactl start --timeout=30m --name=overdrive --tty=false infra/lima/overdrive-dev.yaml

      - name: Start cached Lima VM
        if: steps.lima-cache.outputs.cache-hit == 'true'
        run: limactl start --timeout=30m overdrive

      - name: Download BPF object artifact
        uses: actions/download-artifact@v4
        with:
          name: bpf-object
          path: target/bpf/
          if-no-files-found: error

      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo nextest run --workspace --features integration-tests (profile=ci)
        # Filter `binary(integration)` selects only the integration
        # entrypoint binaries. `--exclude overdrive-bpf` avoids a
        # cross-process artifact race (see bpf-unit job).
        run: |
          limactl shell overdrive env \
            "RUSTC_WRAPPER=${RUSTC_WRAPPER:-}" \
            "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED:-}" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:-}" \
            bash -lc 'sudo -E env "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
                      "RUSTC_WRAPPER=$RUSTC_WRAPPER" \
                      "SCCACHE_GHA_ENABLED=$SCCACHE_GHA_ENABLED" \
                      "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" \
                      "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" \
                      cargo nextest run --workspace --locked --profile ci \
                        --features integration-tests \
                        --exclude overdrive-bpf \
                        -E "binary(integration)"'

      - name: Show sccache stats
        if: always() && steps.sccache-setup.outcome == 'success'
        run: |
          limactl shell overdrive bash -lc 'sccache --show-stats' || true

      - name: Upload nextest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-integration
          path: target/nextest/ci/junit.xml
          retention-days: 14
          if-no-files-found: warn

      - name: Stop Lima VM (release disk before cache save)
        if: always()
        run: limactl stop overdrive || true

  # -------------------------------------------------------------------
  # DST — Tier 1 per testing.md. Invoked via the xtask wrapper per
  # ADR-0006 (single canonical path for local + CI; seed printed on
  # first line; failure block names invariant/seed/tick/host/reproduce;
  # text log + JSON summary uploaded as artifacts regardless of outcome).
  #
  # Wall-clock budget: 60s per K1. CI job timeout guards against runaway
  # runs that exceed the guardrail.
  # -------------------------------------------------------------------
  dst:
    name: cargo dst
    runs-on: ubuntu-latest
    # 10 min ceiling — K1 targets <60s; anything close to the ceiling
    # means the guardrail is broken and the build should fail loudly.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # mold is the linker per .cargo/config.toml; ubuntu-latest does
      # not ship it.
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends mold

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "phase-1-dst"

      # See fmt-clippy job above for rationale.
      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo dst
        # The xtask wrapper writes:
        #   target/dst/output.log   — full stdout/stderr
        #   target/dst/summary.json — structured summary
        # per ADR-0006 Decision § "Failure-artifact schema".
        run: cargo dst

      - name: Upload DST artifacts
        # Always upload — a killed or OOM-killed run still contains the
        # seed on the first line of dst-output.log. The JSON summary is
        # parseable by any CI dashboard without bespoke regex.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dst-output
          path: |
            target/dst/output.log
            target/dst/summary.json
          retention-days: 30
          if-no-files-found: warn

      - name: Annotate failure with reproduction command
        # On failure, extract the reproduction command from the JSON
        # summary and emit it as a GitHub annotation so the seed is
        # directly visible in the job summary UI — no artifact download
        # needed to get the first-line seed.
        if: failure()
        run: |
          if [ -f target/dst/summary.json ]; then
            SEED=$(jq -r '.seed // "unknown"' target/dst/summary.json)
            INV=$(jq -r '.invariant // "unknown"' target/dst/summary.json)
            TICK=$(jq -r '.tick // "unknown"' target/dst/summary.json)
            HOST=$(jq -r '.host // "unknown"' target/dst/summary.json)
            REPRO=$(jq -r '.reproduce // "cargo dst --seed <N>"' target/dst/summary.json)
            {
              echo "## DST failure"
              echo ""
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| Seed | \`$SEED\` |"
              echo "| Invariant | \`$INV\` |"
              echo "| Tick | \`$TICK\` |"
              echo "| Host | \`$HOST\` |"
              echo ""
              echo "Reproduce locally:"
              echo ""
              echo '```'
              echo "$REPRO"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=DST failed::seed=$SEED invariant=$INV tick=$TICK host=$HOST — reproduce: $REPRO"
          else
            echo "::error title=DST failed::no dst-summary.json produced; check dst-output.log artifact for seed"
          fi

  # -------------------------------------------------------------------
  # DST lint — banned-API scan per ADR-0003 + ADR-0006.
  #
  # Scans only crates with `package.metadata.overdrive.crate_class =
  # "core"`. Blocks PRs that introduce Instant::now(), rand::random(),
  # tokio::net::*, etc. in core crates.
  #
  # K2: 100% of smuggling attempts blocked; 0% false positives on
  # wiring crates. A false positive here trains engineers to bypass
  # the gate — treat one as a priority bug.
  # -------------------------------------------------------------------
  dst-lint:
    name: cargo xtask dst-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # mold is the linker per .cargo/config.toml; ubuntu-latest does
      # not ship it.
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends mold

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "phase-1-dst-lint"

      # See fmt-clippy job above for rationale.
      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo xtask dst-lint
        run: cargo xtask dst-lint

  # -------------------------------------------------------------------
  # YAML-free CLI — ADR-0019 dependency-graph gate.
  #
  # Asserts no `serde_yaml` / `serde_yml` appears in the `overdrive-cli`
  # resolved non-dev dependency graph. ADR-0019 supersedes ADR-0010 §R2
  # and mandates TOML as the on-disk format for `~/.overdrive/config`;
  # a YAML backend appearing — directly or transitively — would silently
  # reintroduce the archived-dependency posture this ADR closed.
  # Dev-deps are excluded so test-only YAML (if any) does not trip the
  # gate.
  # -------------------------------------------------------------------
  yaml-free-cli:
    name: cargo xtask yaml-free-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # mold is the linker per .cargo/config.toml; ubuntu-latest does
      # not ship it.
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends mold

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "phase-1-yaml-free-cli"

      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo xtask yaml-free-cli
        run: cargo xtask yaml-free-cli

  # -------------------------------------------------------------------
  # Mutation testing — diff-scoped per PR.
  #
  # Delegates to `cargo xtask mutants --diff origin/main`, the canonical
  # entry point per .claude/rules/testing.md §CI topology. The xtask
  # wrapper owns:
  #   - producing the diff file (`--in-diff` takes a file path, not a
  #     git ref — https://mutants.rs/in-diff.html)
  #   - invoking cargo-mutants
  #   - parsing outcomes.json (the `summary` field, not `outcome`)
  #   - enforcing the ≥80% kill-rate gate
  #   - writing target/xtask/mutants-summary.json for the failure
  #     annotation below (same shape idea as dst-summary.json)
  #
  # Excludes unsafe blocks, aya-rs eBPF programs, generated code, and
  # async scheduling logic per testing.md "What it's NOT for" — exclusion
  # paths live in .cargo/mutants.toml.
  # -------------------------------------------------------------------
  mutants-diff:
    name: cargo mutants (diff)
    runs-on: ubuntu-latest
    # Only run on PRs — diff-scoping has nothing meaningful to do on a
    # push to main (the diff is the merge commit itself).
    if: github.event_name == 'pull_request'
    timeout-minutes: 45
    needs: bpf-build
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch history so `git diff origin/main` has a base to diff
          # against. Shallow clone + origin/main not fetched is the
          # canonical mutants-diff misconfiguration.
          fetch-depth: 0

      - name: Install Lima
        uses: lima-vm/lima-actions/setup@v1

      - name: Cache Lima VM
        id: lima-cache
        uses: actions/cache@v4
        with:
          path: ~/.lima/overdrive
          key: lima-${{ hashFiles('infra/lima/overdrive-dev.yaml') }}-${{ runner.arch }}

      - name: Provision Lima VM (cache miss)
        if: steps.lima-cache.outputs.cache-hit != 'true'
        run: limactl start --timeout=30m --name=overdrive --tty=false infra/lima/overdrive-dev.yaml

      - name: Start cached Lima VM
        if: steps.lima-cache.outputs.cache-hit == 'true'
        run: limactl start --timeout=30m overdrive

      - name: Download BPF object artifact
        uses: actions/download-artifact@v4
        with:
          name: bpf-object
          path: target/bpf/
          if-no-files-found: error

      - name: Ensure base ref available
        run: git fetch origin main --depth=1 || true

      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo xtask mutants --diff origin/main
        # The Lima VM has cargo-mutants, cargo-nextest, and sccache
        # pre-installed. sccache pays for itself many times over here:
        # cargo-mutants does N full rebuilds per mutation, all of which
        # hit the GHA cache after the first.
        run: |
          limactl shell overdrive env \
            "RUSTC_WRAPPER=${RUSTC_WRAPPER:-}" \
            "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED:-}" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:-}" \
            bash -lc 'sudo -E env "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
                      "RUSTC_WRAPPER=$RUSTC_WRAPPER" \
                      "SCCACHE_GHA_ENABLED=$SCCACHE_GHA_ENABLED" \
                      "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" \
                      "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" \
                      cargo xtask mutants --diff origin/main --features integration-tests'

      - name: Show sccache stats
        if: always() && steps.sccache-setup.outcome == 'success'
        run: |
          limactl shell overdrive bash -lc 'sccache --show-stats' || true

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-diff-report
          path: |
            target/xtask/mutants-summary.json
            target/xtask/mutants.out/
            target/xtask/mutants.diff
          retention-days: 14
          if-no-files-found: warn

      - name: Annotate failure with kill-rate detail
        # Same pattern as the dst job — read the structured summary and
        # render a step-summary table so the failure reason is visible
        # in the GitHub UI without downloading the artifact.
        if: failure()
        run: |
          SUMMARY=target/xtask/mutants-summary.json
          if [ -f "$SUMMARY" ]; then
            STATUS=$(jq -r '.status // "unknown"' "$SUMMARY")
            RATE=$(jq -r '.kill_rate_pct // "unknown"' "$SUMMARY")
            CAUGHT=$(jq -r '.caught // 0' "$SUMMARY")
            MISSED=$(jq -r '.missed // 0' "$SUMMARY")
            UNVIABLE=$(jq -r '.unviable // 0' "$SUMMARY")
            REASON=$(jq -r '.reason // "see target/xtask/mutants.out/missed.txt"' "$SUMMARY")
            {
              echo "## mutants-diff failure"
              echo ""
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| Status | \`$STATUS\` |"
              echo "| Kill rate | ${RATE}% |"
              echo "| Caught | $CAUGHT |"
              echo "| Missed | $MISSED |"
              echo "| Unviable | $UNVIABLE |"
              echo "| Reason | $REASON |"
              echo ""
              echo "Reproduce locally:"
              echo ""
              echo '```'
              echo "cargo xtask mutants --diff origin/main --features integration-tests"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=mutants failed::no mutants-summary.json produced; check artifact"
          fi

      - name: Stop Lima VM (release disk before cache save)
        if: always()
        run: limactl stop overdrive || true

  # -------------------------------------------------------------------
  # bpf-build — Phase 2.1 kernel-side ELF compilation.
  #
  # Per devops/ci-cd-pipeline.md §2.1 + ADR-0038 §3, §4. Runs
  # `cargo xtask bpf-build` to produce
  # `target/bpf/overdrive_bpf.o`, the artifact every
  # downstream BPF test job consumes.
  #
  # Provisions bpf-linker via `cargo install --locked bpf-linker`
  # (--locked is mandatory per ADR-0038 §4 for reproducibility — same
  # primitive Lima uses, no CI-specific install path).
  #
  # `rust-src` component is required because the bpf-target build runs
  # `cargo build ... -Z build-std=core` which rebuilds `core` from
  # source.
  # -------------------------------------------------------------------
  bpf-build:
    name: bpf-build
    runs-on: ubuntu-latest
    # Lima provisioning + nightly `-Z build-std=core` rebuild is meaningfully
    # slower than the previous host-toolchain shape. Sized for a cold cache
    # miss; warm cache runs finish well under this budget.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Lima
        uses: lima-vm/lima-actions/setup@v1

      - name: Cache Lima VM
        id: lima-cache
        uses: actions/cache@v4
        with:
          path: ~/.lima/overdrive
          key: lima-${{ hashFiles('infra/lima/overdrive-dev.yaml') }}-${{ runner.arch }}

      - name: Provision Lima VM (cache miss)
        if: steps.lima-cache.outputs.cache-hit != 'true'
        run: limactl start --timeout=30m --name=overdrive --tty=false infra/lima/overdrive-dev.yaml

      - name: Start cached Lima VM
        if: steps.lima-cache.outputs.cache-hit == 'true'
        run: limactl start --timeout=30m overdrive

      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo xtask bpf-clippy
        # Lint the kernel-side bin under `+nightly --target
        # bpfel-unknown-none -Z build-std=core --features
        # build-bpf-target`. The host workspace clippy job cannot
        # cover this bin: it is `#![no_std] #![no_main]` and rustc
        # rejects it on the host triple.
        #
        # The Lima VM has nightly + rust-src + bpf-linker + clippy +
        # sccache pre-provisioned (see infra/lima/overdrive-dev.yaml).
        # Note: -Z build-std=core rebuilds `core` per nightly hash;
        # cache hits are scoped to a stable nightly toolchain.
        run: |
          limactl shell overdrive env \
            "RUSTC_WRAPPER=${RUSTC_WRAPPER:-}" \
            "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED:-}" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:-}" \
            bash -lc 'sudo -E env "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
                      "RUSTC_WRAPPER=$RUSTC_WRAPPER" \
                      "SCCACHE_GHA_ENABLED=$SCCACHE_GHA_ENABLED" \
                      "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" \
                      "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" \
                      cargo xtask bpf-clippy'

      - name: cargo xtask bpf-build
        # The xtask wrapper invokes `cargo build --release --target
        # bpfel-unknown-none -Z build-std=core` against
        # crates/overdrive-bpf and copies the resulting ELF to
        # target/bpf/overdrive_bpf.o (the stable path
        # mandated by ADR-0038 §3). The destination is on the
        # virtiofs-mounted workspace, so the artifact is visible on
        # the host for the upload step below.
        run: |
          limactl shell overdrive env \
            "RUSTC_WRAPPER=${RUSTC_WRAPPER:-}" \
            "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED:-}" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:-}" \
            bash -lc 'sudo -E env "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
                      "RUSTC_WRAPPER=$RUSTC_WRAPPER" \
                      "SCCACHE_GHA_ENABLED=$SCCACHE_GHA_ENABLED" \
                      "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" \
                      "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" \
                      cargo xtask bpf-build'

      - name: Show sccache stats
        if: always() && steps.sccache-setup.outcome == 'success'
        run: |
          limactl shell overdrive bash -lc 'sccache --show-stats' || true

      - name: Upload BPF object artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpf-object
          path: target/bpf/overdrive_bpf.o
          retention-days: 14
          # if-no-files-found: error is load-bearing — without it a
          # missing artifact silently no-ops and the downstream job
          # fails with a confusing surface.
          if-no-files-found: error

      - name: Stop Lima VM (release disk before cache save)
        if: always()
        run: limactl stop overdrive || true

  # -------------------------------------------------------------------
  # bpf-unit — Phase 2.1 Tier 2 BPF unit tests.
  #
  # Per devops/ci-cd-pipeline.md §2.2 + .claude/rules/testing.md §Tier 2.
  # Runs `cargo xtask bpf-unit` (which invokes `cargo nextest run -p
  # overdrive-bpf --features integration-tests --test '*'`) against the
  # PKTGEN/SETUP/CHECK triptych. Asserts via `BPF_PROG_TEST_RUN` that
  # the no-op xdp_pass program returns XDP_PASS and the LruHashMap
  # counter increments 0 → 1.
  #
  # Capability requirement (per upstream-issues.md §A2): Ubuntu 22.04+
  # ships `kernel.unprivileged_bpf_disabled = 2`, which makes
  # `BPF_PROG_LOAD` (called before `BPF_PROG_TEST_RUN`) fail with EPERM
  # for unprivileged users. The cargo xtask bpf-unit step runs under
  # `sudo` to provide CAP_BPF. Locally, `cargo xtask lima run -- cargo
  # xtask bpf-unit` does the same via the canonical Lima wrapper.
  # Earlier docs at ci-cd-pipeline.md §2.2 claimed otherwise; see
  # upstream-issues.md §A2 for the empirical correction.
  # -------------------------------------------------------------------
  bpf-unit:
    name: bpf-unit
    runs-on: ubuntu-latest
    needs: bpf-build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Lima
        uses: lima-vm/lima-actions/setup@v1

      - name: Cache Lima VM
        id: lima-cache
        uses: actions/cache@v4
        with:
          path: ~/.lima/overdrive
          key: lima-${{ hashFiles('infra/lima/overdrive-dev.yaml') }}-${{ runner.arch }}

      - name: Provision Lima VM (cache miss)
        if: steps.lima-cache.outputs.cache-hit != 'true'
        run: limactl start --timeout=30m --name=overdrive --tty=false infra/lima/overdrive-dev.yaml

      - name: Start cached Lima VM
        if: steps.lima-cache.outputs.cache-hit == 'true'
        run: limactl start --timeout=30m overdrive

      - name: Download BPF object artifact
        uses: actions/download-artifact@v4
        with:
          name: bpf-object
          path: target/bpf/
          if-no-files-found: error

      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo xtask bpf-unit
        # CAP_BPF is required; the Lima VM's `xtask lima run` wrapper
        # provides root via `sudo -E`. The xtask `bpf_unit()` function
        # calls `ensure_in_lima()` which detects the VM and proceeds
        # directly.
        run: |
          limactl shell overdrive env \
            "RUSTC_WRAPPER=${RUSTC_WRAPPER:-}" \
            "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED:-}" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:-}" \
            bash -lc 'sudo -E env "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
                      "RUSTC_WRAPPER=$RUSTC_WRAPPER" \
                      "SCCACHE_GHA_ENABLED=$SCCACHE_GHA_ENABLED" \
                      "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" \
                      "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" \
                      cargo xtask bpf-unit'

      - name: Show sccache stats
        if: always() && steps.sccache-setup.outcome == 'success'
        run: |
          limactl shell overdrive bash -lc 'sccache --show-stats' || true

      - name: Upload nextest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bpf-unit-junit
          path: target/nextest/ci/junit.xml
          retention-days: 14
          if-no-files-found: warn

      - name: Stop Lima VM (release disk before cache save)
        if: always()
        run: limactl stop overdrive || true

  # -------------------------------------------------------------------
  # Job E (Tier 4) — verifier-budget regression gate
  # -------------------------------------------------------------------
  # `cargo verifier-regress` (alias resolves to
  # `cargo run -p overdrive-dataplane --bin verifier_regress`) loads
  # the compiled BPF object via aya, reads each program's
  # `ProgramInfo::verified_instruction_count` (kernel ≥5.16
  # `bpf_prog_info.verified_insns`), and fails the PR if any program
  # exceeds its baseline at `perf-baseline/main/verifier-budget/` by
  # >5%, or approaches the per-program 1M CAP_BPF complexity ceiling
  # by >10%.
  #
  # # Why aya, not veristat
  #
  # libbpf 1.0+ removed the legacy `SEC("maps")` parser; aya 0.13.x
  # still emits maps in that legacy section, so libbpf-linked tools
  # (veristat, bpftool) refuse to load aya ELFs. The signal we want
  # — `bpf_prog_info.verified_insns` — is the same field veristat
  # surfaces as `TOTAL_INSNS`; reading it via aya bypasses libbpf
  # entirely. Tracking aya issue #913.
  #
  # Pure-Rust gate logic self-tested by `cargo nextest run -p
  # overdrive-dataplane` (unit tests in
  # `crates/overdrive-dataplane/src/verifier_budget.rs`); this job
  # runs the gate against the real BPF object. See
  # `.claude/rules/testing.md` § "Tier 4 — Verifier and Performance
  # Gates".
  verifier-regress:
    name: cargo verifier-regress
    runs-on: ubuntu-latest
    needs: bpf-build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Lima
        uses: lima-vm/lima-actions/setup@v1

      - name: Cache Lima VM
        id: lima-cache
        uses: actions/cache@v4
        with:
          path: ~/.lima/overdrive
          key: lima-${{ hashFiles('infra/lima/overdrive-dev.yaml') }}-${{ runner.arch }}

      - name: Provision Lima VM (cache miss)
        if: steps.lima-cache.outputs.cache-hit != 'true'
        run: limactl start --timeout=30m --name=overdrive --tty=false infra/lima/overdrive-dev.yaml

      - name: Start cached Lima VM
        if: steps.lima-cache.outputs.cache-hit == 'true'
        run: limactl start --timeout=30m overdrive

      - name: Download BPF object artifact
        uses: actions/download-artifact@v4
        with:
          name: bpf-object
          path: target/bpf/
          if-no-files-found: error

      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      - name: cargo verifier-regress
        run: |
          limactl shell overdrive env \
            "RUSTC_WRAPPER=${RUSTC_WRAPPER:-}" \
            "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED:-}" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:-}" \
            bash -lc 'sudo -E env "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
                      "RUSTC_WRAPPER=$RUSTC_WRAPPER" \
                      "SCCACHE_GHA_ENABLED=$SCCACHE_GHA_ENABLED" \
                      "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" \
                      "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" \
                      cargo run -p overdrive-dataplane --bin verifier_regress'

      - name: Show sccache stats
        if: always() && steps.sccache-setup.outcome == 'success'
        run: |
          limactl shell overdrive bash -lc 'sccache --show-stats' || true

      - name: Stop Lima VM (release disk before cache save)
        if: always()
        run: limactl stop overdrive || true

  # -------------------------------------------------------------------
  # Job E (Tier 4) — XDP throughput / mean-latency regression gate
  # -------------------------------------------------------------------
  # `cargo xdp-perf` (binary at
  # `crates/overdrive-dataplane/bin/xdp_perf.rs`) loads each
  # XDP program named in `perf-baseline/main/xdp-perf/*.txt` via
  # aya, runs each in-kernel via `BPF_PROG_TEST_RUN` with
  # `repeat=N`, then reads `bpf_prog_info.run_time_ns` / `run_cnt`
  # (gated on `aya::sys::enable_stats(Stats::RunTime)`, kernel ≥5.8)
  # to compute pps + mean_ns. Fails the PR if pps regresses by >5%
  # or mean_ns rises by >10% vs the recorded baseline. Pure gate
  # logic self-tested via `cargo nextest run -p overdrive-dataplane
  # --lib -E 'test(xdp_perf_gate)'`. See
  # `.claude/rules/testing.md` § "Tier 4 — Verifier and Performance
  # Gates".
  xdp-perf:
    name: cargo xdp-perf
    runs-on: ubuntu-latest
    needs: bpf-build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Lima
        uses: lima-vm/lima-actions/setup@v1

      - name: Cache Lima VM
        id: lima-cache
        uses: actions/cache@v4
        with:
          path: ~/.lima/overdrive
          key: lima-${{ hashFiles('infra/lima/overdrive-dev.yaml') }}-${{ runner.arch }}

      - name: Provision Lima VM (cache miss)
        if: steps.lima-cache.outputs.cache-hit != 'true'
        run: limactl start --timeout=30m --name=overdrive --tty=false infra/lima/overdrive-dev.yaml

      - name: Start cached Lima VM
        if: steps.lima-cache.outputs.cache-hit == 'true'
        run: limactl start --timeout=30m overdrive

      - name: Download BPF object artifact
        uses: actions/download-artifact@v4
        with:
          name: bpf-object
          path: target/bpf/
          if-no-files-found: error

      - id: sccache-setup
        name: Setup sccache (soft-fail on cache backend outage)
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache when setup succeeded
        if: steps.sccache-setup.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Warn when sccache unavailable
        if: steps.sccache-setup.outcome != 'success'
        run: echo "::warning::sccache setup failed; building without compiler cache. Expected during GHA cache backend outages."

      # The Lima VM has the full toolchain. Needs `CAP_SYS_ADMIN` for
      # `enable_stats(RunTime)` — the default `sudo -E` wrapper inside
      # the VM provides it.
      - name: cargo xdp-perf
        run: |
          limactl shell overdrive env \
            "RUSTC_WRAPPER=${RUSTC_WRAPPER:-}" \
            "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED:-}" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:-}" \
            bash -lc 'sudo -E env "PATH=$PATH" "CARGO_TARGET_DIR=$CARGO_TARGET_DIR" \
                      "RUSTC_WRAPPER=$RUSTC_WRAPPER" \
                      "SCCACHE_GHA_ENABLED=$SCCACHE_GHA_ENABLED" \
                      "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" \
                      "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" \
                      cargo xdp-perf'

      - name: Show sccache stats
        if: always() && steps.sccache-setup.outcome == 'success'
        run: |
          limactl shell overdrive bash -lc 'sccache --show-stats' || true

      - name: Stop Lima VM (release disk before cache save)
        if: always()
        run: limactl stop overdrive || true

