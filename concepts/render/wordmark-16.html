<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&display=block" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 115px; height: 22px; overflow: hidden; background: transparent; }
  body { display: flex; align-items: center; }
  .brand {
    display: inline-flex;
    align-items: center;
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: #f5f5f7;
    white-space: nowrap;
  }
  .cur {
    display: inline-block;
    width: 8px;
    height: 15px;
    background: #ff5c28;
    margin-left: 5px;
  }
</style>
</head>
<body>
  <div class="brand">Overdrive<span class="cur"></span></div>
</body>
</html>
