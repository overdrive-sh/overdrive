# cargo-mutants configuration — project-level exclusions.
#
# Source of truth for what IS and IS NOT mutation-tested in this repo is
# `.claude/rules/testing.md` §Mutation testing (cargo-mutants).
# This file mechanises the "What it's NOT for" list from that section so
# the per-PR and nightly mutants runs do not produce false "caught"
# signals from code paths we deliberately exclude.
#
# Version assumption: cargo-mutants 25.x (the version
# taiki-e/install-action@v2 resolves at the time of writing; see
# .github/workflows/ci.yml and nightly.yml, which install via
# `tool: cargo-mutants` without a pin — this file uses only stable keys
# documented on https://mutants.rs/). If a future upgrade renames a key
# the CI will fail loudly rather than silently drop an exclusion; bump
# this comment and adjust the key at that point.
#
# Keys used (all documented at https://mutants.rs/):
#   - exclude_globs:         path-pattern exclusion (preferred)
#   - examine_globs:         positive-scope allowlist (unused here; we
#                            exclude, not allowlist)
#   - exclude_re:            regex over the mutation description
#   - additional_cargo_args: passed through to `cargo test` per mutation
#
# Rules (mirror .claude/rules/testing.md):
#
# 1. `unsafe` blocks and `aya-rs` eBPF programs. The kernel verifier can
#    reject mutated code and cargo-mutants would count that rejection as
#    "caught" — a false positive. Tier 2 (BPF_PROG_TEST_RUN) and Tier 3
#    (real-kernel integration, kernel matrix) cover these. The BPF crate
#    doesn't exist yet (Phase 2+); pre-list the exclusion so it is in
#    place the day that crate lands.
#
# 2. Async scheduling logic. Mutations to `select!` arms or future
#    polling interact poorly with scheduling and timing; DST (Tier 1)
#    is the right tool. We exclude by description regex because there
#    is no single path that cleanly identifies "the async scheduler."
#
# 3. Generated code. `#[derive(...)]` expansions, `build.rs` output, and
#    proc-macro expansions are not hand-written — mutating them gates
#    on library behaviour that isn't ours. We exclude generated output
#    paths; derives inside source files are left to cargo-mutants'
#    existing heuristics.
#
# 4. Performance assertions. Mutations that remove an optimisation may
#    still pass correctness tests. Performance regressions are Tier 4's
#    job (veristat, xdp-bench) — not mutation testing's.
#
# 5. Tests themselves. cargo-mutants already defaults to excluding
#    `#[test]` / `#[cfg(test)]` modules, but we make it explicit via
#    the excluded path pattern for clarity.
#
# 6. `xtask` — developer tooling, not platform code. Correctness of
#    `cargo xtask ci` / `dst` / `dst-lint` / `mcp setup` etc. is
#    exercised end-to-end by the CI workflow itself and by each
#    subcommand's acceptance tests; per-line mutation coverage adds
#    no safety signal against platform regressions and spends minutes
#    of CI time on code that will never run in production.
#
# 7. `overdrive-sim` — DST harness + invariant catalogue. Per
#    `.claude/rules/testing.md` § Mutation testing → "What it's NOT
#    for": "`cargo dst` / Tier 3 integration. `cargo-mutants` reruns
#    the unit suite per mutation under `--test-tool=nextest`; DST
#    and real-kernel tests are too slow for the per-mutation budget
#    and are excluded from the mutants run." The
#    `overdrive-sim/src/{adapters,invariants}` directories carry
#    every Tier 1 (DST) sim adapter and invariant evaluator —
#    exercised exclusively by `cargo dst` (the `dst` subprocess
#    harness), never by `cargo nextest run`. cargo-mutants would
#    flag every mutation in these files as missed because no nextest
#    test covers them; that miss is a structural artefact of the
#    test-runner geometry, not a real assertion gap. The
#    QUALITY_GATE wave's mutation report (2026-05-08) flagged 40 such
#    misses out of 104 total — collapsing the raw kill rate signal
#    to 59.8% even though every Tier 1 mutation is structurally
#    protected by `cargo xtask dst`. Excluding the sim adapter +
#    invariant directories cleans this up.
#
#    Note: this excludes the DST-only paths, NOT the entire
#    `overdrive-sim` crate — the `overdrive-sim/src/bin/dst.rs`
#    binary entry point and any future non-Tier-1 surface remain in
#    scope. Slim glob targets `adapters/` and `invariants/` only.

# ---------------------------------------------------------------------------
# Excluded paths
# ---------------------------------------------------------------------------
exclude_globs = [
    # Rule 1 — aya-rs eBPF programs (pre-listed for Phase 2+; will be the
    # canonical path once the crate is introduced).
    "crates/overdrive-bpf/**",
    "crates/*-bpf/**",

    # Rule 3 — generated code.
    "**/build.rs",
    "**/target/**",
    "**/generated/**",

    # Rule 5 — tests themselves. cargo-mutants already avoids mutating
    # test code by default; listing them explicitly is belt-and-braces so
    # a future refactor of `#[cfg(test)]` boundaries does not surprise us.
    "**/tests/**",
    "**/benches/**",

    # Rule 6 — xtask developer tooling. Not platform code; correctness
    # surfaced by the CI workflow and subcommand acceptance tests.
    "xtask/**",

    # Rule 7 — DST sim adapters + invariants. Tier 1 protection lives in
    # `cargo xtask dst`, not nextest; cargo-mutants' nextest scope cannot
    # reach these paths. See header comment for full rationale + the
    # QUALITY_GATE wave's mutation-report citation.
    "crates/overdrive-sim/src/adapters/**",
    "crates/overdrive-sim/src/invariants/**",
]

# ---------------------------------------------------------------------------
# Excluded mutation patterns (by description regex)
# ---------------------------------------------------------------------------
#
# cargo-mutants emits a human-readable description for each mutation
# ("replace `<` with `<=`", "replace function body with Default::default()").
# `exclude_re` filters on that description. We use it narrowly — over-
# matching here silently erodes coverage.
exclude_re = [
    # Rule 1 — unsafe blocks. Match mutations whose site is inside an
    # `unsafe` block. cargo-mutants prefixes these with "unsafe" in the
    # description. If that phrasing changes across versions, update here.
    "unsafe",

    # Rule 2 — async scheduling. Match `select!` arms and future-polling
    # patterns. These are concurrency bugs, which DST catches.
    "select!",
    "poll_next",
    "poll_ready",

    # Semantically-equivalent mutant on `NoopHeartbeat::hydrate`. The
    # body is `Ok(())` and the mutation is `Ok(Default::default())`;
    # since `<() as Default>::default() == ()`, both expressions
    # compile to byte-identical behaviour — no test can distinguish
    # them. Classic equivalent-mutant case: skip rather than write a
    # tautological test.
    "for NoopHeartbeat>::hydrate",

    # Semantically-equivalent mutant on the paired tuple compare in
    # `evaluate_reconciler_is_pure`: `actions_a == actions_b &&
    # next_view_a == next_view_b` → `... || ...`. The right-hand
    # comparison operates on `AnyReconcilerView`, which in Phase 1
    # has only the `Unit` variant — `next_view_a == next_view_b` is
    # vacuously true for every reconciler, so `&&` and `||` collapse
    # to "actions_a == actions_b" equivalently. The mutation is only
    # distinguishable under a reconciler with a stateful view whose
    # value actually diverges between twin invocations; that shape
    # lands in Phase 2+ when the first reconciler with a non-unit
    # `View` is written. The `&&` is deliberate defensive code for
    # that future, not dead — the per-crate review on the Phase 2+
    # reconciler PR will re-examine this exclusion at that point.
    "replace && with \\|\\| in evaluate_reconciler_is_pure",

    # HTTP-stream consumers (`consume_stream`, `consume_stream_job`)
    # and the thin CLI dispatcher (`run`) — exercised by integration
    # tests behind `integration-tests` feature gate (real in-process
    # TLS server + reqwest). Not reachable from the default nextest
    # lane, so every mutation in these functions shows as MISSED
    # during `--diff` runs. The per-function `// mutants::skip`
    # comments in the source remain as documentation of which arms
    # have dedicated integration coverage; these regexes are the
    # actual suppression mechanism (cargo-mutants' comment-based
    # skip applies at function granularity, which matches here).
    "in consume_stream$",
    "in consume_stream_job$",
    "replace run -> Result<\\(\\)> with Ok",

    # Running-gate release in `dispatch_single` — the `if state ==
    # AllocState::Running` conditional is exercised by the
    # `exit_observer_running_gate` integration test (behind
    # `integration-tests` feature gate). `dispatch_single` is too
    # large to skip wholesale; this regex targets the specific
    # operator-flip mutation.
    "replace == with != in dispatch_single",

    # `VersionedEnvelope` trait default impls — semantically
    # unreachable from production code paths. Every production
    # `VersionedEnvelope` impl (`JobEnvelope`,
    # `AllocStatusRowEnvelope`, `NodeHealthRowEnvelope`,
    # `ServiceHydrationResultRowEnvelope`,
    # `ServiceBackendRowEnvelope`) overrides
    # `discriminant_offset_from_end()`, `known_discriminants()`, and
    # `type_name()` with their empirically-pinned values; the
    # trait-level default returns (`None`, `&[]`, `"<unknown>"`)
    # are observable only from an envelope that does NOT override
    # them. No such envelope exists in production code. The
    # per-envelope overrides ARE mutation-tested by the
    # `*_unknown_version_probe_surfaces` tests in
    # `crates/overdrive-core/tests/schema_evolution/`. cargo-mutants
    # cannot tell the difference between a callable-but-overridden
    # default and a dead-code default, so we exclude the three
    # defaults explicitly. The source-level `// mutants: skip`
    # comments on each default in
    # `crates/overdrive-core/src/codec/envelope.rs` carry the same
    # rationale as load-bearing documentation for future readers.
    # Trait-default impls — cargo-mutants emits descriptions of the
    # shape `replace VersionedEnvelope::<method> -> <type> with <body>`
    # (no `<impl ...>` prefix because these are trait-level defaults,
    # not impl bodies). The per-envelope overrides emit a different
    # shape: `replace <impl VersionedEnvelope for FooEnvelope>::<method>
    # -> <type> with <body>`. We exclude the trait-level shape only.
    "replace VersionedEnvelope::discriminant_offset_from_end",
    "replace VersionedEnvelope::known_discriminants",
    "replace VersionedEnvelope::type_name",

    # `<impl VersionedEnvelope for ...>::known_discriminants -> &'static [u8]
    # with Vec::leak(vec![0])` — equivalent mutant. Every production
    # envelope returns `&[0]` (V1-only state). cargo-mutants
    # synthesises `Vec::leak(vec![0])` as a "replacement" body, but
    # `&[0u8]` and `Vec::leak(vec![0u8])` produce byte-equivalent
    # slices — the only observable difference is allocator vs static,
    # which no test can detect because the slice contents are
    # identical. When a future `V2` lands, the production
    # `known_discriminants()` becomes `&[0, 1]` and this exclusion
    # naturally narrows to `vec![0]` vs `&[0, 1]` (which IS
    # observable — the mutant excludes tag 1). The exclusion only
    # masks the equivalent-mutant case while V1 is the only variant.
    "::known_discriminants -> &'static\\[u8\\] with Vec::leak\\(vec!\\[0\\]\\)",

    # `<impl VersionedEnvelope for WorkloadIntentEnvelope>::{discriminant_offset_from_end,
    # known_discriminants, type_name}` — outer-envelope variant whose
    # body is a DEFERRED-BY-DESIGN no-op per ADR-0050 step 02-03a, NOT
    # an empirical pin like JobEnvelope/AllocStatusRowEnvelope/etc.
    # `discriminant_offset_from_end()` returns `None` while V1 is the
    # only variant (the outer envelope wraps a 3-variant inner enum
    # whose archived layout shifts the trailing root region in ways
    # the JobEnvelope-style from-end pin cannot trivially adopt).
    # `known_discriminants()` is consequently unused (the probe
    # short-circuits on `None`), and `type_name()` feeds only the
    # `EnvelopeError` Display form — no caller pattern-matches on the
    # string. Re-pin in the same commit that introduces V2; that
    # commit will replace these exclusions with the kill tests.
    # Tracked in feedback_rkyv_envelope_forward_traps.md.
    "<impl VersionedEnvelope for WorkloadIntentEnvelope>::discriminant_offset_from_end",
    "<impl VersionedEnvelope for WorkloadIntentEnvelope>::known_discriminants",
    "<impl VersionedEnvelope for WorkloadIntentEnvelope>::type_name",

    # `ServiceVip::try_as_ipv4 -> Option<std::net::Ipv4Addr> with None` —
    # equivalent-mutant under the Phase 1 forward-compat policy. The
    # `IpAddr::V6` arm is structurally unreachable because
    # `ServiceVipAllocator` (the only constructor of `ServiceVip` in
    # production) issues IPv4 addresses exclusively per ADR-0049 § 5,
    # and the parser layer does not yet admit IPv6 literals (the
    # `serde(try_from = "String")` path could in principle decode a
    # textual `::1` but no production wire payload carries one).
    # When IPv6 lands (GH #155) the corresponding kill test will
    # construct a `ServiceVip` from an IPv6 literal and assert
    # `try_as_ipv4().is_none()`, at which point this exclusion is
    # removed in the same commit.
    "ServiceVip::try_as_ipv4 -> Option<std::net::Ipv4Addr> with None",

    # Rule 7 — function-body replacement with `Default::default()`.
    # cargo-mutants' default operator synthesises three replacement
    # bodies for any function returning `Result<T, E>`: `Ok(T::default())`,
    # `Err(E::default())`, and `T::default()` for plain returns.
    # Phase 1 deliberately avoids `Default` impls on domain types
    # (newtypes per `.claude/rules/development.md` §STRICT-by-default,
    # `thiserror` enums for errors, sum types modelling business state),
    # so each of those replacements fails to compile with
    # `error[E0277]: the trait bound X: Default is not satisfied`.
    # cargo-mutants reports them as UNVIABLE — which the gate (correctly)
    # treats as "no quality signal" rather than vacuous PASS.
    #
    # The `skip_calls = ["Default::default"]` setting below is the wrong
    # knob for this: `skip_calls` suppresses mutation of source-level
    # CALLS to `Default::default()` (per https://mutants.rs/skip_calls.html),
    # not the operator that synthesises `Default::default()` as a
    # replacement. The right knob for the synthesised replacement is
    # description-regex exclusion at generation time.
    #
    # Match the three description shapes cargo-mutants emits:
    #   - "replace <fn> -> <T> with Default::default()"
    #   - "replace <fn> -> Result<...> with Ok(Default::default())"
    #   - "replace <fn> -> Result<...> with Err(Default::default())"
    # A single regex covers all three — `Default::default` is unique
    # to the synthesised replacement bodies and never appears in
    # legitimate mutation descriptions for arithmetic flips,
    # comparison flips, or `Vec::new()`/`()` body replacements.
    "Default::default",
]

# ---------------------------------------------------------------------------
# Rule 4 — performance assertions are NOT mutation-tested.
# ---------------------------------------------------------------------------
#
# We do not currently have a path or test-target convention for perf
# assertions (Tier 4 — veristat, xdp-bench — lives outside `cargo test`).
# If a benchmark or perf-regression test ever lands under `cargo test`,
# add its module path to `exclude_globs` above and cross-reference here.

# ---------------------------------------------------------------------------
# Cargo args passed to the per-mutation `cargo test` run.
# ---------------------------------------------------------------------------
#
# `--locked` to fail loudly on any dep drift during the per-mutation run
# (mutants reruns `cargo test` many times; an unlocked run could waste an
# hour re-resolving). The proptest cases count is pinned at the workflow
# level (PROPTEST_CASES=1024) — we do NOT lower it here to speed up the
# mutants run, per testing.md "Don't lower the default to dodge a slow
# generator — fix the generator."
additional_cargo_args = ["--locked"]

# ---------------------------------------------------------------------------
# Excluded mutation *kinds* — suppress operators that this codebase
# cannot produce viable mutants for.
# ---------------------------------------------------------------------------
#
# `skip_calls` suppresses cargo-mutants from MUTATING source-level CALLS
# to a particular function — see https://mutants.rs/skip_calls.html. It
# is NOT the knob for suppressing the operator that synthesises
# `Default::default()` as a replacement body; that lives in `exclude_re`
# above (Rule 7).
#
# Kept for now because the entry has historically been documented as
# the Default-suppression rule. Removing it without auditing every CI
# run that referenced "Rule 7 — Default" risks losing institutional
# context. Re-evaluate during the next mutants-toml audit; the actual
# operator suppression now lives in `exclude_re` above.
skip_calls = ["Default::default"]
