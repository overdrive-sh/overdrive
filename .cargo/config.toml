[alias]
# Developer conveniences. xtask hosts build / test / dev orchestration
# subcommands (`bpf-build`, `integration-test vm`,
# `mutants`, `dst-lint`, `lima`, `hooks`, …); runtime tools (`dst`,
# `openapi`, `overdrive`, `verifier-regress`) ship as binaries in
# their owning crate and are invoked through `cargo run -p <crate>
# --bin <bin> --` directly. See § "xtask is build / test / dev
# orchestration, NOT a runtime entry point" in
# `.claude/rules/development.md` for the layering rule.
xtask         = "run --package xtask --"
xt            = "run --package xtask --"

# Runtime tools — direct cargo invocations, no xtask wrapper.
dst              = "run -p overdrive-sim --bin dst --"
openapi-gen      = "run -p overdrive-control-plane --bin openapi -- gen"
openapi-check    = "run -p overdrive-control-plane --bin openapi -- check"
overdrive        = "run -p overdrive-cli --bin overdrive --"
# `verifier-regress` and `xdp-perf` live in overdrive-dataplane (not
# xtask) because both must load the BPF object via aya, which xtask's
# deps cannot include per `.claude/rules/development.md` § "xtask is
# build / test / dev orchestration, NOT a runtime entry point".
# Both route through `xtask lima run --` so they auto-enter the Lima
# VM when invoked on the host. The passthrough logic in `lima(Run)`
# detects `LIMA_CIDATA_NAME` inside the VM and runs directly.
verifier-regress = "run --package xtask -- lima run -- cargo run -p overdrive-dataplane --bin verifier_regress --"
xdp-perf         = "run --package xtask -- lima run -- cargo run -p overdrive-dataplane --bin xdp_perf --"

# Build / test orchestration shortcuts — wrappers over xtask subcommands.
bpf-unit      = "run --package xtask -- bpf-unit"
it-vm         = "run --package xtask -- integration-test vm"
lint          = "clippy --workspace --all-targets --all-features -- -D warnings"
fmt-check     = "fmt --all -- --check"
lima-up       = "run --package xtask -- lima up"
lima-shell    = "run --package xtask -- lima shell"
hooks-install = "run --package xtask -- hooks install"

[build]
# Keep incremental compilation on by default; CI overrides via CARGO_INCREMENTAL=0.

# Linker — mold on Linux. Cuts incremental test rebuild ~3× and clean test
# build ~33% on this workspace; see scripts/benchmark-linker/RESULTS.md.
# Requires mold on PATH: Lima yaml installs it; CI installs it per-job;
# bare Linux dev hosts need `apt-get install -y mold` (or distro equiv).
# macOS targets use Mach-O / ld64 — no mold port for Mach-O.
[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
