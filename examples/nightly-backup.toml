# Slice 05 of `workload-kind-discriminator` — example `[job]+[schedule]`
# spec exercising the Schedule kind end-to-end.
#
# Submit (end-to-end Schedule wiring is deferred — see GH #166):
#   The Schedule kind parser and IntentStore persistence helpers ship
#   in this slice (slice 05), but submit_streaming() / submit() do not
#   yet route WorkloadSpecInput::Schedule to the server. Attempting
#   `overdrive deploy examples/nightly-backup.toml` currently returns
#   an InvalidSpec error (legacy JobSpecInput parser rejects [job]/[schedule]).
#   End-to-end CLI wiring lands in a future slice-02 follow-up.
#
# Cron firing semantics are deferred to GH #166 — the spec is
# validated and persisted as intent once the CLI wiring lands, but no
# Job runs are spawned automatically.
#
# `cron = "0 2 * * *"` is preserved VERBATIM in `alloc status`
# output. Slice 05 explicitly does NOT canonicalise cron strings;
# richer cron syntax validation lands in GH #166.

[job]
id = "nightly-backup"

[exec]
command = "/bin/echo"
args = ["nightly", "backup", "snapshot"]

[resources]
cpu_milli = 100
memory_bytes = 67108864

[schedule]
cron = "0 2 * * *"
