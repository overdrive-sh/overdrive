schema_version: '0.1'
outcomes:
- id: OUT-CA-ROOT
  kind: operation
  summary: Generate or load the persistent self-signed P-256 root CA (CA:TRUE, keyCertSign|cRLSign,
    keyUsage critical, no pathLen)
  feature: built-in-ca
  inputs:
  - shape: '&self -> root()'
  output:
    shape: Result<RootCaHandle, CaError>
  keywords:
  - ca
  - root
  - certificate-authority
  - x509
  - self-signed
  - trust-anchor
  artifact: crates/overdrive-core/src/traits/ca.rs
  related: []
  superseded_by: null
- id: OUT-CA-INTERMEDIATE
  kind: operation
  summary: 'Issue or re-issue the per-node intermediate CA, pathLen=0, signed by the
    root (single-node: one node yields one intermediate)'
  feature: built-in-ca
  inputs:
  - shape: 'node: &NodeId'
  output:
    shape: Result<IntermediateHandle, CaError>
  keywords:
  - ca
  - intermediate
  - pathlen
  - node
  - x509
  - signed-by-root
  artifact: crates/overdrive-core/src/traits/ca.rs
  related: []
  superseded_by: null
- id: OUT-CA-SVID
  kind: operation
  summary: 'Mint a workload SVID leaf: exactly one spiffe URI SAN, CA:FALSE, keyUsage=digitalSignature
    critical, CSPRNG serial via Entropy, ~1h TTL; re-issue yields a fresh distinct
    cert'
  feature: built-in-ca
  inputs:
  - shape: 'req: &SvidRequest'
  output:
    shape: Result<SvidMaterial, CaError>
  keywords:
  - svid
  - spiffe
  - uri-san
  - workload-identity
  - leaf
  - issue
  - reissue
  - 1h-ttl
  artifact: crates/overdrive-core/src/traits/ca.rs
  related: []
  superseded_by: null
- id: OUT-CA-TRUST-BUNDLE
  kind: operation
  summary: Compose the trust bundle a relying party verifies an SVID against (root
    anchor plus intermediate as untrusted chain material)
  feature: built-in-ca
  inputs:
  - shape: '&self -> trust_bundle()'
  output:
    shape: Result<TrustBundle, CaError>
  keywords:
  - ca
  - trust-bundle
  - verification
  - root-anchor
  - chain
  artifact: crates/overdrive-core/src/traits/ca.rs
  related: []
  superseded_by: null
- id: OUT-CA-SINGLE-URI-SAN
  kind: invariant
  summary: Every workload SVID carries exactly one spiffe URI SAN; zero or two-or-more
    URI SANs are rejected before any certificate material is produced (SPIFFE spec
    hardest rule, KPI K2)
  feature: built-in-ca
  inputs:
  - shape: SvidRequest with a SpiffeId whose SAN projection yields N spiffe URI SANs
  output:
    shape: N==1 accepted; N==0 or N>=2 rejected with CaError::InvalidSan before any
      cert
  keywords:
  - svid
  - spiffe
  - single-uri-san
  - invariant
  - cert-spec
  - k2
  - reject-pre-issuance
  artifact: crates/overdrive-core/src/cert_spec.rs
  related: []
  superseded_by: null
- id: OUT-WIM-SVID-LIFECYCLE
  kind: specification
  summary: SvidLifecycle converges the running allocation set against the held SVID
    set without CA or ObservationStore I/O inside reconcile
  feature: workload-identity-manager
  inputs:
  - shape: desired running allocations, held IdentityMgr snapshot, retry-memory View,
      TickContext
  output:
    shape: Vec<Action> containing IssueSvid for running-and-unheld and DropSvid for
      stopped-and-held; next View remains retry memory only
  keywords:
  - svid
  - identity
  - lifecycle
  - reconciler
  - issue
  - drop
  - running-set
  artifact: crates/overdrive-core/src/reconcilers/svid_lifecycle.rs
  related: []
  superseded_by: null
- id: OUT-WIM-RUNNING-SET-INVARIANT
  kind: invariant
  summary: The workload identity held set eventually equals the Running allocation
    set, with valid SVIDs for running allocations and no held credential for stopped
    allocations
  feature: workload-identity-manager
  inputs:
  - shape: seeded sequence of allocation Running and Stopped transitions plus held
      SVID map snapshots
  output:
    shape: eventually every Running allocation holds a valid SVID and no stopped allocation
      holds one; broken hold/drop fails the invariant
  keywords:
  - dst
  - invariant
  - running-set
  - svid
  - drop-on-stop
  - identity-availability
  artifact: crates/overdrive-sim/src/invariants/workload_identity.rs
  related: []
  superseded_by: null
- id: OUT-WIM-IDENTITY-READ
  kind: specification
  summary: "IdentityRead is a sync owned-clone read port over the held SVID set \u2014\
    \ a read never issues, never mutates, returns explicit None for absence, hands\
    \ back owned clones holding no lock, and observes drop-on-stop as None"
  feature: workload-identity-manager
  inputs:
  - shape: AllocationId for svid_for; no argument for current_bundle; reads served
      from the held IdentityMgr map and hydrated TrustBundle
  output:
    shape: Option<SvidMaterial> owned clone (None == explicit absence, incl. post-DropSvid)
      and Option<TrustBundle> owned clone, with zero CA issuance on the read path
  keywords:
  - svid
  - identity
  - read-port
  - trust-bundle
  - owned-clone
  - no-reissue
  - drop-on-stop
  artifact: crates/overdrive-core/src/traits/identity_read.rs
  related: []
  superseded_by: null
- id: OUT-CA-ISSUED-CERTS-READ
  kind: operation
  summary: Operator reads the current issued-certificate summary per running alloc
    via alloc status (EDD O05)
  feature: built-in-ca-operator-composition
  inputs:
  - shape: overdrive alloc status --job <WorkloadId> (reads issued_certificate_rows())
  output:
    shape: 'AllocStatusResponse.issued_certificates: Vec<IssuedCertSummary{serial,spiffe_id,issuer_serial,not_after}>,
      latest-by-issued_at per alloc, NO cert bytes/key'
  keywords:
  - issued-certificates
  - alloc-status
  - operator-read
  - audit
  - svid-summary
  artifact: crates/overdrive-control-plane/src/api.rs
  related: []
  superseded_by: null
- id: OUT-CA-BOOT-REFUSE
  kind: invariant
  summary: Persistent workload-CA boot refuses to start with a cause-distinct actionable
    error and never silently re-mints (EDD O04/D01)
  feature: built-in-ca-operator-composition
  inputs:
  - shape: run_server boot with persisted root + (resolvable|wrong|absent) KEK / (intact|tampered)
      envelope
  output:
    shape: cause-distinct ControlPlaneError::CaBoot(CaBootError::{WrongKek|TamperedEnvelope|KekUnavailable})
      + health.startup.refused; no silent re-mint
  keywords:
  - ca-boot
  - refuse-to-start
  - earned-trust
  - no-remint
  - kek
  - envelope
  artifact: crates/overdrive-control-plane/src/ca_boot.rs
  related: []
  superseded_by: null
