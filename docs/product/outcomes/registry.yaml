schema_version: '0.1'
outcomes:
- id: OUT-CA-ROOT
  kind: operation
  summary: Generate or load the persistent self-signed P-256 root CA (CA:TRUE, keyCertSign|cRLSign,
    keyUsage critical, no pathLen)
  feature: built-in-ca
  inputs:
  - shape: '&self -> root()'
  output:
    shape: Result<RootCaHandle, CaError>
  keywords:
  - ca
  - root
  - certificate-authority
  - x509
  - self-signed
  - trust-anchor
  artifact: crates/overdrive-core/src/traits/ca.rs
  related: []
  superseded_by: null
- id: OUT-CA-INTERMEDIATE
  kind: operation
  summary: 'Issue or re-issue the per-node intermediate CA, pathLen=0, signed by the
    root (single-node: one node yields one intermediate)'
  feature: built-in-ca
  inputs:
  - shape: 'node: &NodeId'
  output:
    shape: Result<IntermediateHandle, CaError>
  keywords:
  - ca
  - intermediate
  - pathlen
  - node
  - x509
  - signed-by-root
  artifact: crates/overdrive-core/src/traits/ca.rs
  related: []
  superseded_by: null
- id: OUT-CA-SVID
  kind: operation
  summary: 'Mint a workload SVID leaf: exactly one spiffe URI SAN, CA:FALSE, keyUsage=digitalSignature
    critical, CSPRNG serial via Entropy, ~1h TTL; re-issue yields a fresh distinct
    cert'
  feature: built-in-ca
  inputs:
  - shape: 'req: &SvidRequest'
  output:
    shape: Result<SvidMaterial, CaError>
  keywords:
  - svid
  - spiffe
  - uri-san
  - workload-identity
  - leaf
  - issue
  - reissue
  - 1h-ttl
  artifact: crates/overdrive-core/src/traits/ca.rs
  related: []
  superseded_by: null
- id: OUT-CA-TRUST-BUNDLE
  kind: operation
  summary: Compose the trust bundle a relying party verifies an SVID against (root
    anchor plus intermediate as untrusted chain material)
  feature: built-in-ca
  inputs:
  - shape: '&self -> trust_bundle()'
  output:
    shape: Result<TrustBundle, CaError>
  keywords:
  - ca
  - trust-bundle
  - verification
  - root-anchor
  - chain
  artifact: crates/overdrive-core/src/traits/ca.rs
  related: []
  superseded_by: null
- id: OUT-CA-SINGLE-URI-SAN
  kind: invariant
  summary: Every workload SVID carries exactly one spiffe URI SAN; zero or two-or-more
    URI SANs are rejected before any certificate material is produced (SPIFFE spec
    hardest rule, KPI K2)
  feature: built-in-ca
  inputs:
  - shape: SvidRequest with a SpiffeId whose SAN projection yields N spiffe URI SANs
  output:
    shape: N==1 accepted; N==0 or N>=2 rejected with CaError::InvalidSan before any
      cert
  keywords:
  - svid
  - spiffe
  - single-uri-san
  - invariant
  - cert-spec
  - k2
  - reject-pre-issuance
  artifact: crates/overdrive-core/src/cert_spec.rs
  related: []
  superseded_by: null
- id: OUT-WIM-SVID-LIFECYCLE
  kind: specification
  summary: SvidLifecycle converges the running allocation set against the held SVID
    set without CA or ObservationStore I/O inside reconcile
  feature: workload-identity-manager
  inputs:
  - shape: desired running allocations, held IdentityMgr snapshot, retry-memory View,
      TickContext
  output:
    shape: Vec<Action> containing IssueSvid for running-and-unheld and DropSvid for
      stopped-and-held; next View remains retry memory only
  keywords:
  - svid
  - identity
  - lifecycle
  - reconciler
  - issue
  - drop
  - running-set
  artifact: crates/overdrive-core/src/reconcilers/svid_lifecycle.rs
  related: []
  superseded_by: null
- id: OUT-WIM-RUNNING-SET-INVARIANT
  kind: invariant
  summary: The workload identity held set eventually equals the Running allocation
    set, with valid SVIDs for running allocations and no held credential for stopped
    allocations
  feature: workload-identity-manager
  inputs:
  - shape: seeded sequence of allocation Running and Stopped transitions plus held
      SVID map snapshots
  output:
    shape: eventually every Running allocation holds a valid SVID and no stopped allocation
      holds one; broken hold/drop fails the invariant
  keywords:
  - dst
  - invariant
  - running-set
  - svid
  - drop-on-stop
  - identity-availability
  artifact: crates/overdrive-sim/src/invariants/workload_identity.rs
  related: []
  superseded_by: null
- id: OUT-WIM-IDENTITY-READ
  kind: specification
  summary: "IdentityRead is a sync owned-clone read port over the held SVID set \u2014\
    \ a read never issues, never mutates, returns explicit None for absence, hands\
    \ back owned clones holding no lock, and observes drop-on-stop as None"
  feature: workload-identity-manager
  inputs:
  - shape: AllocationId for svid_for; no argument for current_bundle; reads served
      from the held IdentityMgr map and hydrated TrustBundle
  output:
    shape: Option<SvidMaterial> owned clone (None == explicit absence, incl. post-DropSvid)
      and Option<TrustBundle> owned clone, with zero CA issuance on the read path
  keywords:
  - svid
  - identity
  - read-port
  - trust-bundle
  - owned-clone
  - no-reissue
  - drop-on-stop
  artifact: crates/overdrive-core/src/traits/identity_read.rs
  related: []
  superseded_by: null
- id: OUT-CA-ISSUED-CERTS-READ
  kind: operation
  summary: Operator reads the current issued-certificate summary per running alloc
    via alloc status (EDD O05)
  feature: built-in-ca-operator-composition
  inputs:
  - shape: overdrive alloc status --job <WorkloadId> (reads issued_certificate_rows())
  output:
    shape: 'AllocStatusResponse.issued_certificates: Vec<IssuedCertSummary{serial,spiffe_id,issuer_serial,not_after}>,
      current = max issuance_ordinal per alloc (issued_at retained as audit fact, not selection key), NO cert bytes/key'
  keywords:
  - issued-certificates
  - alloc-status
  - operator-read
  - audit
  - svid-summary
  artifact: crates/overdrive-control-plane/src/api.rs
  related: []
  superseded_by: null
- id: OUT-CA-BOOT-REFUSE
  kind: invariant
  summary: Persistent workload-CA boot refuses to start with a cause-distinct actionable
    error and never silently re-mints (EDD O04/D01)
  feature: built-in-ca-operator-composition
  inputs:
  - shape: run_server boot with persisted root + (resolvable|wrong|absent) KEK / (intact|tampered)
      envelope
  output:
    shape: cause-distinct ControlPlaneError::CaBoot(CaBootError::{WrongKek|TamperedEnvelope|KekUnavailable})
      + health.startup.refused; no silent re-mint
  keywords:
  - ca-boot
  - refuse-to-start
  - earned-trust
  - no-remint
  - kek
  - envelope
  artifact: crates/overdrive-control-plane/src/ca_boot.rs
  related: []
  superseded_by: null
- id: OUT-MTLS-SPIKE-INBAND-KTLS
  kind: spike
  summary: 'Tier-3 spike (walking skeleton, runs BEFORE design locks): prove in-band
    sidecarless kTLS for ONE process->process flow on the pinned 6.18 kernel — sockops
    ESTABLISHED -> pidfd_getfd -> rustls TLS 1.3 handshake presenting the held SVID
    (IdentityRead) -> kTLS install -> agent exits -> tcpdump shows TLS 1.3 records,
    race-free (no cleartext before kTLS). FALSIFICATION -> fall back to Cilium out-of-band
    auth + separate encryption'
  feature: transparent-mtls-host-socket
  inputs:
  - shape: one process->process host-socket flow on the 6.18 Lima/LVH kernel; held SVID
      read via IdentityRead; deliberate kTLS-install delay to widen the race window
  output:
    shape: PASS = tcpdump shows TLS 1.3 Application Data records + ss -K shows kTLS ULP
      installed + race-window probe shows zero cleartext bytes before install; FAIL =
      handoff not race-free -> documented Cilium fallback (out-of-band auth + separate
      encryption)
  keywords:
  - sockops
  - ktls
  - rustls
  - pidfd-getfd
  - spike
  - in-band
  - sidecarless
  - tls13
  - wire-capture
  - fallback
  artifact: crates/overdrive-dataplane (spike harness; mechanism unbuilt)
  related: [OUT-WIM-IDENTITY-READ]
  superseded_by: null
- id: OUT-MTLS-WIRE-TLS13
  kind: invariant
  summary: Between two host-socket workloads the wire carries TLS 1.3 Application Data
    records (content type 0x17), NOT cleartext — the auth-session is the data-session,
    encryption is in-kernel via kTLS, the agent is out of the steady-state data path
  feature: transparent-mtls-host-socket
  inputs:
  - shape: two host-socket workloads exchanging bytes after the sockops->handshake->kTLS
      handoff completes
  output:
    shape: tcpdump on the veth shows TLS 1.3 records (0x17) and never the cleartext payload;
      ss -K shows the kTLS ULP installed on the socket; the agent is absent from the
      steady-state byte path
  keywords:
  - mtls
  - ktls
  - tls13
  - wire-capture
  - in-kernel
  - sidecarless
  - auth-session-is-data-session
  - principle-3
  artifact: crates/overdrive-dataplane (mechanism unbuilt)
  related: [OUT-MTLS-SPIKE-INBAND-KTLS, OUT-WIM-IDENTITY-READ]
  superseded_by: null
- id: OUT-MTLS-NO-PLAINTEXT-PRE-KTLS
  kind: invariant
  summary: 'Fail-closed for confidentiality: no cleartext byte egresses on the wire
    before kTLS is installed; the gate is armed before connect()/accept() returns. The
    gate MECHANISM (sk_msg DROP-until-armed vs sockmap redirect vs other) is a DESIGN
    choice the spike informs, not pinned here; the residual data-loss window is closed by
    connection reset if drops > 0'
  feature: transparent-mtls-host-socket
  inputs:
  - shape: a write() issued immediately on connect() return (no sleep), with a deliberately
      delayed kTLS install widening the window
  output:
    shape: tcpdump shows EITHER TLS 1.3 records OR zero application bytes — NEVER the
      cleartext probe string on the wire; a drop-counter signals whether the window fired
  keywords:
  - race-window
  - fail-closed
  - sk-msg
  - no-cleartext
  - confidentiality
  - sockops
  - drop-counter
  artifact: crates/overdrive-dataplane (mechanism unbuilt)
  related: [OUT-MTLS-WIRE-TLS13]
  superseded_by: null
- id: OUT-MTLS-HANDSHAKE-FAIL-CLOSED
  kind: invariant
  summary: A handshake against an absent or wrong SVID fails closed — no plaintext fallback,
    no cleartext egress; an absent IdentityRead read refuses the handshake rather than
    presenting a stale credential, and a peer that does not chain to the trust bundle
    aborts the handshake
  feature: transparent-mtls-host-socket
  inputs:
  - shape: a host-socket flow whose held SVID is absent (stopped/not-yet-issued) OR whose
      peer presents a credential not chaining to the current trust bundle
  output:
    shape: NO TLS 1.3 Application Data on the wire AND NO cleartext — the connection fails
      closed (rustls aborts / the agent refuses to drive the handshake)
  keywords:
  - fail-closed
  - mtls
  - handshake
  - absent-svid
  - wrong-svid
  - trust-bundle
  - no-plaintext-fallback
  artifact: crates/overdrive-dataplane (mechanism unbuilt)
  related: [OUT-MTLS-WIRE-TLS13, OUT-WIM-IDENTITY-READ]
  superseded_by: null
- id: OUT-MTLS-RESTART-RE-HANDSHAKE
  kind: invariant
  summary: 'Restart behaviour, two-tier: after a node-agent restart, NEW host-socket
    connections re-run the sockops->handshake->kTLS handoff and re-install kTLS (the held
    SVID is re-readable via IdentityRead) — this is the unconditional Phase-2 promise.
    Survival of an ALREADY-IN-FLIGHT kTLS session across the restart is a spike/DESIGN-gated
    observable (holds IFF the workload owns the socket fd and the sockops link/maps are
    bpffs-pinned), NOT an unconditional Phase-2 acceptance criterion. A full node reboot
    re-handshakes every connection (bpffs pins do not survive a reboot)'
  feature: transparent-mtls-host-socket
  inputs:
  - shape: a node-agent restart (crash/upgrade) with in-flight kTLS sessions in the
      fd-ownership/bpffs-pin shape the spike validates; separately, new connections opened
      after the restart
  output:
    shape: new connections re-handshake and re-install kTLS (unconditional); an in-flight
      session survives the restart iff workload-owns-fd + bpffs-pinned link (spike-gated) —
      otherwise the documented behaviour is new-connection re-handshake
  keywords:
  - restart-survival
  - re-handshake
  - ktls
  - socket-owned
  - bpffs-pin
  - spike-gated
  artifact: crates/overdrive-dataplane (mechanism unbuilt)
  related: [OUT-MTLS-SPIKE-INBAND-KTLS, OUT-MTLS-WIRE-TLS13]
  superseded_by: null
- id: OUT-MTLS-WASM-PARITY
  kind: invariant
  summary: A WASM (wasmtime) host-socket workload receives the same transparent mTLS
    enforcement as a process workload — via the in-process host fd path rather than
    pidfd_getfd — with the same wire observable (TLS 1.3 Application Data records, no
    cleartext) and the same fail-closed semantics
  feature: transparent-mtls-host-socket
  inputs:
  - shape: a WASM (wasmtime) host-socket workload exchanging bytes; the agent acquires the
      in-process host fd rather than pidfd_getfd
  output:
    shape: tcpdump shows TLS 1.3 records (0x17) and never cleartext, identical to the
      process-workload path; ss -K shows the kTLS ULP installed
  keywords:
  - wasm
  - wasmtime
  - parity
  - mtls
  - tls13
  - host-socket
  - in-process-fd
  artifact: crates/overdrive-dataplane (mechanism unbuilt)
  related: [OUT-MTLS-WIRE-TLS13]
  superseded_by: null
