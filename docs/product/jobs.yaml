schema_version: 1

# Jobs-to-be-done register for Overdrive.
#
# Phase 1 serves one job end-to-end. Other jobs are tracked here so we can
# trace later stories to validated job statements rather than re-deriving
# them. Per the wizard decisions, JTBD analysis is skipped for this feature
# because motivation is already explicit in whitepaper §21 — the entries
# below are distilled from the whitepaper, not from user interviews.

jobs:
  - id: J-PLAT-001
    title: "Trust my distributed control plane under real failure conditions before I ship it"
    situation: >
      When I, an Overdrive platform engineer, change control-plane logic
      (scheduler, reconciler, state-store behaviour, identity issuance),
    motivation: >
      I want to find concurrency, timing, partition, and ordering bugs
      before they reach production and to reproduce any failure
      deterministically from a seed,
    outcome: >
      so I can ship changes with evidence that named failure modes
      (leader election under partition, gossip contagion, schema migration
      storms, replay divergence) are caught on the CI critical path and not
      in a customer incident at 3am.
    source: whitepaper §21, .claude/rules/testing.md Tier 1
    served_by_phase: 1
    status: active

  - id: J-PLAT-002
    title: "Start a tenant in a 30MB footprint and grow to HA without downtime or a migration weekend"
    situation: >
      When an operator deploys a small tenant or dev cluster that does not
      yet need three-node consensus,
    motivation: >
      I want a control plane that runs with no Raft overhead today and
      can be promoted to HA later by re-exporting its state, without data
      loss and without a rewrite,
    outcome: >
      so control plane density makes the small-tenant commercial tier
      viable (~30MB per tenant vs ~24GB for HA-everywhere) and so the
      single→HA migration is a commercial non-event.
    source: whitepaper §4 (IntentStore), commercial.md "Control Plane Density"
    served_by_phase: 1
    status: active

  - id: J-PLAT-003
    title: "Enforce the intent/observation boundary as code, not as discipline"
    situation: >
      When I, an Overdrive platform engineer, write reconciler or store
      code that touches cluster state,
    motivation: >
      I want the type system and a CI gate to prevent me from writing
      intent into the eventually-consistent store or observation into the
      linearizable store, rather than catching it in code review,
    outcome: >
      so the consistency-boundary violations that caused multi-year
      production pain at other orchestrators (Fly gossip contagion,
      schema-backfill storms) are structurally impossible in Overdrive.
    source: whitepaper §4 "Consistency Guardrails", commercial.md
    served_by_phase: 1
    status: active

  - id: J-PLAT-004
    title: "Run a reconciler I wrote against a simulated cluster and know it converges"
    situation: >
      When I write a new built-in reconciler,
    motivation: >
      I want to express its ESR contract (progress + stability) as
      assert_always!/assert_eventually! invariants against the DST harness,
    outcome: >
      so reconciler correctness is mechanically checked before I rely on
      it in production.
    source: whitepaper §18, §7 (BPF Map Architecture — hydration as reconciler)
    served_by_phase: 2
    status: active

  - id: J-PLAT-005
    title: "Drive a finite multi-step side-effecting platform sequence to a terminal result exactly-once, crash-resumable on any node, without hand-rolling a state machine per sequence"
    situation: >
      When I, an Overdrive platform engineer, must perform a finite,
      ordered, multi-step operation whose steps take externally-visible
      side effects that are unsafe to repeat (issue a cert to an ACME
      server, quiesce a source region, snapshot a microVM, ratify a
      staged rollout),
    motivation: >
      I want to express the sequence as ordinary control flow and have
      the platform persist its progress, resume it on any control-plane
      node after a crash from the first incomplete step, and drive it to
      a single terminal result — without re-issuing completed steps,
      losing committed ones, or hand-rolling a state machine, a step
      cursor, a crash-resume path, and a correctness proof for each
      sequence,
    outcome: >
      so the platform's own lifecycle operations (certificate rotation,
      multi-stage deployment, cross-region migration, staged rollout,
      persistent microVM snapshot/restore) are as mechanically-trustworthy
      under crash and partition as the reconciler convergence engine
      (J-PLAT-004), the resumed execution provably reaches the same
      terminal result the uninterrupted execution would have, and the
      platform operates the fewest distinct persistence/recovery
      mechanisms it can to support its terminal sequences. ODI outcomes:
      O1 (no repeated side effect on resume), O2 (no lost committed step
      on cross-node resume), O3 (fast to author a new crash-resumable
      sequence), O4 (resumed terminal == uninterrupted terminal), O5
      (provable resume-equivalence before ship), O6 (minimize # of
      distinct persistence/recovery mechanisms). See
      docs/feature/workflow-primitive/diverge/job-analysis.md.
    source: whitepaper §18 (Workflow Primitive); GH #39; DIVERGE wave (2026-06-05)
    served_by_phase: 3
    status: active

  - id: J-OPS-001
    title: "Bill a tenant for exactly what they used, with kernel evidence"
    situation: >
      When a billing dispute arises,
    motivation: >
      I want cryptographic identity on every flow event and per-tenant
      resource totals that I can replay from source data,
    outcome: >
      so the resolution is a SQL query, not a negotiation.
    source: commercial.md "Billing Infrastructure"
    served_by_phase: 4+
    status: deferred

  - id: J-OPS-002
    title: "Submit a job to the walking-skeleton control plane and trust what the CLI tells me"
    situation: >
      When I, a Overdrive platform engineer, have a job spec in a TOML
      file and a local single-mode control plane running,
    motivation: >
      I want to submit the spec through `overdrive job submit`, watch
      the control plane commit it through the real IntentStore, observe
      the reconciler primitive alive, and read the spec back via
      `overdrive alloc status` with a byte-identical spec digest,
    outcome: >
      so the walking-skeleton guarantees from phase-1-foundation (typed
      identifiers, bit-identical snapshot round-trip, reconciler purity)
      carry through to operator-observable behaviour, and the platform
      is honest about what it does and does not know — no silent blank
      outputs, no fabricated placeholder rows.
    source: whitepaper §4, §18; phase-1-control-plane-core scope
    served_by_phase: 1
    status: active

  - id: J-OPS-004
    title: "Submit a Service-kind workload and trust the wire signal to reflect operator-meaningful liveness, not kernel bare-fork acceptance"
    situation: >
      When I, an Overdrive platform engineer, submit a Service-kind
      workload via `overdrive job submit <spec>` against a single-node
      dev host, possibly with declared health-check probes (HTTP / TCP
      / Exec on startup / readiness / liveness roles) or omitting them
      entirely (default TCP-connect inference),
    motivation: >
      I want the streaming wire to emit ServiceSubmitEvent::Stable
      only after probe-derived operator-meaningful liveness has been
      reached, and ServiceSubmitEvent::Failed (with an actionable
      reason: StartupProbeFailed | EarlyExit { exit_code }) when the
      Service does not stabilise within startup_deadline OR when the
      workload exits before any startup probe passes,
    outcome: >
      so the platform never reports a Service as "stable" while its
      workload is actually exiting with code 1 within milliseconds of
      exec (RCA root cause A,
      docs/analysis/root-cause-analysis-coinflip-submit-reports-running-on-exit-1.md),
      readiness probes can flip Backend.healthy continuously to remove
      unhealthy backends from the dataplane fingerprint, liveness
      probes can trigger restart of wedged backends, and the operator
      can inspect current probe state via `overdrive alloc status
      --job <id>`. Extends J-OPS-003 to the Service workload kind
      with operator-declared liveness contracts.
    source: GH #170; RCA-A; ADR-0047 (workload kind discriminator); ADR-0037 (typed TerminalCondition); ADR-0032 (NDJSON streaming, per-kind enums); ADR-0033 (alloc_status enrichment); GH #200 / unconnected-udp-sendmsg4 (spans unconnected-UDP same-host wire-path reachability — a same-host UDP service must be reachable from the canonical unconnected `sendto` client, with the reply sourced from the VIP)
    served_by_phase: 1
    status: active

  - id: J-OPS-003
    title: "Run my actual workload on the walking-skeleton control plane and trust the platform to converge to the declared replica count"
    situation: >
      When I, an Overdrive platform engineer, submit a process job
      through the walking-skeleton control plane on my single-node dev
      host (control plane and worker co-located on one machine),
    motivation: >
      I want the platform to schedule the job onto the local host, start
      a real OS process under cgroup-isolated supervision, and converge
      the running set to the declared replica count — including
      restarting on crash and stopping cleanly on `overdrive job stop`
      — without me having to babysit the process or invent ad-hoc
      supervision,
    outcome: >
      so the §18 reconciler primitive moves from "registered and idle"
      to "actively converging declared intent into running workloads",
      the workload-versus-control-plane cgroup split protects platform
      responsiveness under workload pressure, and `alloc status` honestly
      reflects whether each allocation is Pending (with a reason),
      Running, Draining, Terminated, or Failed (with backoff state).
    source: whitepaper §6 (Process driver), §18 (Built-in Reconcilers — Job lifecycle), §4 (Workload isolation on co-located nodes); phase-1-first-workload scope
    served_by_phase: 1
    status: active

  - id: J-SEC-001
    title: "Give every workload a forgery-proof cryptographic identity the platform mints itself, with no external PKI to operate"
    situation: >
      When I, an Overdrive platform engineer (or the platform operator I
      hand a cluster to), run a workload on the platform — and that
      workload's traffic, billing record, and policy decision all hinge on
      "which workload is this, really" — and I have no separate SPIRE
      server, cert-manager, or Vault to lean on,
    motivation: >
      I want the control plane to BE the certificate authority: generate
      its own root CA and protect that key at rest, issue each node an
      intermediate CA at bootstrap, and mint a short-lived X.509 SVID
      (SPIFFE URI SAN, e.g. spiffe://overdrive.local/job/payments/alloc/a1b2c3)
      for every workload it runs — every cert chain-verifiable back to the
      root, with no operator PKI plumbing to stand up,
    outcome: >
      so the whitepaper's structural-security promise (design principle 3:
      "every packet carries cryptographic workload identity") rests on a
      real, persistent trust hierarchy rather than the Phase-1 ephemeral
      stub (ADR-0010); so the SPIFFE-identity-on-every-flow-event billing
      pillar (vision.md strategic pillar 2) and the FIPS/HSM enterprise
      self-hosted tier have a CA primitive to build on; and so adopting
      Overdrive does NOT mean adopting and operating a second identity
      stack alongside it.
    job_dimensions:
      functional: >
        Produce a verifiable chain Root CA → Node Intermediate CA →
        Workload SVID, where the leaf carries exactly one SPIFFE URI SAN
        and validates back to the root; re-mint a fresh SVID on demand.
      emotional: >
        Trust that identity is forgery-proof by construction (a compromised
        workload cannot mint its own identity; a compromised node's
        intermediate cannot mint further intermediates) — security I do not
        have to remember to configure.
      social: >
        Be able to tell a security reviewer "identity is a built-in X.509
        CA with envelope-encrypted root key and pathLen-constrained
        intermediates, SPIFFE-compliant" — and have that be true, not
        aspirational.
    four_forces:
      push: >
        The Phase-1 CA is ephemeral and in-process (ADR-0010): it dies on
        restart, encodes identity in the CN not a SPIFFE URI SAN, and has
        no per-node intermediate. It cannot underpin persistent workload
        identity, billing evidence, or a FIPS story. Operating SPIRE +
        cert-manager + Vault is exactly the multi-component operational
        surface Overdrive exists to collapse (vision.md principle 1).
      pull: >
        One binary that is its own CA: persistent root, per-node
        intermediate at bootstrap, SVID per allocation, trust bundle
        gossiped — no daemon, no gRPC server↔agent hop, FIPS-aligned crypto
        (aws-lc-rs, ADR-0039) end to end.
      anxiety: >
        "Is a self-built CA actually correct?" (mitigated: rcgen covers
        100% of the SPIFFE X.509-SVID extension surface — research Finding
        1/2; SPIRE/Istio/Linkerd are the precedent — Finding 5/6). "Is the
        root key safe at rest?" (mitigated: aws-lc-rs AES-256-GCM envelope
        encryption, authenticated — Finding 8). "Does it compose with DST?"
        (mitigated: serial numbers flow through the Entropy port; key
        generation is a host-adapter concern with fixture keys under DST —
        Finding 10/11).
      habit: >
        Teams reach for SPIRE/SPIFFE-aware sidecars and the Unix-socket
        Workload API out of habit. Overdrive's internal SVID injection is a
        different distribution path; the Workload-API compatibility shim is
        deferred (research Gap 1) and is an explicit non-goal here.
    source: >
      whitepaper §4 (Built-in Certificate Authority), §8 (Identity and
      mTLS), §19 (Security Model); vision.md design principle 3 + strategic
      pillar 2 (SPIFFE→billing) + enterprise FIPS tier;
      docs/research/security/built-in-ca-rcgen-rustls-comprehensive-research.md.
      Distilled from the whitepaper, not from user interviews (per the
      header precedent above).
    served_by_phase: 2
    status: active

  - id: J-SEC-002
    title: "Keep every running workload holding a live, readable identity the dataplane can present — and nothing held for a workload that has stopped"
    relates_to: J-SEC-001
    situation: >
      When a workload I run transitions into (or out of) the Running
      state on the platform — and my kernel-side sockops/kTLS mTLS layer,
      my L7 gateway, and my telemetry sink all need to present or stamp
      that workload's cryptographic identity right now — and Overdrive is
      sidecarless, so there is no in-workload agent to fetch, hold, or
      drop a credential,
    motivation: >
      I want the platform to bind a live, chain-verifiable SVID to that
      exact allocation — issued the moment it starts (via the built-in
      CA, J-SEC-001), held where my dataplane consumers can read it the
      instant they need it, and dropped the moment the workload stops —
      with the issuance lifecycle driven by the allocation lifecycle the
      control plane already observes, not by an in-workload agent or
      manual plumbing,
    outcome: >
      so design principle 3 ("every packet carries cryptographic workload
      identity") is OPERATIONALLY TRUE for the running set — not merely
      mintable in principle (J-SEC-001) — with the window between Running
      and identity-held bounded to one reconcile tick and fail-closed (a
      workload with no held SVID cannot present identity, so the mTLS
      consumer fails closed — the bounded window is not an exposure), no
      leak where a stopped workload's leaf private key lingers in memory,
      and identity availability a DST-proven converged invariant rather
      than a hope.
      This is the consumer-lifecycle peer of J-SEC-001 (which mints
      identity); J-SEC-002 holds it, reads it, and drops it. ODI outcomes:
      O1 (running ⇒ held, chain-verifiable SVID — the
      `assert_eventually!("running allocs hold a valid SVID")` invariant),
      O2 (stopped ⇒ dropped, leaf key not lingering), O3 (minimize
      consumer read latency for SVID + trust bundle), O4 (bounded,
      audited restart re-issue — no stale or silent credential; the leaf
      key is non-persistable, so a restart re-issues each still-Running
      alloc, audited), O5 (no SVID handed out without an observable
      `issued_certificates` audit row), O6 (minimize additional
      concurrency/storage mechanisms beyond the shipped reconciler
      runtime + Ca port + ObservationStore). See
      docs/feature/workload-identity-manager/diverge/job-analysis.md.
    job_dimensions:
      functional: >
        Maintain an in-memory map running-allocation → current
        SvidMaterial that gains an entry (chain-verifiable to the root)
        when an allocation reaches Running, is readable by dataplane
        consumers (sockops/gateway/telemetry) without re-issuing per read,
        loses the entry when the allocation stops, and also exposes the
        current CA trust bundle relying parties verify against. On a
        control-plane restart, re-issuance is bounded and audited — each
        still-Running alloc is re-issued and audited (no stale or silent
        credential), since the held leaf key cannot survive a restart.
      emotional: >
        Trust that the running set is CONSISTENTLY identity-bearing — that
        the gap between Running and identity-held is bounded by convergence
        (one reconcile tick) and fail-closed (a workload with no held SVID
        cannot present identity), no quiet leak where a stopped workload's
        private key survives in memory. Identity availability is a converged
        invariant, not a hope.
      social: >
        Tell a security reviewer "the live credential set is bounded to
        the running workload set by a convergence loop with a DST-proven
        assert_eventually! invariant — identity availability is
        mechanically checked, not asserted" — and have it be true.
    source: >
      whitepaper §5 (per-allocation identity), §8 (Identity and mTLS), §11
      (gateway / unified IdentityMgr across SVID + ACME); roadmap step
      2.13; GH #35 (Depends on #28 J-SEC-001); design principle 3.
      DIVERGE wave (2026-06-08) minted this as a job DISTINCT from
      J-SEC-001 — see the changelog entry below and
      docs/feature/workload-identity-manager/diverge/job-analysis.md §3
      for the new-job verdict justification. Distilled from the whitepaper
      + roadmap, not from user interviews (per the header precedent).
    served_by_phase: 2
    status: active

  - id: J-SEC-003
    title: "Transparently encrypt every workload's traffic with its own SVID, in-kernel, via an agent-light L4 proxy the workload can't disable — no sidecar, no cleartext on the peer wire, both directions"
    relates_to: J-SEC-002
    situation: >
      When a host-socket workload I run (a process via the exec driver — the
      only workload kind in v1) opens an outbound connection, OR an inbound
      connection arrives at one of my server workloads — and design principle 3
      says "every packet carries cryptographic workload identity" and principle
      2 says mTLS is in-kernel and undisableable — and the platform already
      MINTS a forgery-proof SVID (J-SEC-001 / #28) and HOLDS it bound to the
      running set, readable via the IdentityRead port (J-SEC-002 / #35) — but
      NOTHING yet consumes that held identity to encrypt the actual bytes on the
      wire, so the promise is true in principle but not observable on a packet
      capture,
    motivation: >
      I want every node's agent to enforce both halves of every flow it touches
      via a single universal agent-light L4 proxy (ADR-0069). OUTBOUND, the
      workload's connect() is transparently intercepted (cgroup_connect4 rewrite)
      to a node-local agent leg; the agent drains the workload's plaintext
      losslessly into a bounded userspace buffer, performs the rustls TLS 1.3
      CLIENT handshake with the real peer presenting the workload's held SVID
      (read via IdentityRead, leaf key per ADR-0063 D9), arms kTLS on the
      peer-facing leg, and hands the steady-state byte movement to the kernel
      (forward agent-IDLE via an in-kernel sockmap egress redirect into the
      kTLS-armed leg; return agent-LIGHT via a zero-copy splice pump on a plain
      kTLS-RX leg). INBOUND, the connection aimed at a server workload's logical
      address is transparently intercepted via TPROXY to the agent's
      IP_TRANSPARENT listener; the agent recovers the original destination
      (getsockname), selects that server workload's held SVID, performs the
      rustls TLS 1.3 SERVER handshake (presents the server SVID AND
      requires-and-verifies the client's presented SVID chains to the trust
      bundle via WebPkiClientVerifier), arms kTLS-RX, and splices the decrypted
      plaintext to the identity-unaware server workload (agent-light). BOTH
      workloads are identity-unaware and hold NOTHING (no cert, no key — each
      holds an ordinary plaintext socket to its node's agent); the agent holds
      the leaf key and the kTLS state on its own legs; and a handshake against an
      absent SVID (the client side) or a missing/untrusted client cert (the
      server side) fails closed — no cleartext reaches the peer wire,
    outcome: >
      so design principle 3 is OPERATIONALLY TRUE ON THE WIRE for v1 host-socket
      (process/exec) workloads, in BOTH directions — provable by a wire capture
      showing TLS 1.3 records (content type 0x17), zero cleartext of the payload
      on the peer-facing leg, between two workloads — and principle 2's "mTLS is
      in-kernel and cannot be disabled" is real, not aspirational: the SAME TLS
      1.3 session that authenticated carries the data (auth-session ==
      data-session — the rustls handshake's extracted secrets ARE the kTLS keys
      on the agent's peer-facing leg), the steady-state crypto runs in the kernel
      via kTLS, the agent is AGENT-LIGHT (idle on the forward path, ~1 splice per
      TLS record on the return/deliver path — not a per-byte userspace proxy),
      and the security claim is HONEST: v1 authenticates chain-to-trust-bundle
      ONLY (the peer is SOME valid cluster workload) with NO intended-peer
      identity pinning (a routing bug / VIP collision / valid-but-unintended SVID
      is NOT prevented in v1 — that gap closes with the #178 SAN-match upgrade,
      not a v1 prereq). This is the on-the-wire ENFORCEMENT peer of the
      mint(J-SEC-001)/hold(J-SEC-002) chain — 001 mints identity, 002 holds/reads
      it, 003 consumes it to encrypt the wire. The proxy is UNIVERSAL across
      workload kinds by construction (ADR-0069 folded #222 into #26): a future
      WASM driver's host-socket workloads are auto-covered by the same outbound
      mechanism, and guest-stack (microVM/unikernel) routes through the same
      proxy via a STAGED guest-stack intercept adapter (#222). v1 does NOT
      provide restart-survival (the agent owns both legs + the kTLS state; an
      agent restart drops in-flight sessions, which re-handshake on reconnect)
      and carries a 2-sockets-per-connection density cost — both are the accepted
      trade for uniformity + losslessness over the superseded in-band model's
      restart-survival + 1-socket density (a tracked future optimization).
    job_dimensions:
      functional: >
        OUTBOUND (client side): (a) the workload's connect() is transparently
        intercepted (cgroup_connect4 rewrite) to the agent's plaintext leg
        (leg F); (b) the agent drains the pre-arm plaintext losslessly into a
        bounded userspace buffer, performs a rustls TLS 1.3 CLIENT handshake on
        the peer-facing leg (leg B) presenting the held SVID (read via the
        IdentityRead port) and verifying the peer chains to the trust bundle;
        (c) the agent arms kTLS on leg B (setsockopt TCP_ULP "tls" then
        TLS_TX/TLS_RX, in that order — SOCKMAP membership before TCP_ULP for the
        forward path), flushes the captured plaintext as the first
        application_data, and hands steady state to the kernel (forward
        agent-idle sockmap egress redirect F→B; return agent-light splice
        B→pipe→F). INBOUND (server side): (a) the connection aimed at a server
        workload's logical address is transparently intercepted via TPROXY to
        the agent's IP_TRANSPARENT listener (leg C); (b) the agent recovers the
        original destination via getsockname() and selects that server
        workload's AllocationId → held SVID; (c) the agent performs a rustls
        TLS 1.3 SERVER handshake presenting the server SVID and
        requiring-and-verifying the client's SVID chains to the trust bundle
        (WebPkiClientVerifier REQUIRE+VERIFY), arms kTLS-RX, and splices the
        decrypted plaintext to the identity-unaware server workload (leg S,
        agent-light). BOTH directions: (d) the peer-facing leg carries TLS 1.3
        Application Data records (0x17), NOT cleartext of the payload; (e) the
        workload's plaintext lives only on the host-internal leg F / leg S by
        design; (f) a handshake against an absent SVID (outbound) or a
        missing/untrusted client cert (inbound, fail-closed on nocert/wrongca)
        fails closed with no plaintext to the peer / to the server workload; (g)
        the bounded pre-arm buffer, handshake deadline, and per-allocation
        in-flight ceiling are enforced fail-closed; (h) the agent's own leg-B
        dial is NOT re-intercepted (no recursion) and the workload CANNOT
        self-exempt the intercept.
      emotional: >
        Trust that "mTLS is default and cannot be disabled" and "every packet
        carries identity" are now TRUE ON THE PEER WIRE in BOTH directions —
        provable by a packet capture Sam runs himself (tcpdump shows TLS 1.3
        0x17 records and zero payload cleartext on the peer leg; ss -tie shows
        tcp-ulp-tls 1.3 aes-gcm-256 on the agent's leg) — not a claim he has to
        take on faith. Security he cannot accidentally turn off, and a workload
        cannot evade. Honest about its boundary: he knows v1 proves "the peer is
        a valid cluster workload, encrypted end-to-end," NOT "the peer is the
        exact one I meant" — and he is told so plainly rather than sold an
        intended-peer guarantee v1 does not hold.
      social: >
        Tell a security reviewer "encryption uses the SAME TLS 1.3 session that
        authenticated the workload (auth-session == data-session), terminated
        in-kernel via kTLS on the agent's peer-facing leg, sidecarless, with the
        agent AGENT-LIGHT (kernel-splice forward, ~1 splice per record return) —
        not a userspace proxy copying every byte like ztunnel/Istio — and the v1
        claim is precisely chain-to-bundle transport authentication +
        encryption, no intended-peer pinning (that's the #178 upgrade)" — and
        have a wire capture prove it, with no overclaim a reviewer can puncture.
    four_forces:
      push: >
        Identity is now mintable (J-SEC-001) and held/readable (J-SEC-002), but
        NOTHING consumes it on the wire — design principles 2 (in-kernel,
        undisableable mTLS) and 3 (every packet carries identity) are
        aspirational until an enforcer ships. A CA + a holder with no enforcer
        is a chain whose last link is missing: the held SVID is never presented,
        the bytes are never encrypted with it, and a packet capture would show
        cleartext.
      pull: >
        A single universal agent-light L4 proxy (ADR-0069) enforces both
        directions: transparent intercept (cgroup_connect4 outbound / TPROXY
        inbound) → the agent does the rustls TLS 1.3 handshake presenting the
        workload's held SVID → kTLS arms on the agent's peer-facing leg → the
        kernel carries steady-state crypto (forward agent-idle, return/deliver
        agent-light) → the peer wire carries TLS 1.3 records, with both workloads
        holding nothing. ONE mechanism for ALL workload kinds (process/exec now;
        WASM auto-covered when a WASM driver lands; guest-stack via the staged
        #222 adapter) — strictly better than ztunnel/Istio (whose userspace proxy
        copies every byte for the connection's life) on the steady-state path,
        and lossless for client-speaks-first flows (the in-band model could not
        be made lossless).
      anxiety: >
        "Has anyone shipped sidecarless in-kernel kTLS where the auth-session IS
        the data-session and the agent then leaves the per-byte path?" — the
        in-band variant (kTLS on the workload's OWN socket, agent fully out) was
        foreclosed as not-lossless and not-universal; the agent-light L4 proxy is
        the shape that is BOTH (ADR-0069). Mitigated: 6 committed Tier-3 spikes on
        a real 7.0 kernel (≥ the pinned 6.18 floor) proved every primitive —
        forward agent-idle sockmap-egress-redirect → kTLS-TX (15/15), return
        agent-light splice on a plain kTLS-RX leg, the SOCKMAP-before-TCP_ULP
        ordering invariant, and the full inbound half (TPROXY intercept +
        orig-dst recovery + server-mTLS + kTLS-RX + agent-light splice-to-server,
        fail-closed on nocert/wrongca). The 6.18 pin (ADR-0068) removes all
        kernel-version anxiety. The ONE thing the spikes did NOT prove is the
        COMPOSITION under a real transparent intercept (increment-e RST'd on the
        intercept lifecycle) — so the composed walking-skeleton is the BLOCKING
        first DELIVER slice, not an assumption.
      habit: >
        Teams reach for sidecar injection (Istio/Linkerd inject Envoy/
        linkerd-proxy into the pod) or the SPIRE Workload API (the workload
        fetches its own SVID over a Unix socket and runs userspace TLS).
        Overdrive's kernel-mediated, workload-holds-nothing model is a different
        shape — the workload is identity-unaware and never touches crypto.
    source: >
      ADR-0069 (transparent mTLS via a universal agent-light L4 proxy — the
      LOCKED mechanism, 2026-06-12; supersedes the in-band sockops+kTLS-on-the-
      workload's-own-socket model as v1; folds #222 into #26 as the staged
      guest-stack intercept adapter; bidirectional host-socket v1); whitepaper
      §7/§8 (amended by ADR-0069 — "one identity model, two enforcement
      mechanisms" collapses to one universal mechanism), §6 addendum; vision.md
      design principles 2 (in-kernel undisableable mTLS) + 3 (every packet
      carries identity); ADR-0068 (pinned 6.18 LTS appliance kernel);
      ADR-0063/0067 (built-in CA / leaf key / IdentityMgr). The 6 committed
      spike findings (foundation of record) under
      docs/feature/transparent-mtls-host-socket/spike/: findings.md (basic
      mechanism + the SOCKMAP-before-TCP_ULP ordering invariant + control
      records), findings-egress-ktls-splice.md (forward agent-idle),
      findings-splice-return.md (return agent-light), findings-userspace-relay.md
      / findings-lossless-hybrid.md (lossless handshake-window capture; the
      in-band-lossless foreclosure), findings-inbound-intercept.md (the inbound
      half — TPROXY intercept + orig-dst recovery + server-mTLS + kTLS-RX +
      agent-light splice-to-server, fail-closed on nocert/wrongca). Carve-outs:
      guest-stack workloads (microVM/unikernel) → #222 (the STAGED guest-stack
      intercept adapter of the #26 universal proxy, NOT a separate mechanism);
      intended-peer identity pinning (east-west SPIFFE-ID resolution) → #178 (VIP
      path #61) — v1 is chain-to-bundle authn only; authorization (allow/deny who
      may connect to whom) → BPF-LSM socket_connect #27 fed by policy_verdicts
      #38 (related #49) — a SEPARATE subsystem this feature MUST NOT duplicate;
      in-place SVID rekey / TLS 1.3 KeyUpdate → #229 (v1 = teardown+reconnect);
      certificate-rotation workflow → #40; revocation (CRL/OCSP) → Phase 5;
      multi-node → #36; in-band restart-survival + 1-socket density → a tracked
      future optimization (the superseded model's unique win). Distilled from the
      whitepaper + research + the committed spikes, not from user interviews (per
      the header precedent).
    served_by_phase: 2
    status: active

  - id: J-DOCS-001
    title: "Find an authoritative Overdrive answer fast while evaluating or adopting"
    situation: >
      When I, an engineer evaluating or adopting Overdrive (platform lead
      comparing it to Kubernetes/Nomad, or a new team member onboarding),
      land on overdrive.sh with a concrete question — a concept ("what is
      the intent/observation boundary?"), a how-to ("how do I submit a
      job?"), or an API/CLI detail,
    motivation: >
      I want to find the authoritative answer on the site in seconds —
      via search or browsing — without reading the Rust source, guessing
      from a blog post, or asking in Slack and waiting,
    outcome: >
      so I can make an adoption decision or make forward progress on my
      own, and so my first impression of Overdrive is "this is a serious,
      well-documented platform" rather than "I'll have to reverse-engineer
      this."
    source: docs-platform DISCUSS wave (2026-05-30); vision.md "Who this is for"
    served_by_phase: docs-platform
    status: active

  - id: J-DOCS-002
    title: "Have my coding agent pull authoritative, current Overdrive docs as task context"
    situation: >
      When I, a developer building against Overdrive with an AI coding
      agent in my terminal/IDE (Claude Code, Cursor, etc.), ask the agent
      to do something Overdrive-specific (write a job spec, explain a
      reconciler contract, wire the CLI),
    motivation: >
      I want my agent to query overdrive.sh's docs directly through an MCP
      endpoint — searching the corpus and pulling whole pages as grounded
      context — instead of relying on its stale training data or
      hallucinating an API that does not exist,
    outcome: >
      so the code my agent produces is grounded in the real, current
      Overdrive docs (correct CLI verbs, real reconciler shapes, real
      newtype names), I spend less time correcting confident-but-wrong
      output, and Overdrive is a first-class citizen in agent-assisted
      workflows rather than a platform the agent guesses about.
    source: docs-platform DISCUSS wave (2026-05-30); research §1 (custom MCP server)
    served_by_phase: docs-platform
    status: active

  - id: J-DOCS-003
    title: "Prioritise the docs I write next from evidence of what users actually ask"
    situation: >
      When I, the Overdrive docs maintainer / developer advocate, decide
      what documentation to write or improve next,
    motivation: >
      I want evidence of what real users (humans searching, and agents
      querying via MCP) actually ask for — the queries, their frequency,
      whether they found an answer, and the follow-up trajectory — rather
      than guessing or relying on a noisy support channel,
    outcome: >
      so I prioritise docs work by real demand, close the highest-impact
      coverage gaps first, and can prove the docs platform is improving the
      evaluator and agent experiences over time instead of accumulating
      pages nobody reads.
    source: docs-platform DISCUSS wave (2026-05-30); research §1.3.1 (analytics loop)
    served_by_phase: docs-platform
    status: active

changelog:
  - date: 2026-04-21
    change: Initial job register for phase-1-foundation DISCUSS wave.
  - date: 2026-04-23
    change: >
      Added J-OPS-002 for phase-1-control-plane-core — the
      engineer-facing counterpart of J-PLAT-001/2/3, which cover the
      DST-facing walking-skeleton outcomes.
  - date: 2026-04-27
    change: >
      Added J-OPS-003 for phase-1-first-workload — the execution-layer
      counterpart of J-OPS-002. J-OPS-002 covered "platform commits
      things"; J-OPS-003 covers "platform runs things and converges."
  - date: 2026-04-27
    change: >
      Tightened J-OPS-003 to single-node phrasing per scope correction
      — Phase 1 has exactly one local node (control plane and worker
      co-located on the same machine); no operator-facing node
      registration verb. Multi-node, multi-region, and node
      registration are explicit non-goals for Phase 1.
  - date: 2026-05-05
    change: >
      Activated J-PLAT-004 (status: deferred → active) tied to
      phase-2-xdp-service-map (GH #24). Phase 2.2 is the first slice
      where a non-trivial reconciler — the SERVICE_MAP / BACKEND_MAP /
      MAGLEV_MAP hydrator — needs ESR-shaped invariants against
      SimDataplane in DST. The hydrator's pure-reconcile +
      action-shim shape is the §18 reference implementation that
      every later dataplane reconciler (POLICY_MAP, IDENTITY_MAP,
      FS_POLICY_MAP) will mirror, so J-PLAT-004 transitions from
      "deferred placeholder" to "served by an active feature." Source
      extended to whitepaper §7 (BPF Map Architecture — hydration as
      reconciler) alongside §18.
  - date: 2026-05-24
    change: >
      Added J-OPS-004 for service-health-check-probes (GH #170). The
      Service-honesty sub-job extends J-OPS-003 to address RCA root
      cause A
      (docs/analysis/root-cause-analysis-coinflip-submit-reports-running-on-exit-1.md):
      kernel-accepted exec is NOT operator-meaningful liveness. The
      job introduces declarative HTTP / TCP / Exec probes per startup
      / readiness / liveness roles on Service kind only, with default
      TCP-connect startup probe inference when no probes are declared.
      Supersedes GH #169's rejected settle-window primitive (operator
      framing rejected synthetic-timer shape in favour of k8s-shape
      declarative probes).
  - date: 2026-05-30
    change: >
      Bootstrapped the J-DOCS-* job family for the docs-platform feature
      (overdrive.sh documentation/marketing/agent-discovery site). This is
      a different KIND of job than the platform-internal J-PLAT-*/J-OPS-*
      jobs: these jobs are about DOCS CONSUMERS, not the Rust platform
      itself. Added J-DOCS-001 (human evaluator/adopter finds an
      authoritative answer fast), J-DOCS-002 (a developer's coding agent
      pulls grounded Overdrive docs via MCP), and J-DOCS-003 (the docs
      maintainer prioritises from MCP/search analytics evidence). Existing
      entries unmodified.
  - date: 2026-06-04
    change: >
      Added J-SEC-001 for the built-in-ca feature (GH #28, roadmap Phase
      2.6). This is the first J-SEC-* job: it covers the platform's
      built-in X.509 certificate authority — root CA generation +
      envelope-encrypted key at rest, per-node intermediate CA at
      bootstrap, and workload SVID issuance with SPIFFE URI SANs. Unlike
      the J-PLAT-*/J-OPS-* DST/control-surface jobs, J-SEC-001 is a
      security-primitive job underpinning design principle 3 (structural
      security), strategic pillar 2 (SPIFFE→billing), and the enterprise
      FIPS tier. Authored with full JTBD dimensions (functional/emotional/
      social + four forces) per the DISCUSS wave decision, distilled from
      whitepaper §4/§8/§19 — not from user interviews. The CA primitive
      supersedes the Phase-1 ephemeral in-process CA (ADR-0010). Certificate
      ROTATION (workflow, GH #40, depends on workflow primitive GH #39),
      operator cert minting (Phase 5/7), gossip revocation (Phase 5), and
      the mTLS handshake consumer are explicit non-goals — see
      docs/feature/built-in-ca/feature-delta.md § Out-of-scope.
  - date: 2026-06-05
    change: >
      DIVERGE for unconnected-udp-sendmsg4 (GH #200) extracted the
      same-host UNCONNECTED-UDP reachability job and elevated it under the
      existing J-OPS-004 (operator-trust reachability) + J-PLAT-004
      (Sim≡kernel equivalence) — NO new job minted (per the
      udp-service-support D5 precedent: one job spans the protocol/syscall-
      idiom dimension; a per-idiom job would fragment J-OPS-004). The job:
      a same-host client's datagram to a service VIP must reach a healthy
      backend, and the reply must appear to come from the VIP, REGARDLESS
      of whether the client connected first — the canonical DNS-resolver
      idiom (sendto(VIP) per query, no connect()) that ADR-0053's connect4
      path does not intercept. J-OPS-004 source annotated to cite #200 /
      unconnected-udp-sendmsg4. The DIVERGE recommended Option 2 (sendmsg4
      + recvmsg4 bidirectional rewrite); recvmsg4 found load-bearing for
      source-validating clients via kernel commit 983695fa6765. See
      docs/feature/unconnected-udp-sendmsg4/.
  - date: 2026-06-05
    change: >
      Added J-PLAT-005 for the workflow-primitive feature (GH #39),
      bootstrapped by the DIVERGE wave. The strategic/physical-level job
      behind "Workflow trait + durable journal + typed signals +
      workflow-lifecycle reconciler": drive a finite, ordered,
      side-effecting platform sequence to a terminal result exactly-once,
      crash-resumable on any node, without hand-rolling a state machine
      per sequence. Peer to J-PLAT-004 (reconciler ESR) — workflows
      orchestrate terminal sequences, reconcilers converge. Six ODI
      outcomes (O1-O6); O1/O2/O4 are the exactly-once core, O5 ties to
      the DST replay-equivalence obligation, O6 surfaces the
      journal-store tension (libSQL vs redb, given ADR-0035 moved the
      reconciler primitive off libSQL). served_by_phase: 3. Existing
      entries unmodified.
  - date: 2026-06-05
    change: >
      workflow-primitive DISCUSS wave (J-PLAT-005, no re-derivation of the
      job — JTBD validated in DIVERGE). JTBD-to-Story bridge: the six ODI
      outcomes O1-O6 are mapped onto the user stories US-WP-1..US-WP-5 (see
      docs/feature/workflow-primitive/feature-delta.md). Created the
      platform-engineer persona docs/product/personas/devon-platform-engineer.yaml
      (NEW persona kind — platform-internal author + operator, distinct from
      the app-developer/evaluator J-DOCS personas) and the journey
      docs/product/journeys/author-a-durable-workflow.yaml. SCOPE
      back-propagation: J-PLAT-005 outcome O2 ("no lost committed step on
      cross-node resume") is a multi-node property; the codebase is Phase-1
      single-node, so DISCUSS scopes the IN-SCOPE core to single-node
      crash-resume (kill the process, restart, resume from the redb
      journal) and surfaces cross-node resume as a sequencing dependency on
      HA/multi-node (tracked in GH #205) — NOT promised in any Phase-1
      acceptance criterion. The job statement itself (served_by_phase: 3) is
      unchanged. Existing entries unmodified.
  - date: 2026-06-08
    change: >
      Added J-SEC-002 for the workload-identity-manager feature (GH #35,
      roadmap step 2.13), minted by the DIVERGE wave. VERDICT: this is a
      NEW, DISTINCT job — NOT the consumer surface of J-SEC-001. The
      DIVERGE Phase-1 analysis weighed two framings (extend J-SEC-001 vs
      mint a new job) and chose to mint J-SEC-002 on three grounds: (1)
      different JTBD progress + failure mode — J-SEC-001 is forgery-
      resistance / no-external-PKI (failure = a forgeable identity), while
      J-SEC-002 is liveness/availability/lifecycle-binding of identity for
      the running set (failure = a running-but-unidentifiable workload, a
      stopped-but-key-leaking workload, or a consumer that cannot read the
      credential it must present) — the two are independently satisfiable
      and independently failable; (2) different actor-circumstance — the
      trigger is the allocation Running↔Stopped lifecycle transition, not
      the absence of a CA; (3) the roadmap + whitepaper already treat them
      as distinct primitives (step 2.6 CA / #28 vs step 2.13 IdentityMgr /
      #35, #35 Depends on #28). The udp-sendmsg4 precedent (elevate under
      an existing job rather than mint a new one, 2026-06-05) was
      considered and found NOT to apply — that was the SAME reachability
      job at finer granularity (same progress, same failure mode); this is
      a genuinely distinct job, so collapsing it under J-SEC-001 would
      over-correct. J-SEC-002 carries a relates_to: J-SEC-001 link
      (consumer of the CA primitive), full functional/emotional/social
      dimensions, and six ODI outcomes O1-O6 (O1/O2/O3 the high-
      opportunity under-served core: holding, dropping, and reading
      identity is entirely unbuilt today). served_by_phase: 2. The DIVERGE
      recommended Option 1 (standalone SvidLifecycle reconciler + typed
      Action::IssueSvid/DropSvid + action-shim executor → shared
      Arc<IdentityMgr>; consumers read via sync getters behind an
      IdentityRead port; rotation deferred to #40 as a no-op
      Action::StartWorkflow). Existing entries unmodified. See
      docs/feature/workload-identity-manager/.
  - date: 2026-06-11
    change: >
      Added J-SEC-003 for the transparent-mtls-host-socket feature (GH #26,
      roadmap step 2.4), authored by the DISCUSS wave. (HISTORICAL — this entry
      records the DISCUSS-wave authoring on the in-band kTLS-on-the-workload's-
      own-socket model; SUPERSEDED 2026-06-12 by ADR-0069, the universal
      agent-light L4 proxy — see the next entry. The job ENTRY itself is
      re-grounded to the proxy model.) This is the on-the-wire ENFORCEMENT peer
      of the J-SEC-001 (mint, #28) / J-SEC-002 (hold/read, #35) chain: 001 mints
      a forgery-proof SVID, 002 holds it bound to the running set and exposes it
      via the IdentityRead port, and J-SEC-003 CONSUMES that held identity to
      encrypt the wire. As authored (the in-band model, since superseded): the
      node agent performed the rustls TLS 1.3 handshake presenting the held SVID
      and installed kTLS on the workload's own socket. carries relates_to:
      J-SEC-002 + full functional/emotional/social dimensions + four forces.
      SCOPE as authored (since corrected by ADR-0069): host-socket only, with
      guest-stack as a separate #222 feature; in-place SVID rekey / TLS 1.3
      KeyUpdate is #229 (userspace rustls/ktls bridge gap — kernel-side IS
      present at v6.18 per ADR-0068; v1 = teardown+reconnect); certificate-
      rotation workflow is #40; revocation is Phase 5; multi-node is #36.
      Grounded in the post-ADR-0068 reality (6.18 pin removes kernel-version
      anxiety, NOT the stale #26 issue body's "5.10 floor / KeyUpdate-must-be-
      handled / fd-acquisition-differs-per-kind" framing). The DISCUSS wave left
      the mechanism un-pinned for the DESIGN wave to settle empirically.
      served_by_phase: 2. Existing entries unmodified. See
      docs/feature/transparent-mtls-host-socket/.
  - date: 2026-06-12
    change: >
      RE-GROUNDED J-SEC-003 to the DESIGN-decided mechanism (ADR-0069 —
      transparent mTLS via a universal agent-light L4 proxy). The DISCUSS-wave
      job was authored on the in-band "kTLS on the workload's OWN socket, agent
      fully out, restart-survivable, host-socket/outbound only, WASM in-scope"
      model, which ADR-0069 SUPERSEDED as v1 (retained only as a tracked future
      optimization). The CORE job is UNCHANGED (consume the held SVID to encrypt
      the wire in-kernel, auth-session == data-session, workload holds nothing,
      provable on the wire, relates_to J-SEC-002 as an IdentityRead reader). What
      changed in the dimensions/forces/outcome: (1) mechanism = agent-light L4
      PROXY (kTLS on the agent's peer-facing leg, NOT the workload's socket); (2)
      agent is LIGHT not OUT (forward agent-idle kernel splice; return/deliver
      agent-light ~1 splice per record, scheduled per-record for the connection's
      life); (3) BIDIRECTIONAL v1 (outbound cgroup_connect4 + inbound TPROXY
      server-mTLS, both spike-proven); (4) NO restart-survival in v1
      (2-sockets/connection; the agent owns both legs + kTLS state); (5) HONEST
      security claim = chain-to-bundle transport authn + encryption, NO
      intended-peer pinning (the wrong-but-valid-peer case is NOT protected in
      v1 — that is the #178 upgrade); (6) authorization is OUT of scope
      (#27/#38); (7) workload kinds = process/exec ONLY in v1 — WASM dropped as a
      distinct concern (auto-covered by the same proxy once a WASM driver lands),
      guest-stack STAGED to #222 as the guest-stack intercept adapter of the ONE
      universal proxy (NOT a separate mechanism). Anchored on the 6 committed
      Tier-3 spike findings. Driven by design/upstream-changes.md (the architect's
      back-propagation handoff) + design/review-adversarial-2026-06-12.md F1
      (CRITICAL — the stale executable handoff artifacts could otherwise lead a
      crafter to implement the superseded system). Source re-pointed to ADR-0069
      + the spike findings. served_by_phase unchanged (2). Other entries
      unmodified.
