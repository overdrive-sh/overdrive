schema_version: 1

# Persona for the built-in-ca feature (GH #28) and future J-SEC-* jobs.
#
# This is the platform-internal security engineer arc — distinct from the
# docs-consumer personas (priya-evaluator, maya-agent-developer). Sam is the
# person who builds AND operates the platform's identity layer. Where prior
# platform journeys (submit-a-job, trust-the-sim) reference "Ana, Overdrive
# platform engineer", Sam is the same archetype seen through a security lens:
# the engineer who has to defend "how does identity work, and is it real?" to
# a security reviewer and to themselves.
#
# Origin: built-in-ca DISCUSS wave (2026-06-04). Distilled from whitepaper
# §4/§8/§19 and vision.md, not from user interviews.
#
# Reused (not forked) by the workload-identity-manager DISCUSS wave
# (2026-06-08) for J-SEC-002 — see related_jobs + the j_sec_002_lens block.
# J-SEC-001 is Sam's "is identity FORGERY-PROOF, with no external PKI?" lens;
# J-SEC-002 is the same engineer's "is the running set consistently
# identity-BEARING — held, readable, dropped on stop — and is that CHECKED?"
# lens (liveness/availability, not existence/forgery-resistance).

persona:
  id: sam-platform-security-engineer
  name: "Sam Okafor"
  role: "Platform / security engineer building and operating Overdrive's identity layer"
  one_liner: >
    Owns the trust story for an Overdrive deployment. Has run SPIRE +
    cert-manager + Vault in a previous life and remembers every 3am page
    caused by an expired intermediate or a misconfigured trust bundle.
    Wants workload identity to be a built-in property of the platform —
    forgery-proof by construction — not a second distributed system bolted
    on beside it.

  characteristics:
    - "10+ years platform/SRE with a security specialism; has operated a production PKI and hated it"
    - "Reads RFCs and the SPIFFE X.509-SVID spec directly; will not accept hand-waving about cert profiles"
    - "Threat-models by default — asks 'what can a compromised workload do?' before 'does the happy path work?'"
    - "Distrusts security that must be remembered/configured; trusts security that is structural and cannot be turned off"
    - "Will personally verify a chain with `openssl verify` rather than take the platform's word for it"

  context:
    device: "Laptop + terminal; a Lima/Linux VM for the real-kernel surface; openssl and step CLI always within reach"
    entry_points:
      - "Building the CA primitive itself (the crafter persona) — writing the port trait + host adapter over rcgen"
      - "Standing up a new Overdrive cluster and asking 'where does workload identity come from, and is the root key safe?'"
      - "Preparing a security review / FIPS attestation and needing to point at a real, correct trust hierarchy"
    triggers:
      - "A new deployment that must carry cryptographic workload identity (billing, policy, mTLS all depend on it)"
      - "A security reviewer asking 'show me the cert chain and how the root key is protected'"
      - "The Phase-1 ephemeral CA (ADR-0010) proving insufficient — it dies on restart and has no SPIFFE identity"

  motivations:
    functional: "Get a real, persistent Root CA → Node Intermediate → Workload SVID chain that validates back to the root, minted by the platform itself with no external PKI to operate"
    emotional: "Trust that identity is forgery-proof by construction — sleep through the night because expiry, not operator vigilance, is the security boundary"
    social: "Tell a security reviewer 'identity is a built-in SPIFFE-compliant CA with an envelope-encrypted root key and pathLen-constrained intermediates' — and have it be verifiably true"

  emotional_arc:
    start: "Skeptical and threat-modelling — 'a self-built CA? show me it is actually correct and that the root key is not sitting in plaintext on disk.'"
    middle: "Reassured incrementally — the root CA generates and its key round-trips through envelope decryption; the node intermediate is pathLen-constrained; the SVID carries exactly one SPIFFE URI SAN; `openssl verify` accepts the chain."
    end: "Confident and quietly relieved — 'this is a real trust hierarchy I can defend in a review, and there is no second daemon for me to operate or page on.'"

  frustrations_to_avoid:
    - "A root CA private key stored unencrypted, or encrypted with an unauthenticated cipher (integrity matters as much as confidentiality)"
    - "A leaf SVID with zero or more-than-one URI SAN (the SPIFFE spec's single hardest constraint — a multi-URI SVID must be rejected)"
    - "An intermediate that can mint further intermediates (no pathLen constraint) — unbounded blast radius on node compromise"
    - "A chain that does not actually verify back to the root, or a trust bundle that silently omits the root"
    - "Aspirational security docs describing rotation/revocation that is not built yet (erodes trust in the whole claim)"
    - "Being forced to operate a separate identity stack (SPIRE/Vault) alongside the platform that promised to absorb it"

  success_signals:
    - "A workload's SVID chain-verifies to the root with a standard tool (openssl verify), independent of the platform's own assertion"
    - "The root CA key is never observable in plaintext at rest — only the envelope-encrypted blob is on disk"
    - "Re-issuing an SVID on demand produces a fresh, valid leaf without restarting the control plane"
    - "Zero external identity components to deploy, monitor, or upgrade"

  related_jobs: [J-SEC-001, J-SEC-002, J-SEC-003]

  # J-SEC-002 lens (workload-identity-manager, GH #35). Same engineer, a
  # liveness/availability lens rather than the forgery-resistance lens of
  # J-SEC-001. Sam's questions here are about the RUNNING SET, not the trust
  # hierarchy's correctness (which #28 settled).
  j_sec_002_lens:
    questions_sam_asks:
      - "Is the running set CONSISTENTLY identity-bearing — is the window between Running and identity-held bounded and fail-closed (a workload with no held SVID cannot present identity), not an open exposure?"
      - "When a workload stops, is its leaf private key actually gone from memory, or lingering as dead weight / attack surface?"
      - "Can the dataplane (sockops/kTLS mTLS, gateway, telemetry) read the current SVID + trust bundle the INSTANT it must present identity — in-process, no re-issue per read?"
      - "Is identity availability CHECKED by a convergence invariant, or merely asserted? Does it survive a control-plane restart without redundant re-issue?"
    success_signals:
      - "A running allocation demonstrably holds a chain-verifiable SVID (the issued_certificates row is written and openssl verify of the leaf chain exits 0 at the test tier; the operator alloc status render of that row is #215's, blocked on #35), and a stopped allocation holds none."
      - "A DST assert_eventually!(\"running allocs hold a valid SVID\") invariant fails the build if a Running allocation lacks a held SVID — availability is mechanically checked, not asserted."
      - "Every issuance leaves an observable audit row; an unauditable issuance is refused (no silent issuance)."
      - "Identity survives a control-plane restart, recomputed from persisted issuance INPUTS, with no redundant re-issue."
    frustrations_to_avoid:
      - "A window where a running workload is unidentifiable on the wire (held set transiently missing it with no bounded convergence)."
      - "A stopped workload's leaf private key surviving in memory after the workload is gone."
      - "A read surface that re-issues a fresh cert per read (latency on the connection hot path) or cannot be exercised in tests."
      - "A View that persists a derived expires_at instead of issuance inputs — silently binding the held set to today's TTL policy."

  # J-SEC-003 lens (transparent-mtls-host-socket, GH #26). Same engineer, an
  # ON-THE-WIRE ENFORCEMENT lens — not "is identity held?" (#35) but "is the
  # wire ACTUALLY encrypted with the held identity, in-kernel, with no
  # cleartext leak?". Sam's questions here are about the PACKET CAPTURE and the
  # data path, not the held set. Re-grounded to ADR-0069 (2026-06-12): the
  # enforcement mechanism is a UNIVERSAL AGENT-LIGHT L4 PROXY, BIDIRECTIONAL in
  # host-socket v1 (outbound client half + inbound server half). v1 workload
  # kinds = process/exec ONLY (ExecDriver is the only driver). There is NO
  # distinct WASM mTLS path — WASM host-socket workloads are auto-covered by the
  # SAME proxy once a WASM driver lands. Guest-stack (microVM/unikernel) is a
  # STAGED intercept adapter of the same proxy under #222, NOT a separate
  # out-of-scope mechanism. Both workloads are identity-unaware and hold
  # nothing; each node's agent does its side. kTLS arms on the AGENT'S
  # peer-facing leg (NOT the workload's own socket — that in-band model is
  # superseded, #231). The agent is AGENT-LIGHT (forward agent-idle kernel
  # splice; return/deliver splice+ppoll, no per-byte userspace copy), NOT
  # agent-out. v1 authenticates chain-to-trust-bundle only — NO intended-peer
  # SAN pinning (that is the #178 upgrade).
  j_sec_003_lens:
    questions_sam_asks:
      - "Does a packet capture (tcpdump on the peer-facing leg) ACTUALLY show TLS 1.3 Application Data records between two host-socket (process/exec) workloads — not cleartext — in BOTH directions (outbound client half AND inbound server half) — or is the encryption claim aspirational?"
      - "Is the auth-session the data-session — does the SAME TLS 1.3 session that authenticated the workload carry the bytes, terminated in-kernel via kTLS on the AGENT'S peer-facing leg (ss -tie shows the ULP), with the agent AGENT-LIGHT (forward agent-idle kernel splice; return/deliver splice+ppoll, no per-byte userspace copy) — not a ztunnel-shape userspace proxy copying every byte forever?"
      - "Is NO cleartext byte leaked on the wire before kTLS is installed (the plaintext race window before kTLS arms on the agent's leg) — fail-closed for confidentiality?"
      - "Does a handshake against an absent or wrong (untrusted, chain-fails-to-bundle) SVID FAIL CLOSED — no plaintext fallback, no cleartext egress?"
      - "Is the agent-light proxy ACTUALLY enforcing kTLS on the agent's leg, fail-closed, chain-to-bundle — proven by a composed real-intercept walking skeleton on the pinned 6.18 kernel — and is the honest v1 boundary stated plainly: chain-to-trust-bundle transport authn + encryption ONLY, NO intended-peer SAN pinning (a valid-but-unintended SVID is NOT prevented in v1; that is #178)?"
    success_signals:
      - "A tcpdump capture on the peer-facing leg shows TLS 1.3 records (content type 0x17), never the cleartext payload, between two host-socket (process/exec) workloads at the test tier — in BOTH directions (outbound and inbound)."
      - "ss -tie shows the kTLS ULP (tcp-ulp-tls 1.3 aes-gcm-256) installed on the AGENT'S peer-facing leg (leg B outbound / leg C inbound), NOT the workload's own socket; the workload holds NOTHING (no cert, no key) and the agent is AGENT-LIGHT (idle on the forward splice; splice+ppoll only on return/deliver) — never a per-byte userspace copy."
      - "A race-window probe (write() immediately on connect() return, deliberately delayed kTLS install) shows zero cleartext bytes on the wire before kTLS arms on the agent's leg — fail-closed for confidentiality."
      - "A negative test (absent/missing/untrusted SVID that fails to chain to the trust bundle) shows the handshake fails closed — no TLS Application Data and no cleartext on the wire."
      - "The composed walking skeleton proves a real intercepted process/exec flow goes TLS 1.3 on the peer wire with NO RST on the pinned 6.18 kernel: agent-light kTLS arms on the agent's leg, fail-closed, chain-to-bundle — and the platform states plainly this is chain-to-trust-bundle authn + encryption ONLY, with NO intended-peer pinning (#178)."
    frustrations_to_avoid:
      - "A packet capture showing cleartext (or the plaintext probe string) on the wire — the encryption claim must be provable, not asserted."
      - "A userspace proxy quietly copying every byte for the whole connection (the ztunnel shape) when the promise is 'agent-light, encryption in-kernel via kTLS on the agent's leg' — the forward path must be agent-idle kernel splice and the return/deliver path splice+ppoll with no per-byte copy."
      - "A cleartext byte egressing before kTLS is armed on the agent's leg (the plaintext race window left open)."
      - "A handshake that falls back to plaintext on an absent/missing/untrusted SVID instead of failing closed."
      - "Overclaiming the v1 boundary — implying intended-peer pinning when v1 is chain-to-trust-bundle transport authn + encryption ONLY (a valid-but-unintended SVID is NOT prevented until #178); the honest boundary must be stated, not glossed."
      - "Aspirational docs claiming the composed agent-light proxy path works without a Tier-3 spike / composed walking skeleton proving it on the real pinned 6.18 kernel first (the issue mandates spike-first)."
