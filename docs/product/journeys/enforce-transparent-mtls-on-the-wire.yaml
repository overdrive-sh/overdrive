schema_version: 1

# Product-level journey for transparent host-socket mTLS enforcement (GH #26).
#
# This is the ON-THE-WIRE ENFORCEMENT peer of the mint/hold chain:
#   - issue-workload-identity.yaml      (J-SEC-001 / #28) MINTS identity.
#   - hold-identity-for-the-running-set.yaml (J-SEC-002 / #35) HOLDS the minted
#     identity bound to the running set and makes it READABLE via IdentityRead.
#   - THIS journey  (J-SEC-003 / #26) CONSUMES the held identity to ENCRYPT THE
#     WIRE: sockops detects the host-socket connection, the node agent does the
#     rustls TLS 1.3 handshake presenting the held SVID, kTLS installs the
#     session keys on the workload's own socket, the agent EXITS the data path,
#     and the wire carries TLS 1.3 records.
#
# Do NOT extend hold-identity-for-the-running-set.yaml (J-SEC-002) — the two
# jobs are distinct. J-SEC-002 holds/reads/drops identity (failure = a
# running-but-unidentifiable workload, a leaked stopped key, a consumer that
# cannot read the credential). J-SEC-003 enforces it on the wire (failure =
# cleartext on the wire, a plaintext race window, a handshake that does not
# fail closed). J-SEC-003 is a READER of the IdentityRead port J-SEC-002 ships.
#
# SCOPE — host-socket workloads ONLY (process via exec driver; WASM via
# wasmtime — whose TCP terminates in the HOST kernel, so sockops/kTLS reach
# them). Explicit carve-outs (referenced by issue #, NOT pulled in):
#   - Guest-stack workloads (microVM / unikernel — TCP terminates in the GUEST
#     kernel, invisible to host sockops) -> #222 (host L4 tap proxy, a SEPARATE
#     feature; the corrected whitepaper §7 "one identity model, two enforcement
#     mechanisms" split).
#   - In-place SVID rekey / TLS 1.3 KeyUpdate -> #229 (userspace rustls/ktls
#     bridge gap; kernel-side IS present at v6.18 per ADR-0068; v1 = teardown +
#     reconnect on rotation, no in-place rekey).
#   - Certificate-rotation workflow -> #40 (depends on workflow primitive #39).
#   - Revocation (CRL / OCSP) -> Phase 5. Multi-node -> #36.
#
# Like its siblings this is a SECURITY-PRIMITIVE / capability journey, not an
# operator-CLI journey. There is NO operator verb to "encrypt this workload" in
# this phase. #26 is a FOUNDATION feature: its own HONEST observables are
# TEST-tier — wire capture (tcpdump) on the veth showing TLS 1.3 records (not
# cleartext) between two host-socket workloads; `ss -K` showing the kTLS ULP
# installed on the socket; a negative test showing the handshake fails closed on
# a wrong/absent SVID; a race-window probe showing no cleartext byte egresses
# before kTLS install. The security-reviewer-facing wire capture IS the value.
#
# Lightweight depth (D3): happy path + the load-bearing error/race paths, no
# rich human emotional arc (Sam's is the same skeptical->confident
# security-review arc). Maps to J-SEC-003.
#
# SPIKE-FIRST (D2): the walking skeleton is a Tier-3 SPIKE that disproves the
# core hypothesis before any design locks (the issue mandates it). See step 0.
#
# Feature origin: transparent-mtls-host-socket DISCUSS wave (2026-06-11). The
# authoritative detailed version lives in
# docs/feature/transparent-mtls-host-socket/feature-delta.md (§ Wave: DISCUSS).
# This file is the product-level summary for cross-feature reference.

journey:
  name: "Encrypt every host-socket workload's wire with its own SVID, in-kernel, agent out of the path"
  goal: >
    For host-socket workloads (process, WASM), the Overdrive node agent turns a
    plaintext TCP connection into a kernel-encrypted TLS 1.3 session carrying the
    workload's own SVID, with the workload holding nothing and the agent out of
    the steady-state data path: kernel sockops detects the connection, the agent
    performs a rustls TLS 1.3 handshake presenting the held SVID (read via the
    IdentityRead port that J-SEC-002/#35 ships) and verifying the peer against
    the trust bundle, the negotiated session keys install into kTLS on the
    workload's own socket (setsockopt TLS_TX/TLS_RX), and the agent exits — so
    "every packet carries cryptographic workload identity" and "mTLS is
    in-kernel and undisableable" are OPERATIONALLY TRUE ON THE WIRE, provable by
    a packet capture, with no cleartext egressing before kTLS install
    (fail-closed) and a handshake against an absent/wrong SVID failing closed.
  persona: >
    Sam, platform/security engineer (see
    docs/product/personas/sam-platform-security-engineer.yaml). Defends the
    on-the-wire enforcement story to a security reviewer through a J-SEC-003
    lens: is the wire ACTUALLY carrying TLS 1.3 records (not cleartext)? is the
    auth-session the data-session (the same TLS 1.3 session that authenticated
    carries the bytes)? is the agent really out of the data path (kernel does
    the crypto)? does NO cleartext leak before kTLS is armed? does the handshake
    fail closed on a wrong/absent SVID? Verifies with tcpdump + ss -K himself.

  emotional_arc:
    start: "Skeptical — 'identity is minted and held, but show me a packet capture: is the wire actually encrypted with the workload's own SVID, in-kernel, with no cleartext leak — and has ANYONE shipped in-band sidecarless kTLS where the agent then leaves the data path?'"
    middle: "Reassured incrementally — the spike proves one process->process flow goes TLS 1.3 on the wire with kTLS installed (ss -K) and no cleartext before install; a wrong/absent SVID fails the handshake closed; the agent is out of the steady-state path."
    end: "Confident — 'the auth-session IS the data-session, encryption is in-kernel via kTLS, the agent is out of the data path, fail-closed is proven by a race-window probe, and a wire capture I ran myself shows TLS 1.3 records — this is the principle made real, not aspirational.'"

steps:
  - id: 0
    name: "SPIKE FIRST — prove in-band sidecarless kTLS is achievable on the pinned kernel for ONE process flow (or fall back)"
    command: "(Tier-3 spike on the 6.18 Lima/LVH kernel; the walking skeleton — runs BEFORE design locks)"
    summary: >
      The issue MANDATES a Tier-3 spike before the design locks, because the
      core mechanism is unshipped anywhere. The thinnest end-to-end cut: for ONE
      process->process flow on the pinned 6.18 kernel, prove the full handoff —
      sockops ACTIVE_ESTABLISHED detected -> the agent acquires the workload's
      socket fd (pidfd_getfd) -> rustls TLS 1.3 handshake presenting the held
      SVID (read via IdentityRead) and verifying the peer -> kTLS install
      (setsockopt TLS_TX/TLS_RX) -> the agent exits -> tcpdump shows TLS 1.3
      Application Data records on the wire — AND the plaintext race window is
      closed fail-closed (no cleartext byte egresses before kTLS install).
      FALSIFICATION (named, load-bearing): if the handoff cannot be made
      race-free for one process flow on our kernel, in-band sidecarless kTLS is
      disproven for Overdrive -> fall back to the Cilium model (out-of-band
      auth + separate encryption, or a userspace proxy that stays in the data
      path). The spike's observable IS the wire capture for one flow.
    emotional_state:
      entry: "Skeptical and threat-modelling — 'in-band sidecarless kTLS is unshipped; the race window may be unclosable. Prove it on a real kernel for one flow before betting the design on it.'"
      exit: "De-risked — 'either the spike proves the handoff is race-free on 6.18 and the design proceeds, or it disproves it and we adopt the documented Cilium fallback — no design locked on a hope.'"

  - id: 1
    name: "A host-socket connection is detected in the kernel and the agent presents the held SVID"
    command: "(internal — on sockops ACTIVE_ESTABLISHED / PASSIVE_ESTABLISHED; the agent reads the held SVID via IdentityRead)"
    summary: >
      When a host-socket workload (process via exec driver; WASM via wasmtime —
      TCP terminates in the host kernel) opens a connection, the kernel sockops
      program detects the ESTABLISHED transition synchronously (before connect()
      / accept() returns to the workload). The node agent acquires the workload's
      socket (process: pidfd_getfd from the sockops-triggered event; WASM:
      in-process host fd) and performs a rustls TLS 1.3 handshake on the
      workload's behalf, PRESENTING the held SVID it reads via the IdentityRead
      port (J-SEC-002/#35's read surface; leaf key per ADR-0063 D9) and verifying
      the peer against the current trust bundle. The workload holds NOTHING and
      is identity-unaware (Overdrive is sidecarless).
    emotional_state:
      entry: "Focused — 'does the kernel actually detect the host-socket connection, and does the agent present the WORKLOAD's identity (the held SVID) — not the node's, not the agent's?'"
      exit: "Reassured — 'sockops detects it in-kernel before the workload can write; the agent presents the held SVID read via IdentityRead — the workload never touches crypto.'"

  - id: 2
    name: "Session keys install into kTLS on the workload's own socket and the agent leaves the data path"
    command: "(internal — setsockopt(TCP_ULP='tls') + TLS_TX/TLS_RX on the workload's socket; agent exits the steady-state path)"
    summary: >
      On a successful handshake the agent installs the NEGOTIATED TLS 1.3 session
      keys into kTLS on the workload's own socket (setsockopt TLS_TX/TLS_RX) —
      the SAME session that authenticated (auth-session == data-session) — and
      then EXITS the data path. From that point the kernel does TLS record
      framing + symmetric crypto autonomously; the agent is out of the
      steady-state byte path (strictly stronger than ztunnel/Istio, whose
      userspace proxy stays in the path for the whole connection). The kTLS ULP
      installed on the socket is observable via `ss -K`.
    emotional_state:
      entry: "Focused — 'is the encryption really IN-KERNEL, with the agent out of the path — or is a userspace proxy quietly handling every byte forever?'"
      exit: "Reassured — 'ss -K shows the kTLS ULP installed; the agent exited; the kernel encrypts the bytes — the auth-session is the data-session.'"

  - id: 3
    name: "The wire carries TLS 1.3 records, provable by a packet capture"
    command: "tcpdump on the veth (TEST tier) shows TLS 1.3 Application Data records, not cleartext"
    summary: >
      Between two host-socket workloads the wire carries TLS 1.3 Application Data
      records (content type 0x17), not cleartext — provable by a tcpdump capture
      on the veth at the TEST tier. This is the security-reviewer-facing
      observable: design principle 3 ("every packet carries cryptographic
      workload identity") and principle 2 ("mTLS is in-kernel and undisableable")
      are now TRUE ON THE WIRE for host-socket workloads, not aspirational —
      proven by a capture Sam runs himself, the same way the J-SEC-002 journey
      proved the held set with `openssl verify` and the issued_certificates row.
    emotional_state:
      entry: "Skeptical — 'does a packet capture ACTUALLY show TLS 1.3 records, or am I taking the platform's word that the bytes are encrypted?'"
      exit: "Confident — 'tcpdump shows TLS 1.3 Application Data records — the wire is encrypted with the workload's own session, provable independent of the platform's assertion.'"

error_paths:
  - step: 2
    failure: "Plaintext race window — between sockops ESTABLISHED firing and kTLS install completing, a workload write() could leak cleartext (sk_msg has only PASS/DROP/REDIRECT, no lossless HOLD; bpf_msg_cork_bytes does not buffer)"
    recovery: >
      The gate is FAIL-CLOSED for confidentiality: the sockops/sk_msg gate is
      inserted synchronously at ACTIVE_ESTABLISHED_CB (in kernel context, before
      connect()/accept() returns to the workload), so no cleartext byte reaches
      the wire before kTLS is armed. The residual is a DATA-LOSS window (writes
      during the 10-100ms agent turnaround are SK_DROP'd, not buffered), closed
      by connection RESET if drops > 0 — request-first protocols (HTTP, gRPC,
      PostgreSQL) retry; the application already handles connection-reset. The
      ACCEPTANCE PROOF (race-window probe, TEST tier): a write() immediately on
      connect() return, captured by tcpdump, shows EITHER TLS 1.3 records OR zero
      application bytes — NEVER the plaintext probe string on the wire; a
      drop-counter signals whether the window fired. On the pinned 6.18 kernel
      (ADR-0068) the OUT-OF-TREE WRITE-BLOCK option (block write() until kTLS is
      armed, lossless backpressure) is legitimate appliance-OS work that would
      close the data-loss window too — a DESIGN option, not pinned here.
      Server-speaks-first protocols (SMTP/FTP/SSH) have an irreducible data-loss
      window without the write-block and are a DESIGN scope call.
  - step: 1
    failure: "Handshake against an absent or wrong SVID — the held SVID is not present for the allocation, or the peer presents a credential that does not chain to the trust bundle"
    recovery: >
      The handshake FAILS CLOSED — no plaintext fallback, no cleartext egress.
      If the IdentityRead read returns absent for the allocation (J-SEC-002's
      bounded convergence window, or a stopped alloc), the agent refuses to drive
      the handshake rather than presenting a stale credential, and the connection
      does not proceed in cleartext. If the peer's certificate does not verify
      against the current trust bundle, rustls aborts the handshake. The
      ACCEPTANCE PROOF (negative test, TEST tier): a flow whose SVID is
      absent/wrong yields NO TLS 1.3 Application Data on the wire and NO
      cleartext — the connection fails closed.
  - step: 2
    failure: "Control-plane / node-agent restart with in-flight kTLS sessions — does the operative crypto survive the agent process bouncing?"
    recovery: >
      kTLS crypto state lives on the SOCKET (icsk_ulp_data), not in the
      configuring agent process — so an in-flight kTLS session survives an agent
      restart IFF the workload (not the agent) owns the socket fd, and the
      sockops bpf_link + maps are bpffs-pinned (research: ktls-sockops-cp-restart
      -survival). The fd-ownership choice is a DESIGN decision (the spike's step-0
      handoff already targets the workload-owns-fd shape). New connections after
      restart re-run the sockops->handshake->kTLS handoff (the held SVID is
      re-readable via IdentityRead). On a FULL NODE REBOOT everything kernel-owned
      is wiped and every connection re-handshakes from scratch — bpffs pins do
      not survive a reboot. This journey ships the host-socket enforcement path;
      the restart-survival GUARANTEE is a DESIGN/spike observable, not promised
      as a Phase-2 acceptance criterion beyond 'new connections re-handshake'.
  - step: 2
    failure: "SVID rotation on a long-lived connection — the held SVID rotates (1h TTL) while a kTLS session is live; in-place TLS 1.3 KeyUpdate is unavailable"
    recovery: >
      v1 = TEARDOWN + RECONNECT, NOT in-place rekey. In-place rekey needs TLS 1.3
      KeyUpdate support in BOTH the kernel (CONFIRMED present at v6.18, ADR-0068)
      AND the userspace rustls/ktls bridge (which does NOT support it yet —
      rustls/ktls#59 / #62, tracked in #229). So on rotation the connection is
      dropped and re-handshaked with the fresh SVID; request-first east-west
      traffic retries (the application already handles connection-reset). This is
      acceptable for v1 and is a TRACKED DEPENDENCY (#229), not an open design
      risk for #26. In-place rekey is DEFERRED to #229, NOT in this journey.

integration_validation:
  shared_artifacts_summary:
    - "SVID / SvidMaterial (the credential presented in the handshake) — single source is J-SEC-002/#35's Arc<IdentityMgr> held map, read via the IdentityRead port (svid_for(&AllocationId)); J-SEC-003 is a READER of this port, never an issuer. The leaf key (ADR-0063 D9) drives the rustls handshake; the workload never holds it. Consumed by the agent's rustls ClientConfig/ServerConfig."
    - "TrustBundle (what the peer is verified against in the handshake) — single source is J-SEC-002/#35's IdentityRead::current_bundle() (hydrated from Ca::trust_bundle()). Consumed by the agent's rustls peer-verification; a peer that does not chain to it fails the handshake closed."
    - "The workload socket fd (the object kTLS installs on) — single source is the workload's own socket (process: acquired via pidfd_getfd from the sockops-triggered event; WASM: in-process host fd). Ownership is load-bearing for restart survival (kTLS state is socket-owned). Consumed by setsockopt(TCP_ULP/TLS_TX/TLS_RX)."
    - "The kTLS crypto_info (negotiated TLS 1.3 session keys / IV / record sequence) — single source is the rustls handshake's extracted secrets (auth-session == data-session). Consumed by setsockopt(TLS_TX/TLS_RX) on the workload socket; observable as the kTLS ULP via ss -K and as TLS 1.3 records via tcpdump."
    - "AllocationId / SpiffeId (which workload's identity to present) — single source is the SpiffeId newtype + the allocation lifecycle (J-SEC-001 derivation spiffe://overdrive.local/job/<name>/alloc/<id>). Consumed as the IdentityRead lookup key and as the SAN the peer sees in the presented SVID."

related_jobs: [J-SEC-003]

related_features:
  - id: transparent-mtls-host-socket
    role: "Ships the host-socket transparent-mTLS ENFORCEMENT mechanism (GH #26, roadmap 2.4): sockops detection -> rustls TLS 1.3 handshake presenting the held SVID -> kTLS install on the workload's socket -> agent exits the data path. The consumer that finally encrypts the wire with the minted+held SVID."
  - id: workload-identity-manager
    role: "Ships the IdentityRead port + Arc<IdentityMgr> held store this journey READS from (GH #35, roadmap 2.13). J-SEC-002 holds/reads/drops; J-SEC-003 consumes it on the wire."
  - id: built-in-ca
    role: "Mints the SVID hierarchy (Root -> per-node Intermediate -> workload SVID) + leaf key (GH #28, ADR-0063) that this journey presents in the handshake. J-SEC-001 mints; J-SEC-003 enforces on the wire."

deferred_outside_this_journey:
  - "Guest-stack workloads (microVM via Cloud Hypervisor, unikernel via Unikraft) — TCP terminates in the GUEST kernel, invisible to host sockops/kTLS -> GH #222 (host L4 tap proxy, a SEPARATE feature). This is the corrected whitepaper §7 'one identity model, two enforcement mechanisms' split: host-socket (#26) and guest-stack (#222) share ONE SPIFFE identity plane but use different enforcement mechanisms. NOT pulled into #26."
  - "In-place SVID rekey / TLS 1.3 KeyUpdate handling on long-lived connections -> GH #229 (userspace rustls/ktls bridge gap — rustls/ktls#59 / #62; kernel-side IS present at v6.18 per ADR-0068). v1 = teardown + reconnect on rotation. A TRACKED DEPENDENCY, not an open design risk."
  - "Certificate-rotation workflow (near-expiry -> mint-fresh -> swap) -> GH #40 (a cert_rotation workflow, depends on workflow primitive GH #39). J-SEC-003 v1 handles rotation by teardown+reconnect; the rotation lifecycle is #40."
  - "SVID revocation (CRL / OCSP / revoked lists) -> Phase 5 (whitepaper §8). Revocation-by-expiry (1h TTL) is the model here."
  - "Multi-node / cross-node mTLS, gossiped trust bundles across nodes, node attestation -> GH #36 [2.14] (node enrollment / admission handler). Single-node Phase 2 = one node's host-socket workloads."
  - "The long-term zero-steady-state-overhead path (Architecture A + custom in-kernel write-block patch closing the data-loss window losslessly) vs the v1 mechanism — the v1-vs-long-term mechanism choice and the server-speaks-first protocol coverage are DESIGN-wave calls, informed by the step-0 spike outcome. Not pinned in DISCUSS."

changelog:
  - date: 2026-06-11
    feature: transparent-mtls-host-socket
    change: >
      Initial product-level journey for the host-socket transparent-mTLS
      enforcement mechanism (GH #26, roadmap 2.4). Maps to J-SEC-003 (the
      on-the-wire ENFORCEMENT peer of J-SEC-001 mint / J-SEC-002 hold — consumes
      the held SVID via the IdentityRead port to encrypt the wire). Lightweight
      depth — security-primitive capability path, no operator-facing 'encrypt
      this workload' verb in this phase; the load-bearing error/race paths
      (plaintext race window, handshake-fail-closed on absent/wrong SVID,
      CP/agent-restart survival of in-flight kTLS sessions, KeyUpdate-unsupported
      -> teardown+reconnect deferred to #229) are mapped. SPIKE-FIRST: step 0 is
      a Tier-3 spike (the walking skeleton) that disproves the in-band
      sidecarless kTLS hypothesis on the pinned 6.18 kernel before any design
      locks, with the Cilium out-of-band-auth + separate-encryption model as the
      documented fallback. Deliberately does NOT extend
      hold-identity-for-the-running-set.yaml (J-SEC-002) — distinct job. Names
      the #222 / #229 / #40 carve-outs. Grounded in the post-ADR-0068 reality
      (6.18 pin removes kernel-version anxiety), NOT the stale #26 issue body.
