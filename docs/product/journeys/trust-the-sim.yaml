schema_version: 1

journey:
  name: "Trust the Sim — proving Overdrive's DST foundation works"
  goal: >
    A Overdrive platform engineer can run `cargo xtask dst` on a clean
    clone, have the harness exercise a multi-node simulated cluster
    against real store implementations (LocalStore + SimObservationStore)
    using injectable Sim* traits for every other source of
    nondeterminism, watch core invariants pass, and trust that a red DST
    run is reproducible from the printed seed.
  persona: "Overdrive platform engineer (Ana, distributed-systems SRE background, primary author of control-plane logic). CI acts as a secondary persona — it runs the same harness pre-merge."

  emotional_arc:
    start: "Skeptical — 'every project claims deterministic testing and almost none deliver it.'"
    middle: "Engaged — each invariant passing is a small confidence deposit."
    end: "Trusting — a red run with a printed seed that reproduces bit-for-bit is the moment the discipline becomes real."

steps:
  - id: 1
    name: "Fresh clone, first DST run"
    command: "cargo xtask dst"
    tui_mockup: |
      $ cargo xtask dst
          Compiling overdrive-core v0.0.0
          Compiling overdrive-sim  v0.0.0
          Finished `dev` profile [optimized + debuginfo]
           Running DST harness (turmoil, 3-node cluster)

          seed: 14923048572033948571
          ticks/run: 60000 (simulated 60s @ 1ms)
          runs: 100

          [  1/100] leader_election_under_partition            ok
          [  2/100] intent_observation_isolation               ok
          [  3/100] local_store_snapshot_roundtrip             ok
          [  4/100] sim_observation_lww_converges              ok
          [  5/100] replay_equivalence_empty_workflow          ok
          ...
          [100/100] entropy_determinism_under_reseed           ok

          100 scenarios  ·  0 failures  ·  2.3s wall-clock
    shared_artifacts:
      - name: dst_seed
        source: "generated by xtask; printed on every run"
        displayed_as: "${dst_seed}"
        consumers: ["DST harness output", "failure reproduction command", "CI artifact on failure"]
      - name: sim_cluster_size
        source: "xtask config default (3 nodes) — overrideable via --nodes"
        displayed_as: "${sim_cluster_size}"
        consumers: ["DST harness output", "tests that assert on quorum size"]
      - name: invariant_name
        source: "crates/overdrive-sim/src/invariants.rs (enum variants)"
        displayed_as: "${invariant_name}"
        consumers: ["DST output lines", "failure reports", "documentation"]
    emotional_state:
      entry: "Skeptical — 'will this actually exercise a distributed system?'"
      exit: "Cautiously optimistic — 'a green run in under 3 seconds means the feedback loop is real.'"
    integration_checkpoint: |
      The harness MUST use LocalStore (real redb) + SimObservationStore +
      SimClock + SimTransport + SimEntropy + SimDataplane + SimDriver +
      SimLlm. It MUST boot at least 3 nodes. Every invariant MUST carry
      a name exported from overdrive-sim — no inline string literals in
      test bodies.
    failure_modes:
      - "Harness fails to compile because a core crate still directly uses std::time::Instant::now()"
      - "Harness hangs because a Sim* trait is not wired to a deterministic clock"
      - "Harness is non-deterministic — same seed produces different output on two runs"

  - id: 2
    name: "Write a reconciler that uses the intent store"
    command: "cargo test -p overdrive-core --test intent_store"
    tui_mockup: |
      $ cargo test -p overdrive-core --test intent_store
          Finished `test` profile

      running 7 tests
      test newtype_roundtrip::job_id_fromstr_display ................ ok
      test newtype_roundtrip::node_id_fromstr_display ............... ok
      test newtype_roundtrip::spiffe_id_fromstr_display ............. ok
      test local_store::put_get_delete_are_consistent ............... ok
      test local_store::snapshot_roundtrip_is_bit_identical ......... ok
      test local_store::bootstrap_from_snapshot_preserves_state ..... ok
      test local_store::watch_fires_on_prefix_match ................. ok

      test result: ok. 7 passed; 0 failed; 0 ignored
    shared_artifacts:
      - name: snapshot_bytes
        source: "IntentStore::export_snapshot() — canonical rkyv-archived bytes"
        displayed_as: "${snapshot_bytes}"
        consumers: ["LocalStore tests", "RaftStore bootstrap_from tests (future)", "disaster-recovery backups (future)"]
      - name: newtype_canonical_string
        source: "overdrive-core Display impl for each newtype"
        displayed_as: "${newtype_canonical_string}"
        consumers: ["FromStr round-trip tests", "serde (matches Display)", "CLI output (future)"]
    emotional_state:
      entry: "Focused — 'I need to persist a job spec and read it back.'"
      exit: "Confident — 'the newtypes validated my input, the store round-tripped my bytes, and snapshot/restore preserved them.'"
    integration_checkpoint: |
      Every identifier type in overdrive-core MUST implement FromStr,
      Display, Serialize, Deserialize, and validating constructors that
      return Result. FromStr MUST be case-insensitive for
      human-typed IDs (SPIFFE, region). Serde MUST match FromStr/Display
      exactly. No helper `normalize_*` functions — validation lives in
      constructors.
    failure_modes:
      - "FromStr accepts garbage that Display cannot re-emit"
      - "serde_json round-trip produces different bytes than rkyv (hashes diverge)"
      - "snapshot → bootstrap_from → re-export is not bit-identical"

  - id: 3
    name: "Try to smuggle in nondeterminism"
    command: "# edit overdrive-core to insert Instant::now()\\ncargo xtask dst-lint"
    tui_mockup: |
      $ cargo xtask dst-lint
           Scanning overdrive-core for banned nondeterministic APIs...

      error: nondeterministic API used in core crate
        --> crates/overdrive-core/src/reconciler.rs:42:21
         |
      42 |     let now = std::time::Instant::now();
         |                     ^^^^^^^^^^^^^^^^^^
         |
         = note: core crates MUST go through the `Clock` trait.
                 See `.claude/rules/development.md` — "Nondeterminism
                 must be injectable". If `Clock` is missing a method
                 you need, add it to the trait rather than bypassing it.

      1 banned-API violation found. Lint gate FAILED.
    shared_artifacts:
      - name: banned_api_list
        source: "crates/xtask/src/dst_lint.rs BANNED_APIS constant"
        displayed_as: "${banned_api_list}"
        consumers: ["xtask dst-lint output", "CI gate", "development.md rules documentation"]
      - name: core_crate_boundary
        source: "workspace Cargo.toml — core crate list"
        displayed_as: "${core_crate_boundary}"
        consumers: ["dst-lint scanner", "documentation in development.md"]
    emotional_state:
      entry: "Curious — 'does the CI gate actually catch this?'"
      exit: "Reassured — 'the gate fires, points at the exact line, names the rule, offers the right remediation.'"
    integration_checkpoint: |
      The lint gate MUST:
      - Scan every crate listed as a core crate in workspace config.
      - Detect: std::time::{Instant, SystemTime}::now, rand::random,
        rand::thread_rng, tokio::time::sleep, std::thread::sleep,
        tokio::net::{TcpStream, TcpListener, UdpSocket}.
      - Exit non-zero on any match.
      - Print file:line:column, the matched symbol, the name of the
        trait the engineer should use instead, and a link to
        development.md.
    failure_modes:
      - "Lint gate only scans some core crates, misses a new one"
      - "Lint message names a rule but does not name the trait to use"
      - "Gate is advisory, not blocking — CI passes anyway"

  - id: 4
    name: "Hit a real DST failure and reproduce it from the seed"
    command: "cargo xtask dst --seed 14923048572033948571"
    tui_mockup: |
      $ cargo xtask dst
          ...
          [ 37/100] leader_election_under_partition  FAILED

      invariant violated: single_leader
        seed:   14923048572033948571
        tick:   8743 (simulated t=8.743s)
        where:  turmoil host "node-0"
        cause:  2 leaders elected after partition heal

      reproduce:
        cargo xtask dst --seed 14923048572033948571 --only leader_election_under_partition

      $ cargo xtask dst --seed 14923048572033948571 --only leader_election_under_partition
          Same seed. Same trajectory.
          [ 1/1] leader_election_under_partition     FAILED (tick 8743)
    shared_artifacts:
      - name: dst_seed
        source: "printed on the first failure; captured by CI artifact"
        displayed_as: "${dst_seed}"
        consumers: ["reproduction command printed inline", "CI failure artifacts", "bug reports"]
    emotional_state:
      entry: "Anxious — 'a real distributed bug is hard to pin down.'"
      exit: "Trusting — 'the seed reproduced; I can debug this, not chase a ghost.'"
    integration_checkpoint: |
      A DST failure MUST:
      - Print the seed on the failing run.
      - Print an exact reproduction command (with the seed embedded).
      - Reproduce bit-for-bit on a second run with the same seed on the
        same git SHA and toolchain.
      - Fail the CI job (exit non-zero).
    failure_modes:
      - "Seed prints but second run diverges — a source of nondeterminism was missed"
      - "Failure output is a generic `assertion failed` with no invariant name"
      - "Reproduction command is missing (engineer has to guess the invocation)"

integration_validation:
  shared_artifact_consistency:
    - artifact: dst_seed
      must_match_across: [1, 4]
      failure_message: "The seed printed on a green run and the seed printed on a red run must use the same format and the same reproduction convention. If the green run shows `seed: 1492…` and the red run shows `seed=0x14ab…`, engineers lose the signal."
    - artifact: invariant_name
      must_match_across: [1, 4]
      failure_message: "Invariant names exported from overdrive-sim must be the same strings printed in both green and red output. If the green run prints `leader_election_under_partition` and the red run prints `LeaderElectionUnderPartition`, grep workflows break."
    - artifact: newtype_canonical_string
      must_match_across: [2]
      failure_message: "The canonical string form (Display) must equal what FromStr accepts must equal what serde produces. Any drift between these three kills hashing and reproducibility — see development.md 'Hashing requires deterministic serialization'."

changelog:
  - date: 2026-04-21
    feature: phase-1-foundation
    change: Initial journey capturing engineer experience of the walking skeleton DST harness.
