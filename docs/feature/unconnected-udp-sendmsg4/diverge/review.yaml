          Cilium's exact four-hook set. DVF used as a filter (none
          eliminated in-matrix; weak survivors 5/6/4 kept) AND their DVF
          weakness re-surfaces in their taste ranks (5 last, 4 fifth) — DVF
          not used as a tiebreaker. Anti-pattern self-audit table present
          and honest.
      - severity: medium
        issue: arithmetic-self-correction-in-place
        note: >
          Two matrix cells were hand-rounded off (Opt 4 showed 2.75, correct
          2.65; Opt 5 showed 2.51, correct 2.48). Flux self-corrected these
          in-place with a visible "Correction note (honesty)" and a
          recomputation, and emitted a corrected ranking table. JUDGMENT:
          self-correcting in-place with a visible note + a clean corrected
          table is ACCEPTABLE and honest; the ranking 2>3>1>6>4>5 is
          unaffected (Opt 4 at 2.65 does not pass Opt 6 at 3.05; Opt 5 stays
          last). Independently re-verified above (recomputed_totals). NO
          residual stale cell — the corrected table is the operative one.
          RESOLVED in-doc.
      - severity: low
        note: >
          Opt 1 scores T1=5 (maximal subtraction) yet ranks 3rd — the
          taste-evaluation explicitly notes this is value-DESTROYING
          subtraction (removing the reply path), which the rubric's "nothing
          removable without breaking core value" framing should arguably
