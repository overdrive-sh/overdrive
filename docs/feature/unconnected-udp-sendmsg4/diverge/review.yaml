          analyses are present and code/kernel-grounded: blast radius
          (concrete program/map/action/hydrator sites; the "pure addition,
          connect4 untouched" fact is load-bearing and correct against
          ADR-0053 Amd 3); reply-path correctness table (the decision in one
          view); kernel viability (since-versions vs 5.10 floor); testability
          (Tier-3-only, identical across 1/2/3 so NOT a discriminator —
          correctly stated). The dissent for Option 1 is GENUINE: it names
          two real conditions under which sendmsg4-only wins (non-source-
