schema_version: 1

# NOTE ON FORMAT
#
# Project rule (.claude/rules/testing.md): NO .feature files anywhere.
# Gherkin scenarios live as GIVEN/WHEN/THEN blocks inside this YAML
# under each step's `gherkin:` key, and as fenced blocks in the
# accompanying -scenarios.md file. The crafter translates these into
# Rust #[test] / #[tokio::test] functions in crates/{crate}/tests/.

journey:
  name: "Trust the Sim — proving Overdrive's DST foundation works"
  goal: >
    A Overdrive platform engineer can run `cargo xtask dst` on a clean
    clone, have the harness exercise a multi-node simulated cluster
    against real LocalStore + SimObservationStore + all Sim* traits,
    watch core invariants pass, and trust that a red run is reproducible
    bit-for-bit from the printed seed.
  persona: Overdrive platform engineer (Ana) — distributed-systems SRE background, primary author of control-plane logic. Secondary persona = CI.

  emotional_arc:
    start: "Skeptical"
    middle: "Focused, then reassured"
    end: "Trusting"

steps:
  - id: 1
    name: "Fresh clone, first DST run"
    command: "cargo xtask dst"

    tui_mockup: |
      $ cargo xtask dst
          Compiling overdrive-core v0.0.0
          Compiling overdrive-sim  v0.0.0
          Finished `dev` profile [optimized + debuginfo]
           Running DST harness (turmoil, ${sim_cluster_size}-node cluster)

          seed: ${dst_seed}
          ticks/run: 60000 (simulated 60s @ 1ms)
          runs: 100

          [  1/100] leader_election_under_partition            ok
          [  2/100] intent_observation_isolation               ok
          [  3/100] local_store_snapshot_roundtrip             ok
          [  4/100] sim_observation_lww_converges              ok
          [  5/100] replay_equivalence_empty_workflow          ok
          ...
          [100/100] entropy_determinism_under_reseed           ok

          100 scenarios  ·  0 failures  ·  2.3s wall-clock

    shared_artifacts:
      - name: dst_seed
        source: "generated by xtask; printed on every run"
        displayed_as: "${dst_seed}"
        consumers: ["DST harness output", "failure reproduction command", "CI artifact on failure"]
      - name: sim_cluster_size
        source: "xtask config default = 3; overrideable via --nodes"
        displayed_as: "${sim_cluster_size}"
        consumers: ["DST harness output", "tests that assert on quorum size"]
      - name: invariant_name
        source: "crates/overdrive-sim/src/invariants.rs (enum variants)"
        displayed_as: "${invariant_name}"
        consumers: ["DST output lines", "failure reports", "documentation"]

    emotional_state:
      entry: "Skeptical — 'will this actually exercise a distributed system?'"
      exit: "Cautiously optimistic — 'a green run in under 3 seconds means the feedback loop is real.'"

    integration_checkpoint: |
      Harness MUST compose real LocalStore (redb on disk or tmpfs) +
      SimObservationStore + SimClock + SimTransport + SimEntropy +
      SimDataplane + SimDriver + SimLlm. Cluster size >= 3. Every
      invariant name comes from an enum in overdrive-sim — no inline
      string literals in test bodies.

    failure_modes:
      - "Harness fails to compile because a core crate still uses std::time::Instant::now()"
      - "Harness hangs because a Sim* trait is not wired to a deterministic clock"
      - "Harness is non-deterministic — same seed produces different output on two runs"

    gherkin: |
      Scenario: Clean-clone DST run is fast and green
        Given Ana has cloned the overdrive repository to a clean workspace
        And no environment variables override DST defaults
        When Ana runs "cargo xtask dst"
        Then the harness boots a 3-node simulated cluster using LocalStore
          (real redb) and SimObservationStore plus SimClock, SimTransport,
          SimEntropy, SimDataplane, SimDriver, and SimLlm
        And every invariant from the default suite runs to completion
        And the summary line reports 0 failures
        And wall-clock time stays under 60 seconds on Ana's M-class laptop
        And the seed for this run is printed in the summary

      Scenario: The same seed produces the same trajectory
        Given Ana has just seen a green run with seed ${dst_seed}
        When Ana runs "cargo xtask dst --seed ${dst_seed}" again
        Then the harness produces the same ordered invariant results
        And the same summary line
        And no tick number changes between the two runs

  - id: 2
    name: "Write code that uses the intent store"
    command: "cargo test -p overdrive-core --test intent_store"

    tui_mockup: |
      $ cargo test -p overdrive-core --test intent_store
          Finished `test` profile

      running 7 tests
      test newtype_roundtrip::job_id_fromstr_display ................ ok
      test newtype_roundtrip::node_id_fromstr_display ............... ok
      test newtype_roundtrip::spiffe_id_fromstr_display ............. ok
      test local_store::put_get_delete_are_consistent ............... ok
      test local_store::snapshot_roundtrip_is_bit_identical ......... ok
      test local_store::bootstrap_from_snapshot_preserves_state ..... ok
      test local_store::watch_fires_on_prefix_match ................. ok

      test result: ok. 7 passed; 0 failed; 0 ignored

    shared_artifacts:
      - name: snapshot_bytes
        source: "IntentStore::export_snapshot() — canonical rkyv-archived bytes"
        displayed_as: "${snapshot_bytes}"
        consumers: ["LocalStore tests", "RaftStore bootstrap_from tests (future)", "disaster-recovery backups (future)"]
      - name: newtype_canonical_string
        source: "overdrive-core Display impl for each newtype"
        displayed_as: "${newtype_canonical_string}"
        consumers: ["FromStr round-trip tests", "serde (matches Display)", "CLI output (future)"]

    emotional_state:
      entry: "Focused — 'I need to persist a job spec and read it back.'"
      exit: "Confident — 'newtypes validated my input, store round-tripped my bytes, snapshot preserved them.'"

    integration_checkpoint: |
      Every identifier type in overdrive-core MUST implement FromStr,
      Display, Serialize, Deserialize, and validating constructors that
      return Result<Self, ParseError>. FromStr MUST be case-insensitive
      for human-typed IDs (SPIFFE, region). Serde MUST match FromStr and
      Display exactly. No helper `normalize_*` functions — validation
      lives in constructors.

    failure_modes:
      - "FromStr accepts garbage that Display cannot re-emit"
      - "serde round-trip produces different bytes than rkyv (hashes diverge)"
      - "snapshot → bootstrap_from → re-export is not bit-identical"

    gherkin: |
      Scenario: Newtype round-trip is lossless across Display, FromStr and serde
        Given JobId, NodeId, AllocationId, SpiffeId, Region, SchematicId,
          CorrelationKey, InvestigationId, PolicyId, ContentHash,
          and CertSerial each have a canonical string form
        When any valid instance is formatted via Display, parsed via
          FromStr, serialized via serde_json, and deserialized back
        Then the final value equals the original
        And the serde output matches the Display output byte-for-byte

      Scenario: Invalid identifier input is rejected by the constructor
        Given a malformed input such as "spiffe://overdrive.local//job//alloc"
          (double slashes, empty segments) for SpiffeId
        When Ana calls SpiffeId::from_str on that input
        Then an Err is returned with a domain-appropriate ParseError variant
        And no SpiffeId instance is constructed

      Scenario: LocalStore snapshot round-trip is bit-identical
        Given a LocalStore populated with a set of JobSpec entries
        When Ana calls export_snapshot, creates a second LocalStore, calls
          bootstrap_from with the snapshot, and calls export_snapshot again
        Then the second snapshot byte slice equals the first byte-for-byte

      Scenario: Watch fires when a prefix-matching key is written
        Given a LocalStore with no entries
        And Ana has subscribed to watch for prefix "jobs/"
        When another task writes a key "jobs/payments" to the store
        Then the watch stream yields a single event for that key within one
          tick of simulated time

  - id: 3
    name: "CI lint gate catches a banned API"
    command: "cargo xtask dst-lint"

    tui_mockup: |
      $ cargo xtask dst-lint
           Scanning overdrive-core for banned nondeterministic APIs...

      error: nondeterministic API used in core crate
        --> crates/overdrive-core/src/reconciler.rs:42:21
         |
      42 |     let now = std::time::Instant::now();
         |                     ^^^^^^^^^^^^^^^^^^
         |
         = note: core crates MUST go through the `Clock` trait.
                 See `.claude/rules/development.md` — "Nondeterminism
                 must be injectable". If `Clock` is missing a method
                 you need, add it to the trait rather than bypassing it.

      1 banned-API violation found. Lint gate FAILED.

    shared_artifacts:
      - name: banned_api_list
        source: "crates/xtask/src/dst_lint.rs BANNED_APIS constant"
        displayed_as: "${banned_api_list}"
        consumers: ["xtask dst-lint output", "CI gate", "development.md rules documentation"]
      - name: core_crate_boundary
        source: "workspace Cargo.toml — labelled set of core crates"
        displayed_as: "${core_crate_boundary}"
        consumers: ["dst-lint scanner", "documentation in development.md"]

    emotional_state:
      entry: "Curious — 'does the CI gate actually catch this?'"
      exit: "Reassured — 'it fires, points at the line, names the rule, offers the trait to use instead.'"

    integration_checkpoint: |
      The lint gate MUST scan every crate labelled as core in workspace
      config, detect Instant::now, SystemTime::now, rand::random,
      rand::thread_rng, tokio::time::sleep, std::thread::sleep,
      tokio::net::{TcpStream,TcpListener,UdpSocket}, exit non-zero on any
      match, and print file:line:column plus the trait to use instead.

    failure_modes:
      - "Lint gate only scans some core crates, misses a new one"
      - "Lint message names a rule but does not name the trait to use"
      - "Gate is advisory, not blocking — CI passes anyway"

    gherkin: |
      Scenario: Lint gate blocks a core crate that uses Instant::now()
        Given Ana has inserted `let now = std::time::Instant::now();` into
          a source file inside a crate labelled "core" (overdrive-core)
        When Ana runs "cargo xtask dst-lint"
        Then the command exits with a non-zero status
        And the output contains the exact file path, line, and column of the
          banned call
        And the output names the `Clock` trait as the replacement
        And the output references `.claude/rules/development.md`

      Scenario: Lint gate is silent when core crates are clean
        Given no core crate contains any banned API
        When Ana runs "cargo xtask dst-lint"
        Then the command exits with zero status
        And the output reports that zero violations were found

      Scenario: Non-core crates may still use real implementations
        Given the wiring crate that constructs production Clock and
          Transport instances legitimately calls std::time::Instant::now()
        And that crate is not labelled "core"
        When Ana runs "cargo xtask dst-lint"
        Then no violation is reported for that crate

  - id: 4
    name: "Real invariant failure reproduces bit-for-bit from the seed"
    command: "cargo xtask dst --seed ${dst_seed} --only leader_election_under_partition"

    tui_mockup: |
      $ cargo xtask dst
          ...
          [ 37/100] leader_election_under_partition  FAILED

      invariant violated: single_leader
        seed:   ${dst_seed}
        tick:   8743 (simulated t=8.743s)
        where:  turmoil host "node-0"
        cause:  2 leaders elected after partition heal

      reproduce:
        cargo xtask dst --seed ${dst_seed} --only leader_election_under_partition

      $ cargo xtask dst --seed ${dst_seed} --only leader_election_under_partition
          Same seed. Same trajectory.
          [ 1/1] leader_election_under_partition     FAILED (tick 8743)

    shared_artifacts:
      - name: dst_seed
        source: "printed on the first failure; captured by CI artifact"
        displayed_as: "${dst_seed}"
        consumers: ["reproduction command printed inline", "CI failure artifacts", "bug reports"]
      - name: invariant_name
        source: "crates/overdrive-sim/src/invariants.rs enum variant (same name in green and red output)"
        displayed_as: "${invariant_name}"
        consumers: ["DST output lines", "failure reports", "documentation"]

    emotional_state:
      entry: "Anxious — 'a real distributed bug is hard to pin down.'"
      exit: "Trusting — 'the seed reproduced; I can debug this, not chase a ghost.'"

    integration_checkpoint: |
      A DST failure MUST print the seed, print an exact reproduction
      command, reproduce bit-for-bit on a second run with the same seed
      on the same git SHA and toolchain, and fail the CI job. The tick
      number on both runs MUST match.

    failure_modes:
      - "Seed prints but second run diverges — a source of nondeterminism was missed"
      - "Failure output is a generic `assertion failed` with no invariant name"
      - "Reproduction command is missing (engineer has to guess the invocation)"

    gherkin: |
      Scenario: A failing invariant prints the seed and an exact reproduction command
        Given a bug has been introduced that allows two leaders to be elected
          after a partition heal
        When Ana runs "cargo xtask dst"
        Then the harness reports the failing invariant by name
        And the failure output contains the seed used for that run
        And the failure output contains a reproduction command that embeds
          the same seed and narrows to the failing invariant

      Scenario: The reproduction command reproduces the failure bit-for-bit
        Given Ana has captured a failing seed from a previous red run
        And the git SHA and Rust toolchain are unchanged
        When Ana runs the reproduction command
        Then the harness fails on the same invariant
        And the failure happens at the same simulated tick
        And the failure happens on the same turmoil host

      Scenario: A DST failure fails the CI job
        Given the DST harness has failed at least one invariant
        When the `cargo xtask dst` step completes in CI
        Then the step exits with a non-zero status
        And the CI pipeline is marked failed

integration_validation:
  shared_artifact_consistency:
    - artifact: dst_seed
      must_match_across: [1, 4]
      failure_message: >
        The seed printed on a green run and the seed printed on a red run
        must use the same format and the same reproduction convention.
        Inconsistent formats break engineer workflows that depend on
        grepping and pasting seeds between runs.
    - artifact: invariant_name
      must_match_across: [1, 4]
      failure_message: >
        Invariant names exported from overdrive-sim must appear in
        exactly the same form in both green and red output. Any drift
        breaks grep, dashboards, and CI notifications.
    - artifact: newtype_canonical_string
      must_match_across: [2]
      failure_message: >
        Display == FromStr-accepting == serde output. Any drift between
        these three kills content-hashing and DST reproducibility — see
        development.md "Hashing requires deterministic serialization".
    - artifact: banned_api_list
      must_match_across: [3]
      failure_message: >
        The SSOT for banned APIs is a constant in xtask; documentation
        in development.md must reference that constant rather than
        re-listing items. Drift produces silent gate gaps.

changelog:
  - date: 2026-04-21
    feature: phase-1-foundation
    change: Initial journey YAML with embedded Gherkin (no .feature files per project rule).
