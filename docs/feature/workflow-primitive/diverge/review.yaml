    - "Journal-store decision (libSQL vs redb vs append-only log): C answers it for free (existing redb ViewStore); B/A/F should each justify rather than inherit libSQL default per whitepaper. ADR-0035 context: reconciler primitive was deliberately moved OFF libSQL to redb for O6 reasons."
    - "Doctrinal amendment required: whitepaper §18 and reconcilers.md currently assert 'Reconcilers converge; workflows orchestrate. Neither is expressible as the other.' C (reconciler-as-step-machine) requires amending this claim. Research shows the mechanism claim is overstatable (Argo runs terminal sequences on a reconcile loop in production), but the ergonomics/extension-story reasons may be load-bearing. DISCUSS must decide."
    - "Scope re-check on version-skew mitigation: #39 defers code-graph-hash version-skew rejection. If that deferral is lifted, Option B (DBOS-style, whitepaper-faithful, 'durable like restate') re-enters as competitive (currently 3.51, would rise when viability penalty lifts). This is a scope decision that can flip the entire recommendation."

  handoff_readiness: "READY FOR DISCUSS WAVE"

