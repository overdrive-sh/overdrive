mandatory_checks:
  external_validity:
    status: PASS
    evidence: |
      Step 01-03 owns POST /v1/jobs/:id/restart. Step 01-04 owns
      overdrive workload restart, API client wiring, command module export,
      binary dispatch, rendering, and a direct CLI handler-call against an
      in-process run_server. Steps 02-01, 03-01, and 04-01 un-ignore the
      existing Tier-3 oracle ATs and swap their cycle/recovery mechanism to
      the production restart route.

  ac_implementation_coupling:
    status: PASS_WITH_PROJECT_SCOPE
    evidence: |
      The roadmap intentionally pins ADR-0073 public surfaces and mutation
      targets. That would be over-coupled under the generic rubric, but this
      repository's CLAUDE.md says crafters must match accepted design API
      shape exactly and must not invent public surface. The current roadmap
      points to ADR-0073 rather than leaving live design choices open.
    residual_risk: |
      Some criteria still name internal implementation sites. Treat those as
      design-conformance guardrails, not permission to expand scope beyond
      ADR-0073.

  step_decomposition_ratio:
    status: PASS
    calculation: "7 steps / approximately 12 named production files = 0.58"
    evidence: |
      The roadmap decomposes by externally observable behavior: store atomic
      bump, reconciler generation/veto behavior, HTTP handler, CLI verb, and
      three Tier-3 oracle gates. There is no repeated substitution pattern
      that should be batched.

  implementation_code_in_roadmap:
    status: PASS_WITH_PROJECT_SCOPE
    evidence: |
      The roadmap contains code-shaped names and exact API surfaces, but they
      are design-pinned by ADR-0073 and used to prevent API drift. Repeated
      mutation command lines were collapsed into validation.mutation_invocation,
      reducing the second-SSOT problem from iteration 1.
    residual_risk: |
      DELIVER should still prefer the tests and ADR-0073 as the authority if
      roadmap prose appears to over-specify a non-public implementation detail.

  concision_and_precision:
    status: PASS_WITH_WAIVER
    evidence: |
      The generic length gate is exceeded, but CLAUDE.md section "Roadmap
      validator warnings" says STEP_NAME_TOO_LONG, CRITERIA_TOO_LONG, and
      DESCRIPTION_TOO_LONG are cosmetic/non-blocking for Overdrive because
      roadmap ACs deliberately carry scenario names, invariant names, proptest
      targets, and kill-rate thresholds. The roadmap records the same waiver
      under validation.concision_waiver.

  unit_test_boundary_validation:
    status: PASS_WITH_NIT
    evidence: |
      Most scenarios drive public ports: LocalIntentStore, reconcile(),
      restart_workload, CLI command handler, and Tier-3 production route.
      S-BIR-CURRENT-ALLOC still directly tests a helper, but the same invariant
      is now also pinned at the reconcile boundary by S-BIR-REGRESSION-NUMERIC.
    nit: |
      Keep the helper proptest only as supplementary coverage. The
      driving-port regression is the acceptance authority.

