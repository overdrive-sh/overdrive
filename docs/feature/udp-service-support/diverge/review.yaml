    severity: medium
    dimension: 4_taste_correctness
    description: >
      taste-evaluation.md matrix cell for option 2 showed 3.62 while the
      audited exact weighted total is 3.57. Stale cell vs corrected prose.
    resolution: >
      Matrix cell updated to 3.57 to agree with the prose correction note
      and the ranking summary. Ranking unaffected (option 2 third either
      way). recommendation.md already uses 3.57 throughout — no change
      needed there.

