issues:
  low:
    - id: hint_mapping_neutral_text_unspecified
      location: "step 02-04 criteria"
      issue: |
        The criteria says "the existing `fix the spec's exec.command path
        and re-run` hint maps to ExecBinaryNotFound and ExecPermissionDenied,
        while other cause variants get neutral hints (added to the CLI
        rendering crate per the same step)." The phrase "neutral hints" is
        vague — the crafter implementing 02-04 will need a concrete mapping.
      recommendation: |
        Crafter (slice 02-04 GREEN): treat ADR-0033 §4 amended mapping table
        as the single source of truth for all variant-to-hint bindings, not
        just ExecBinaryNotFound / ExecPermissionDenied. The "neutral hints"
        text is a forward reference to the same table — the phrase is
        adequate for planning but the implementation must cite the table
        explicitly.
      blocking: false
      severity_rationale: |
        Low because the mapping table exists in ADR-0033 §4 and the crafter
        will resolve the lookup during implementation. Surfacing here so
        the GREEN-phase code review catches any drift.

    - id: classify_driver_failure_function_classification
      location: "step 02-01 criteria + design/reuse-analysis.md"
      issue: |
        The architect's reuse-analysis update bumps CREATE NEW from 8 to 11
        (StoppedBy, CancelledBy, ResourceEnvelope). The new
        `classify_driver_failure(reason_text, driver, command) -> TransitionReason`
        function lives inside the existing `action_shim` module — it should
        likely count as EXTEND (extending action_shim's responsibility), not
        CREATE NEW. The reuse-analysis count interpretation is borderline.
      recommendation: |
        Architect (when updating design/reuse-analysis.md to reflect the
        amendment): clarify whether classify_driver_failure is a new
        component (CREATE NEW with rationale) or an extension to action_shim
        (EXTEND). Either choice is defensible; just pick one and document
        it consistently.
      blocking: false
      severity_rationale: |
        Low because the actual gate (every CREATE NEW has justification) is
        satisfied either way; only the count is at issue. Doesn't block
        DELIVER.

