issues:
  medium:
    - id: lagged_fallback_cross_reference
      location: ADR-0032 section 7 (Subscription mechanism)
      issue: |
        The lagging-subscriber fallback path synthesizes transitions from a
        prior-state snapshot. This relies on the JobLifecycleView extension
        defined in ADR-0033 section 2 (the prior-state hydrator that landed
        last_transition.from). ADR-0032 does not call out this coupling, so
        the crafter could implement Slice 02 (streaming) before Slice 01
        (snapshot enrichment) and find the Lagged fallback non-functional.
      recommendation: |
        Add a one-line cross-reference in ADR-0032 section 7 after the Lagged
        pseudocode: "Lagged-recovery depends on the JobLifecycleView extension
        in ADR-0033 section 2; ADR-0033 (Slice 01) lands first."
      blocking: false
      severity_rationale: |
        Medium because it affects implementation sequencing; the slice graph in
        story-map.md already orders Slice 01 before Slice 02, so the actual
        risk is low. Calling it out explicitly removes any ambiguity.

  low:
    - id: adr_0032_section_6_justification
      location: ADR-0032 section 6, wave-decisions.md [D3]
      issue: |
        The 60 s cap rationale cites "ProcessDriver cold-start budget 5-10 s"
        but Phase 1 uses ExecDriver (tokio::process on localhost; sub-second
        cold start). The justification conflates Phase 2+ VM/container launch
        time with Phase 1 process fork time.
      recommendation: |
        Revise to: "60 s aligns with the journey emotional arc (US-02 Example 3).
        ExecDriver Phase 1 cold-starts are sub-second; 60 s preserves headroom
        for reconciler restart attempts (5 attempts at 5 s backoff = 25 s) plus
        operator-patience headroom before 'is this hung?' sets in. Operators
        whose workloads need longer convergence use --detach or configure
        [server].streaming_submit_cap."
      blocking: false
      severity_rationale: |
        Low because the value (60 s) is correct and well-bounded; only the
        prose rationale is misframed. Crafter can still implement against the
        spec correctly.

