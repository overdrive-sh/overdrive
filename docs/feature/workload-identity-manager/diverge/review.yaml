# ----------------------------------------------------------------------------
# The five reviewer dimensions (self-assessed, adversarially)
# ----------------------------------------------------------------------------
dimensions:

  - dimension: jtbd_rigor
    self_verdict: STRONG
    findings:
      - "Job is at the physical/strategic boundary (bind-credential-lifetime-to-workload-lifetime + readability); navigation table and 5-Why chain present."
      - "The new-job verdict (J-SEC-002 vs extending J-SEC-001) is the highest-risk claim; mitigated with three independent reasons (distinct progress/failure-mode, distinct trigger, distinct roadmap primitive) AND an explicit rebuttal of the udp-sendmsg4 elevate-precedent the dispatch flagged."
    residual_risks:
      - "O3 (consumer read latency) has only MODERATE opportunity — the latency delta across in-process options is small. It is a genuine outcome (handshake hot path) but a reviewer could argue it is weakly discriminating. Documented in job-analysis.md §5 opportunity table (O3 score 16 driven by Satisfaction=2, i.e. 'no read surface exists yet' — defensible)."

  - dimension: research_quality
    self_verdict: STRONG_BUT_PROCESS_DEVIATION
    findings:
      - "All 5 required systems + the non-obvious alternative covered; every claim names a real component/RPC (SPIRE cache.Cache/cacheRecord/FetchX509SVID; istio SecretManager/SDS StreamSecrets/GenerateSecret/SECRET_GRACE_PERIOD_RATIO; Linkerd tmpfs emptyDir/70%-TTL CSR; Nomad identity block/NOMAD_TOKEN_*/JWKS; CSI CertificateRequest/tmpfs mount) with cited primary sources; inference flagged."
      - "6 cross-system load-bearing lessons (L1-L7), each tied to the systems that evidence it and to the design fork it bears on."
    residual_risks:
      - "PROCESS: research was conducted by Flux directly (WebSearch/WebFetch), NOT by the independent nw-researcher sub-agent (Task tool unavailable in subagent context). Evidence quality is high and primary-sourced, but it was not independently produced. A subset of istio impl-detail came from the architecture doc + search synthesis rather than a source-file read; the SDS push-on-rotate SEAM (the load-bearing claim) is confirmed by the official istio-agent architecture doc directly."

  - dimension: option_diversity
    self_verdict: STRONG
    findings:
      - "6 curated options span 4 storage substrates (heap struct / View / observation rows / kernel BPF map), 3 lifecycle-wiring shapes (standalone vs folded reconciler vs executor), and 4 read surfaces (sync getter / watch push / kernel map / View accessor). All 9 representative pairs differ in mechanism AND assumption AND cost."
      - "Curation trail explicit: M folded as a read-surface dimension (orthogonal to storage), X1 folded into Option 2's lifecycle-wiring family, X2 logged un-promoted."
    residual_risks:
      - "The concurrency axis is under-represented in the SCORED 6 (X2 actor-per-identity dropped). Mitigated: X2 is logged in options-raw.md as the un-promoted 7th and is available if review/DESIGN finds the 6 insufficiently diverse on concurrency. Judged acceptable because the 6 already span all 4 forks the dispatch named."

  - dimension: taste_correctness
    self_verdict: STRONG
    findings:
      - "Weights LOCKED before scoring (Dev-Tool profile, 3 documented adjustments: DVF 25→30, T1 15→20, T4 25→15 — each with pre-scoring rationale)."
      - "DVF used as a filter not a tiebreaker; correctness-rule strain (reconciler purity, state-layer hygiene, single-cut) encoded in Feasibility scores, the honest place for it."
      - "Recommendation = rank 1 (Option 1, 4.45) with NO weight adjustment — follows the matrix directly. Anti-patterns (cherry-picking, retroactive justification, weight manipulation, feels-right override) checked and avoided."
    residual_risks:
      - "An initial arithmetic/rounding error in the first-draft matrix (Option 3 DVF normalization; 4/5/6 sub-order) was CORRECTED in-place; the worked totals are now shown explicitly so the ranking is auditable. The top-2 (4.45 > 4.20) is stable under any rounding — the error never threatened the recommendation. Flagged here for transparency."
      - "Scores are engineering judgment (no end-user survey) — appropriate for a platform-internal primitive, consistent with the jobs.yaml 'distilled from whitepaper not interviews' precedent."

  - dimension: recommendation_coherence
    self_verdict: STRONG
    findings:
      - "Recommendation is derivable from job (J-SEC-002) → research (L1/L3/L4 converge on shared identity-keyed store + decoupled rotation trigger) → scores (Option 1 rank 1). Traceable end-to-end."
      - "Dissent is precise and conditional: Option 2 wins IFF the 4.7 unified-IdentityMgr-across-SVID+ACME commitment is dropped — a named, falsifiable condition, surfaced as a product BLOCKER. Secondary dissent: Option 3 is the next-step (getter→watch behind the IdentityRead port), not a competitor."
      - "Decision statement explicit with the key-risk assumption named; 'both viable' explicitly rejected."
      - "Design-sensitive surfaces (Action variant shapes, IdentityRead signatures, concurrency primitive, View input shape, trust-bundle currency) are handed to DESIGN to pin — NOT invented here, per CLAUDE.md 'Implement to the design'."
    residual_risks:
      - "The recommendation CONFIRMS the issue-pinned direction. This is the honest expected outcome (the dispatch anticipated it) and is traceable to the matrix — not manufactured. A reviewer should verify it is confirmation-by-evidence, not confirmation-by-anchoring; the competitive research converging independently on the same shape is the key check that it is the former."

