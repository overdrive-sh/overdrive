executive_summary: |
  The roadmap has strong traceability and an executable end-to-end path: 8
  steps, 3 phases, 18 referenced S-OC scenarios, all file paths present, and a
  healthy decomposition ratio of 8 steps / 22 unique files = 0.36.

  It is not ready for DELIVER as written. The roadmap embeds implementation
  code and exact construction recipes in step descriptions and notes, and its
  4,222-word size exceeds the 1,500-word roadmap threshold for an 8-step plan.
  Those are roadmap-gate blockers because they turn the artifact into a
  crafter script instead of a behavioral handoff.

gating_checks:
  external_validity:
    status: PASS
    evidence: |
      The feature has clear invocation paths: the pure SvidLifecycle driving
      port for rotation, `overdrive serve` for persistent CA boot, and
      `overdrive alloc status --job <id>` for operator-visible issued-cert
      summaries. Integration wiring appears in steps 02-02, 02-03, 03-02, and
      03-03.
  ac_implementation_coupling:
    status: FAIL
    severity: HIGH
    evidence: |
      Several ACs and descriptions prescribe exact internal identifiers and
      types, including `ControlPlaneError::CaBoot(#[from] CaBootError)` at
      lines 71-77, `AllocStatusResponse.issued_certificates:
      Vec<IssuedCertSummary>` at lines 151-158, and
      `#[serde(default, skip_serializing_if = "Vec::is_empty")]` at lines
      152 and 154.
  step_decomposition_ratio:
    status: PASS
    evidence: "8 implementation steps / 22 unique files = 0.36, well under the 2.5 rejection threshold."
  implementation_code_in_roadmap:
    status: FAIL
    severity: BLOCKER
    evidence: |
      Step 02-02 includes a code-level recipe with constructor calls, coercion,
      awaited calls, and `?` propagation in the description at line 94. Its
      implementation notes repeat the exact construction order and call shape
      at line 111. Step 01-01 similarly prescribes the full
      `Action::IssueSvid { ... }` construction and correlation expression at
      lines 15-23.
  concision_and_precision:
    status: FAIL
    severity: BLOCKER
    evidence: |
      The roadmap contains 4,222 words. For an 8-step roadmap, the roadmap
      check threshold is 1,500 words. Every step description is over the
      50-word limit, every implementation note is over the 100-word limit, and
      steps 01-01, 02-03, and 03-03 exceed the max-5-criteria check.
  unit_test_boundary_validation:
    status: PASS_WITH_NIT
    evidence: |
      Most tests invoke through acceptable driving ports: pure
      `SvidLifecycle::reconcile`, real `overdrive serve`, real `overdrive alloc
      status`, action-shim dispatch, and black-box `openssl verify`. Step
      02-01's error-mapping test is type-level rather than operator-facing, but
      it is scoped to the public error boundary and does not currently block
      the roadmap.

