# nextest — the test runner for Overdrive. See `.claude/rules/testing.md`
# §"Running tests — foreground, always". Nextest replaces `cargo test` for
# everything except doctests (which nextest does not run; the
# `cargo test --doc` step exists alongside every nextest invocation in CI
# and lefthook).
#
# Profiles:
#   default — developer loop. Unlimited retries disabled; fail-fast on.
#   ci      — CI gate. JUnit output for GitHub summary parsing, no retries
#             (flaky tests are bugs — testing.md), and a slow-test timeout
#             that matches K1's 60-second Tier 1 wall-clock budget.
#
# References:
#   - https://nexte.st/book/configuration.html
#   - .claude/rules/testing.md §"Running tests — foreground, always"
#   - docs/product/architecture/adr-0006-ci-wiring-dst-gates.md (K1 budget)

[profile.default]
# Developer-loop: fail fast, no retries. A test that only passes on
# rerun is either a real bug or a non-determinism leak — both must be
# fixed at the source, never "just run it again."
fail-fast = true
retries = 0
# Quiet output: only surface failures during the run and in the final
# summary. A clean run prints a one-line summary; a failing run shows
# the failures directly, not buried under dozens of PASS lines.
# Removes the usual reason to reach for `| tail -N`, which eats the
# non-zero exit code (bash pipelines do not enable `pipefail` per tool
# call). When `--no-fail-fast` multi-failure inspection still warrants
# piping, the PostToolUse hook `.claude/hooks/flag-test-failure.ts`
# scans the captured output for FAIL markers and nextest summaries
# reporting N failed, so exit-code loss cannot silently mask a failure.
status-level = "fail"
final-status-level = "fail"
# Per-test wall-clock cap for the inner dev loop. A test running longer
# than 60s emits a SLOW marker; a test still running after 120s
# (60s × 2) is killed and the run reports it as TIMEOUT. Without this,
# a deadlocked or runaway-loop test silently consumes the harness
# until the outer 10-minute Bash cap fires — far too coarse for a tight
# TDD cycle. Matches the CI profile's K1 Tier 1 wall-clock budget; CI
# allows one extra interval (terminate-after = 3) because compile +
# scheduler overhead under cold caches can legitimately push a slow
# test past the 60s mark on the runner.
slow-timeout = { period = "60s", terminate-after = 2 }

# The store-local snapshot proptest opens a real redb file per case
# at the default `PROPTEST_CASES=1024` budget. Each `put` is a
# separate redb write transaction, so entry count × case count
# dominates wall-clock. The generator is sized (0..=32 entries,
# 0..=256 byte values) to keep solo wall-clock well under 60s, but
# under parallel load (workspace integration runs schedule ~30 tests
# concurrently) I/O contention can push past 120s. A 4× budget
# absorbs the parallel slow-down without weakening the per-test
# deadline.
[[profile.default.overrides]]
filter = 'package(overdrive-store-local) & binary(integration) & test(snapshot_roundtrip_is_byte_identical_for_arbitrary_store_contents)'
slow-timeout = { period = "60s", terminate-after = 4 }

# describe_round_trip's submit-then-describe proptest spawns a real
# axum server (rustls handshake, redb file, ephemeral CA) per case and
# runs `PROPTEST_CASES=256`. The integration CI job (profile.ci, 180s
# budget) passes; the cargo-mutants baseline runs nextest under the
# `default` profile in a /tmp scratch tree with cold caches and
# crosses the 120s default budget. A 4× budget (240s) tracks the
# snapshot-proptest precedent above and absorbs the cold-cache slow
# down without weakening the deadline for any other test.
[[profile.default.overrides]]
filter = 'package(overdrive-control-plane) & binary(integration) & test(submit_then_describe_round_trips_spec_and_digest)'
slow-timeout = { period = "60s", terminate-after = 4 }

# trybuild compiles every compile_fail / compile_pass fixture from
# scratch on each run. Under cargo-mutants the tree is reproduced in
# /tmp with a cold target dir and the per-fixture compile time stacks
# past the default 120s budget. Same 4× budget rationale as above.
#
# NOTE: the `mutants` profile below excludes trybuild binaries
# entirely from the cargo-mutants test run (they don't contribute to
# kill-rate signal — function-body mutations don't change whether
# trybuild fixtures compile). This override is retained for the
# default profile so a developer running these tests directly via
# `cargo nextest run` still gets a sensible budget.
[[profile.default.overrides]]
filter = '(binary(compile_fail) | binary(compile_pass)) & (test(compile_fail_cases) | test(compile_pass_cases))'
slow-timeout = { period = "60s", terminate-after = 4 }

# Serialize trybuild binaries against each other. Each trybuild
# `TestCases` invocation spawns `cargo build` internally to compile
# its fixtures into a private workspace; three trybuild binaries
# (`overdrive-core::compile_fail`, `overdrive-control-plane::compile_fail`,
# `overdrive-control-plane::compile_pass`) running in parallel contend
# for the cargo target-dir file lock. Under that contention the
# inner cargo invocations block on `Blocking waiting for file lock
# on build directory` and the per-test slow-timeout fires before any
# of them finish — the symptom the timeout-only fix in commit
# e4e6fb8 did not address. Serializing at the nextest layer
# (cross-process, since trybuild binaries are separate test
# processes — `serial_test` cannot reach across them) gives each
# binary uninterrupted access to the lock.
[test-groups.trybuild]
max-threads = 1

[[profile.default.overrides]]
filter = '(binary(compile_fail) | binary(compile_pass)) & (test(compile_fail_cases) | test(compile_pass_cases))'
test-group = 'trybuild'

# Test group for any test that touches the on-disk BPF artifact at
# `target/bpf/overdrive_bpf.o` — load it via `EbpfLoader::load_file`,
# create veth + attach an XDP program built from it, or (in the case
# of `build_rs_emits_diagnostic_when_artifact_missing`) deliberately
# remove-and-restore it to exercise the build.rs diagnostic. Two
# distinct concerns are served by the single group:
#
# 1. **Artifact mutation**. The `build_rs_artifact_check` test deletes
#    `target/bpf/overdrive_bpf.o`, runs `cargo check` as a subprocess,
#    and restores the file. The subprocess is unbounded — cold-cache
#    cargo on a CI runner regularly takes >10s. Any test that opens
#    the artifact concurrently sees the missing file and panics. The
#    sole correct fix is mutual exclusion between the deleter and
#    every loader.
#
# 2. **veth/FIB/ARP/bpffs state.** Slice 05-04+ added `bpf_fib_lookup`
#    to the production XDP program, which made the veth-based Tier 3
#    tests dependent on FIB+ARP context (route, neighbour entry, IP
#    forwarding sysctl). The supporting state lives at the netns layer
#    (global routing table, global ARP cache) and parallel test
#    processes corrupt each other's state — packets emitted by Test A
#    can be redirected via Test B's iface when Test A's destination IP
#    overlaps Test B's on-link prefix. The fully-isolated S-2.2-17 /
#    S-2.2-20 tests use a per-test netns (ThreeIfaceTopology /
#    E2eTopology) but still share the bpffs pin namespace
#    (`/sys/fs/bpf/overdrive/...`); a sibling's pin-by-name dance can
#    still collide.
#
# Solution: serialize at the nextest layer with `max-threads = 1`.
# Each test gets clean artifact / ARP / sysctl / iface / bpffs state.
#
# Why `max-threads = 1` and not the in-source `serial_test::serial`
# attribute: nextest spawns each test in its own process, and
# `serial_test` only synchronises within a single process. The
# nextest test-group mechanism is the only correct level to enforce
# the cross-process single-writer constraint. Existing `#[serial(env)]`
# annotations on these tests are kept for any same-process collision
# they may still defend against, but the test-group is what makes the
# guarantee load-bearing.
[test-groups.bpf-artifact-shared]
max-threads = 1

[[profile.default.overrides]]
filter = '''
    binary(integration)
    & (
        test(build_rs_emits_diagnostic_when_artifact_missing)
        | test(mixed_batch_increments_per_class_counters_correctly)
        | test(swap_inner_map_distributes_traffic_across_new_backend_set)
        | test(verifier_budget_xdp_service_map_lookup_within_20pct_of_baseline)
        | test(verifier_budget_xdp_reverse_nat_lookup_within_absolute_ceiling)
        | test(hash_of_maps_handle_create_swap_delete_round_trip)
        | test(removing_backend_purges_orphaned_backend_map_entries)
        | test(atomic_swap_under_50kpps_traffic_drops_zero_packets)
        | test(kernel_rejects_inner_map_alloc_existing_mapping_preserved)
        | test(ten_tcp_syns_to_vip_are_rewritten_and_forwarded_via_veth)
        | test(maglev_real_distribution_under_xdp_trafficgen)
        | test(real_tcp_connection_completes_through_vip_with_payload_echo)
        | test(removing_backend_purges_reverse_nat_entry_no_stale_rewrite)
    )
'''
test-group = 'bpf-artifact-shared'

# Test group for any test that spawns workloads via the production
# `ExecDriver` against the per-allocation cgroup hierarchy at
# `/sys/fs/cgroup/overdrive.slice/workloads.slice/alloc-<job>-<n>.scope`.
#
# Per `.claude/rules/testing.md` § "Leaked workload cgroups across
# runs": the cgroup scope hierarchy is a process-global resource —
# parallel test PROCESSES creating allocs with overlapping ids can
# race on `mkdir` / `cgroup.kill` semantics, and a workload's exit
# under one test can be picked up by another test's exit observer
# subscriber. `serial_test::serial(...)` annotations within each
# binary are kept for same-process collision defence, but the
# nextest layer is the only place that can enforce the cross-process
# single-writer constraint — same rationale as `bpf-artifact-shared`
# above.
[test-groups.cgroup-workload-shared]
max-threads = 1

[[profile.default.overrides]]
filter = '''
    binary(integration)
    & (
        test(s_02_01_job_exits_zero_reports_succeeded)
        | test(s_02_02_job_exits_nonzero_reports_failed_with_attempts)
        | test(s_02_03_intermediate_attempt_failure_does_not_close_stream)
        | test(s_02_04_third_attempt_zero_reports_succeeded)
        | test(s_02_05_anti_scenario_no_is_running_with)
        | test(s_02_06_submit_echo_names_kind_upfront)
        | test(s_02_09_k1_honesty_100_trials)
    )
'''
test-group = 'cgroup-workload-shared'

# Test group for the transparent-mTLS Tier-3 acceptance tests (ADR-0069,
# GH #26). Each one stands up a real netns/veth + cgroup-isolated workload
# topology AND loads the shared `cgroup_connect4_mtls` BPF object, programs
# the process-global `MTLS_REDIRECT_DEST` map, and binds FIXED loopback
# constants (`OUTBOUND_FAKE_PEER` 127.0.0.200:9443, the inbound VIRT addr,
# the leg-S nft-TPROXY + ip-rule/route global state) — all of which are
# process-global resources two concurrent test PROCESSES corrupt for each
# other (a sibling's redirect-dest reprogram / bpffs pin / accept window
# collides, surfacing as "leg-F accept ... intercept must deliver" failures).
# Per `.claude/rules/testing.md` § "Leaked workload cgroups / Leftover XDP
# attachments across runs", the nextest test-group is the only level that can
# enforce the cross-process single-writer constraint (same rationale as
# `bpf-artifact-shared` / `cgroup-workload-shared` above — `serial_test` only
# synchronises within one process). Without it, adding the third mtls Tier-3
# test (02-03 `mtls_outbound_enforce`) made the latent two-test race fire
# deterministically.
[test-groups.mtls-shared]
max-threads = 1

[[profile.default.overrides]]
filter = '''
    binary(integration)
    & (
        test(composed_bidirectional_proxy_walking_skeleton_no_rst)
        | test(agent_handshake_presents_held_svid_client_and_server_roles)
        | test(outbound_enforce_ktls_tx_forward_writeall_copy_return_zerocopy_splice_tls13_wire)
    )
'''
test-group = 'mtls-shared'

# S-02-09 K1 honesty 100-trial test (workload-kind-discriminator slice
# 02-07). Each trial spawns a real `/bin/bash` workload via the
# production `ExecDriver` against the per-allocation cgroup hierarchy,
# waits for the natural-exit observation row, projects to a streaming
# `JobSubmitEvent` terminal, and consumes via the CLI handler. Solo
# wall-clock per trial is ~1–2s; 100 trials × 2s = 200s upper bound.
# A 600s budget (60s × 10) absorbs the worst-case cold-cache + Lima
# virtio-net contention without weakening the K1 deadline. Per
# `.claude/rules/testing.md` § "Flaky DST is a bug, never a 'just
# rerun it'": K1 below threshold means the code is wrong, NOT the
# test — do not lower the trial count or threshold.
[[profile.default.overrides]]
filter = 'binary(integration) & test(s_02_09_k1_honesty_100_trials)'
slow-timeout = { period = "60s", terminate-after = 10 }

[profile.ci]
# CI runs the same suite with structured output. Retries stay at zero:
# `.claude/rules/testing.md` — "Flaky DST is a bug … never a just-rerun-it."
# The same discipline applies to every other tier nextest covers.
fail-fast = true
retries = 0
# Slow-test annotation fires at the K1 Tier 1 wall-clock budget. DST's
# own 60s guardrail is enforced inside the xtask wrapper (ADR-0006); the
# slow-timeout here is a belt-and-braces warning for other suites that
# should not approach that budget.
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci.junit]
# Parsed by the GitHub Actions summary step in `.github/workflows/ci.yml`.
path = "junit.xml"

# Profile selected by `cargo xtask mutants` (via NEXTEST_PROFILE=mutants).
# Inherits from `default` and adds a default-filter that excludes
# trybuild binaries from the test run.
#
# Why exclude them: cargo-mutants reruns the whole test suite per
# mutation (and once for the unmutated baseline). trybuild fixtures
# compile every fixture from scratch in a cold scratch tree — they
# dominate per-mutation wall-clock and contribute zero kill-rate
# signal: `**/tests/**` is already excluded from mutation generation
# in `.cargo/mutants.toml` (Rule 5), so a function-body mutation
# elsewhere in the workspace cannot change whether a trybuild fixture
# compiles. Running them per mutation pays compile cost for no
# information.
#
# Structural-property mutations (e.g. breaking `ViewStore`
# dyn-compatibility, which the `compile_pass/view_store_dyn_compatible.rs`
# fixture pins) would in principle be caught by these binaries — but
# such mutations also fail the rest of the workspace's build under
# the per-mutant cargo invocation and are reported as `unviable` by
# cargo-mutants regardless. The signal is not lost; only the wait is.
[profile.mutants]
default-filter = '!(binary(compile_pass) | binary(compile_fail))'
