# nextest — the test runner for Overdrive. See `.claude/rules/testing.md`
# §"Running tests — foreground, always". Nextest replaces `cargo test` for
# everything except doctests (which nextest does not run; the
# `cargo test --doc` step exists alongside every nextest invocation in CI
# and lefthook).
#
# Profiles:
#   default — developer loop. Unlimited retries disabled; fail-fast on.
#   ci      — CI gate. JUnit output for GitHub summary parsing, no retries
#             (flaky tests are bugs — testing.md), and a slow-test timeout
#             that matches K1's 60-second Tier 1 wall-clock budget.
#
# References:
#   - https://nexte.st/book/configuration.html
#   - .claude/rules/testing.md §"Running tests — foreground, always"
#   - docs/product/architecture/adr-0006-ci-wiring-dst-gates.md (K1 budget)

[profile.default]
# Developer-loop: fail fast, no retries. A test that only passes on
# rerun is either a real bug or a non-determinism leak — both must be
# fixed at the source, never "just run it again."
fail-fast = true
retries = 0
# Quiet output: only surface failures during the run and in the final
# summary. A clean run prints a one-line summary; a failing run shows
# the failures directly, not buried under dozens of PASS lines.
# Removes the usual reason to reach for `| tail -N`, which eats the
# non-zero exit code (bash pipelines do not enable `pipefail` per tool
# call). When `--no-fail-fast` multi-failure inspection still warrants
# piping, the PostToolUse hook `.claude/hooks/flag-test-failure.ts`
# scans the captured output for FAIL markers and nextest summaries
# reporting N failed, so exit-code loss cannot silently mask a failure.
status-level = "fail"
final-status-level = "fail"
# Per-test wall-clock cap for the inner dev loop. A test running longer
# than 60s emits a SLOW marker; a test still running after 120s
# (60s × 2) is killed and the run reports it as TIMEOUT. Without this,
# a deadlocked or runaway-loop test silently consumes the harness
# until the outer 10-minute Bash cap fires — far too coarse for a tight
# TDD cycle. Matches the CI profile's K1 Tier 1 wall-clock budget; CI
# allows one extra interval (terminate-after = 3) because compile +
# scheduler overhead under cold caches can legitimately push a slow
# test past the 60s mark on the runner.
slow-timeout = { period = "60s", terminate-after = 2 }

# The store-local snapshot proptest opens a real redb file per case
# at the default `PROPTEST_CASES=1024` budget. Each `put` is a
# separate redb write transaction, so entry count × case count
# dominates wall-clock. The generator is sized (0..=32 entries,
# 0..=256 byte values) to keep solo wall-clock well under 60s, but
# under parallel load (workspace integration runs schedule ~30 tests
# concurrently) I/O contention can push past 120s. A 4× budget
# absorbs the parallel slow-down without weakening the per-test
# deadline.
[[profile.default.overrides]]
filter = 'package(overdrive-store-local) & binary(integration) & test(snapshot_roundtrip_is_byte_identical_for_arbitrary_store_contents)'
slow-timeout = { period = "60s", terminate-after = 4 }

# describe_round_trip's submit-then-describe proptest spawns a real
# axum server (rustls handshake, redb file, ephemeral CA) per case and
# runs `PROPTEST_CASES=256`. The integration CI job (profile.ci, 180s
# budget) passes; the cargo-mutants baseline runs nextest under the
# `default` profile in a /tmp scratch tree with cold caches and
# crosses the 120s default budget. A 4× budget (240s) tracks the
# snapshot-proptest precedent above and absorbs the cold-cache slow
# down without weakening the deadline for any other test.
[[profile.default.overrides]]
filter = 'package(overdrive-control-plane) & binary(integration) & test(submit_then_describe_round_trips_spec_and_digest)'
slow-timeout = { period = "60s", terminate-after = 4 }

# trybuild compiles every compile_fail / compile_pass fixture from
# scratch on each run. Under cargo-mutants the tree is reproduced in
# /tmp with a cold target dir and the per-fixture compile time stacks
# past the default 120s budget. Same 4× budget rationale as above.
#
# NOTE: the `mutants` profile below excludes trybuild binaries
# entirely from the cargo-mutants test run (they don't contribute to
# kill-rate signal — function-body mutations don't change whether
# trybuild fixtures compile). This override is retained for the
# default profile so a developer running these tests directly via
# `cargo nextest run` still gets a sensible budget.
#
# The filter matches by BINARY name only, NOT by test-function name.
# Every `tests/compile_fail.rs` / `tests/compile_pass.rs` file contains
# exactly one trybuild `#[test]` fn, so `binary(...)` is sufficient —
# and robust against per-crate naming. A prior test-name conjunct
# (`& (test(compile_fail_cases) | test(compile_pass_cases))`) silently
# excluded `overdrive-store-local::compile_fail` (fn `compile_fail`) and
# `overdrive-worker::compile_fail` (fn `compile_fail_fixtures`), so those
# two got neither this slow-timeout extension nor the serialization
# group below — they fell back to the CI default 180s budget, ran
# unserialized, contended for the target-dir lock, and TIMED OUT.
[[profile.default.overrides]]
filter = 'binary(compile_fail) | binary(compile_pass)'
slow-timeout = { period = "60s", terminate-after = 4 }

# Serialize trybuild binaries against each other. Each trybuild
# `TestCases` invocation spawns `cargo build` internally to compile
# its fixtures into a private workspace; the six trybuild binaries
# (`overdrive-core::{compile_fail,compile_pass}`,
# `overdrive-control-plane::{compile_fail,compile_pass}`,
# `overdrive-store-local::compile_fail`, `overdrive-worker::compile_fail`)
# running in parallel contend for the cargo target-dir file lock. Under
# that contention the inner cargo invocations block on `Blocking waiting
# for file lock on build directory` and the per-test slow-timeout fires
# before any of them finish — the symptom the timeout-only fix in commit
# e4e6fb8 did not address. Serializing at the nextest layer
# (cross-process, since trybuild binaries are separate test
# processes — `serial_test` cannot reach across them) gives each
# binary uninterrupted access to the lock.
#
# Match by BINARY name only — see the slow-timeout override above for why
# the prior test-name conjunct silently dropped `store-local::compile_fail`
# and `worker::compile_fail` from the group and let them time out.
[test-groups.trybuild]
max-threads = 1

[[profile.default.overrides]]
filter = 'binary(compile_fail) | binary(compile_pass)'
test-group = 'trybuild'

# Unified serialization domain for EVERY test that touches shared,
# process-global real-kernel state. A single `max-threads = 1` group
# (`host-kernel-shared`) guarantees that no two such tests ever run
# concurrently — anywhere in the workspace, under any profile.
#
# This group was unified from three previously-separate `max-threads = 1`
# groups (`bpf-artifact-shared`, `cgroup-workload-shared`, `mtls-shared`).
# Each serialized its own members internally, but the three ran
# CONCURRENTLY with one another — and they share the SAME process-global
# kernel resources, so cross-group concurrency clobbered them:
#
#   * the on-disk BPF artifact `target/bpf/overdrive_bpf.o` (loaded by both
#     the XDP and the mtls tests via `EbpfLoader::load_file`),
#   * the `/sys/fs/bpf/overdrive/` bpffs pin namespace (the per-test pin dir
#     isolates only the SERVICE_MAP pin, NOT the by-name program/map surface),
#   * the by-name `cgroup_connect4` / `cgroup_connect4_mtls` programs and the
#     `MTLS_REDIRECT_DEST` map (observed system-wide via `bpftool`),
#   * the per-allocation cgroup hierarchy under
#     `/sys/fs/cgroup/overdrive.slice/workloads.slice/alloc-<job>-<n>.scope`,
#   * the netns-layer FIB/ARP/sysctl + veth state used by the Tier-3 XDP
#     tests, and the FIXED loopback constants + leg-S nft-TPROXY +
#     ip-rule/route global state used by the mtls Tier-3 tests.
#
# Symptom of the cross-group race: the mtls 06-01 test
# `mtls_dataplane_load_attach_per_alloc_program_redirect` panicked at ~0.09s
# ("MTLS_REDIRECT_DEST must show the entry after program_redirect") whenever
# a `bpf-artifact-shared` XDP test ran in parallel and reloaded the same
# `overdrive_bpf.o` / reprogrammed the by-name surface. The suite passes
# fully serial (`--test-threads 1`) but failed under default concurrency.
#
# The three concerns the merged group serves, preserved from the original
# group rationale:
#
# 1. **Artifact mutation.** `build_rs_emits_diagnostic_when_artifact_missing`
#    deletes `target/bpf/overdrive_bpf.o`, runs `cargo check` as an unbounded
#    subprocess, and restores the file. Any test that opens the artifact
#    concurrently sees the missing file and panics — mutual exclusion between
#    the deleter and every loader is the only correct fix.
#
# 2. **veth/FIB/ARP/bpffs state.** Slice 05-04+ added `bpf_fib_lookup` to the
#    production XDP program, making the veth-based Tier-3 tests dependent on
#    FIB+ARP context (route, neighbour entry, IP-forwarding sysctl). That
#    state lives at the netns layer (global routing table, global ARP cache);
#    parallel test processes corrupt each other's state. The fully-isolated
#    S-2.2-17 / S-2.2-20 tests use a per-test netns but still share the bpffs
#    pin namespace, where a sibling's pin-by-name dance can still collide.
#
# 3. **cgroup hierarchy + by-name mtls program/map.** The `ExecDriver` cgroup
#    scope hierarchy is process-global (parallel processes race on `mkdir` /
#    `cgroup.kill` and on exit-observer pickup). The mtls tests `MtlsDataplane::load`
#    the shared `overdrive_bpf.o`, attach `cgroup_connect4_mtls`, and observe
#    `MTLS_REDIRECT_DEST` / `cgroup_connect4` BY NAME (a system-wide
#    enumeration) — a concurrent sibling's load/attach/reprogram corrupts the
#    redirect lookup. The program name and the fixed `overdrive.slice` path
#    are not parameterizable per-test without changing production, so
#    serialization is the correct fix.
#
# Why `max-threads = 1` and not in-source `serial_test::serial`: nextest
# spawns each test in its own PROCESS, and `serial_test` only synchronises
# within a single process. The nextest test-group is the only level that can
# enforce the cross-process single-writer constraint. The existing
# `#[serial(env)]` annotations on these tests are kept for same-process
# collisions they may still defend against; this test-group is what makes the
# cross-process guarantee load-bearing.
#
# `trybuild` is deliberately NOT merged here — it is a cargo target-dir lock
# concern, unrelated to kernel state, and is excluded from the mutants run by
# this file's `profile.mutants` default-filter.
[test-groups.host-kernel-shared]
max-threads = 1

# NOTE (transparent-mtls 04-04): the per-alloc-netns Tier-3 tests appended at the
# end of the filter below join this single-writer group because the 04-04
# adopt-on-restart boot pass — run by the `serve_restart_*` adopt tests AND by
# the run_server mtls boot tests already listed above — GCs EVERY `ovd-ns-*`
# netns not in the current boot's ObservationStore Running set. Run concurrently
# with any test holding a live per-alloc netns, it would reap that netns (the
# "global shared kernel resource masked by per-test isolation" defect class —
# the netns-layer analogue of the bpffs/cgroup state this group already guards).
# Every per-alloc-netns test must therefore serialize here.
[[profile.default.overrides]]
filter = '''
    binary(integration)
    & (
        test(build_rs_emits_diagnostic_when_artifact_missing)
        | test(mixed_batch_increments_per_class_counters_correctly)
        | test(swap_inner_map_distributes_traffic_across_new_backend_set)
        | test(verifier_budget_xdp_service_map_lookup_within_20pct_of_baseline)
        | test(verifier_budget_xdp_reverse_nat_lookup_within_absolute_ceiling)
        | test(hash_of_maps_handle_create_swap_delete_round_trip)
        | test(removing_backend_purges_orphaned_backend_map_entries)
        | test(atomic_swap_under_50kpps_traffic_drops_zero_packets)
        | test(kernel_rejects_inner_map_alloc_existing_mapping_preserved)
        | test(ten_tcp_syns_to_vip_are_rewritten_and_forwarded_via_veth)
        | test(maglev_real_distribution_under_xdp_trafficgen)
        | test(real_tcp_connection_completes_through_vip_with_payload_echo)
        | test(removing_backend_purges_reverse_nat_entry_no_stale_rewrite)
        | test(s_02_01_job_exits_zero_reports_succeeded)
        | test(s_02_02_job_exits_nonzero_reports_failed_with_attempts)
        | test(s_02_03_intermediate_attempt_failure_does_not_close_stream)
        | test(s_02_04_third_attempt_zero_reports_succeeded)
        | test(s_02_05_anti_scenario_no_is_running_with)
        | test(s_02_06_submit_echo_names_kind_upfront)
        | test(s_02_09_k1_honesty_100_trials)
        | test(alloc_lands_in_slot_netns_and_teardown_reaps_it_on_terminal)
        | test(provision_failure_drives_alloc_to_failed_row_not_pending_retry)
        | test(provision_creates_and_idempotently_converges_per_workload_netns)
        | test(provision_injects_node_local_responder_into_netns_resolv_conf)
    )
'''
test-group = 'host-kernel-shared'

# mTLS Tier-3 surface → `host-kernel-shared`, matched by MODULE (rename-proof).
#
# Every test below installs/razes the SHARED, node-global `overdrive-mtls`
# kernel state: the `ip overdrive-mtls` nft table, the fwmark `ip rule` +
# `local` route (table 100), the `IP_TRANSPARENT` leg listeners, and the
# host-`lo`-bound backends / `tproxy to 127.0.0.1` leg-F loopback path. That
# state is process-global and crosses netns boundaries, so two such tests run
# concurrently clobber each other — a connect that should reach a host-`lo`
# backend is diverted by a sibling's rule (the egress-AC4 timeout), or a
# sibling's `clean_shared_infra()` razes the leg-F mid-flight (the
# MeshUnreachable fail-closed leak). Both were PR #245's CI flakes.
#
# The worker mtls tests ALSO hold a cross-process `flock`
# (`/tmp/overdrive-mtls-kernel-state.lock`) that serialises them against each
# OTHER — but NOT against the dataplane `mtls_*` / control-plane inbound-tproxy
# + adopt tests, which serialise only via this group. The whole surface must
# therefore live in ONE single-writer group, which is why it joins
# `host-kernel-shared` rather than relying on the flock alone.
#
# Matched by `test(<module>::)` / `package(...) & test(mtls)` — NOT per-fn —
# because the per-fn entries that used to live in the block above went stale on
# the first refactor and dropped the worker surface out of serialisation
# entirely. Module-level membership is rename-proof: a new test in any of these
# files joins the single-writer domain automatically. Same lesson as the
# trybuild "match by BINARY, not fn-name" note above.
[[profile.default.overrides]]
filter = '''
    binary(integration)
    & (
        (package(overdrive-worker) & (
            test(bidirectional_walking_skeleton)
            | test(egress_tproxy_capture)
            | test(inbound_rule_keys_declared_port)
            | test(inbound_rules_per_listener)
            | test(job_kind_installs_no_inbound_rule)
            | test(mtls_intercept_install)
            | test(name_resolve_enforce_consistency)
            | test(outbound_enforce_substrate_asymmetry)
            | test(start_alloc_installs_both_tproxy)
        ))
        | (package(overdrive-dataplane) & test(mtls))
        | (package(overdrive-control-plane) & (
            test(canonical_address_inbound_walking_skeleton)
            | test(adopt_on_restart)
        ))
    )
'''
test-group = 'host-kernel-shared'

# Dataplane cgroup-UDP surface → `host-kernel-shared`, matched by MODULE.
#
# Every test below builds a real `EbpfDataplane` and attaches the three
# `cgroup_sock_addr` programs (`connect4` / `sendmsg4` / `recvmsg4`) to the
# SHARED root cgroup `/sys/fs/cgroup` with `CgroupAttachMode::Single`
# (overdrive-dataplane `lib.rs` ~710/744/764; aya `Single` → attach flag 0).
# Their `LOCAL_BACKEND_MAP` / `REVERSE_LOCAL_MAP` are `pinning = NONE`, so each
# process owns a PRIVATE copy. Run two such tests as separate nextest processes
# and the loser's `sendto(VIP)` traverses the WINNER's `sendmsg4` program,
# reads the winner's empty/foreign map, gets no VIP→backend rewrite, and the
# round-trip never completes — the 2s poll exhausts and the test panics
# ("did not round-trip within 2s — cgroup sendmsg4 forward rewrite regression").
#
# This is the cgroup analogue of the mtls block above: a process-global kernel
# surface (the root-cgroup `Single` attach) that in-process `serial_test` cannot
# guard across separate nextest processes — only this `max-threads = 1` group
# can. Reproduced as PR #245's second CI flake; population diff was 4/4 pass
# serialised vs 7/24 fail concurrent, the root-cgroup attach count oscillating
# through multiples of 3 (3 progs × N concurrent processes). Production code is
# byte-identical to main — serialisation RESOLVES the contention, it does not
# mask a timing bug.
#
# ALL cgroup-attaching modules join, not just the same-VIP pair: the necessary
# condition is the shared root-cgroup attach, not the map-key collision, so
# under-serialising any one re-opens the race. By-module (rename-proof).
[[profile.default.overrides]]
filter = '''
    binary(integration)
    & package(overdrive-dataplane)
    & (
        test(unconnected_udp_roundtrip)
        | test(unconnected_udp_reply_hardening)
        | test(service_map_vip_port)
        | test(reverse_nat_udp_e2e)
        | test(multi_listener_tcp_udp_e2e)
        | test(deregister_retry_safety)
        | test(local_backend_proto_connect)
    )
'''
test-group = 'host-kernel-shared'

# S-02-09 K1 honesty 100-trial test (workload-kind-discriminator slice
# 02-07). Each trial spawns a real `/bin/bash` workload via the
# production `ExecDriver` against the per-allocation cgroup hierarchy,
# waits for the natural-exit observation row, projects to a streaming
# `JobSubmitEvent` terminal, and consumes via the CLI handler. Solo
# wall-clock per trial is ~1–2s; 100 trials × 2s = 200s upper bound.
# A 600s budget (60s × 10) absorbs the worst-case cold-cache + Lima
# virtio-net contention without weakening the K1 deadline. Per
# `.claude/rules/testing.md` § "Flaky DST is a bug, never a 'just
# rerun it'": K1 below threshold means the code is wrong, NOT the
# test — do not lower the trial count or threshold.
[[profile.default.overrides]]
filter = 'binary(integration) & test(s_02_09_k1_honesty_100_trials)'
slow-timeout = { period = "60s", terminate-after = 10 }

[profile.ci]
# CI runs the same suite with structured output. Retries stay at zero:
# `.claude/rules/testing.md` — "Flaky DST is a bug … never a just-rerun-it."
# The same discipline applies to every other tier nextest covers.
fail-fast = true
retries = 0
# Slow-test annotation fires at the K1 Tier 1 wall-clock budget. DST's
# own 60s guardrail is enforced inside the xtask wrapper (ADR-0006); the
# slow-timeout here is a belt-and-braces warning for other suites that
# should not approach that budget.
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci.junit]
# Parsed by the GitHub Actions summary step in `.github/workflows/ci.yml`.
path = "junit.xml"

# Profile selected by `cargo xtask mutants` (via NEXTEST_PROFILE=mutants).
# Inherits from `default` and adds a default-filter that excludes
# trybuild binaries from the test run.
#
# Why exclude them: cargo-mutants reruns the whole test suite per
# mutation (and once for the unmutated baseline). trybuild fixtures
# compile every fixture from scratch in a cold scratch tree — they
# dominate per-mutation wall-clock and contribute zero kill-rate
# signal: `**/tests/**` is already excluded from mutation generation
# in `.cargo/mutants.toml` (Rule 5), so a function-body mutation
# elsewhere in the workspace cannot change whether a trybuild fixture
# compiles. Running them per mutation pays compile cost for no
# information.
#
# Structural-property mutations (e.g. breaking `ViewStore`
# dyn-compatibility, which the `compile_pass/view_store_dyn_compatible.rs`
# fixture pins) would in principle be caught by these binaries — but
# such mutations also fail the rest of the workspace's build under
# the per-mutant cargo invocation and are reported as `unviable` by
# cargo-mutants regardless. The signal is not lost; only the wait is.
[profile.mutants]
default-filter = '!(binary(compile_pass) | binary(compile_fail))'

# The `mutants` profile carries NO per-test overrides of its own. It
# inherits everything it needs from `profile.default`:
#
#   * the `host-kernel-shared` test-group ASSIGNMENT (the cross-process
#     single-writer serialization for every shared real-kernel-state test),
#   * the cold-scratch `slow-timeout` extensions (the store-local snapshot
#     proptest, the control-plane describe round-trip proptest, and the
#     S-02-09 K1 100-trial test).
#
# This was VERIFIED EMPIRICALLY (nextest 0.9.137, 2026-06-15): with the
# `host-kernel-shared` assignment declared on `profile.default` ONLY,
# `cargo nextest show-config test-groups --profile mutants` resolves the
# identical 20 dataplane tests into `host-kernel-shared`, labelling the
# match `* override for default profile` — i.e. nextest layers a named
# profile on top of `default` and applies `default`'s `[[overrides]]`
# unless the named profile defines its own. (An earlier comment here
# claimed overrides are NOT inherited; that was wrong and the duplicated
# `[[profile.mutants.overrides]]` block it justified has been removed —
# the assignment lived in two places saying the same thing.)
#
# `cargo xtask mutants` runs nextest under `NEXTEST_PROFILE=mutants`; the
# inherited `host-kernel-shared` group is what keeps the unmutated baseline
# from running the shared-resource Tier-3 tests concurrently and colliding
# on process-global kernel state (the bpffs-pinned `MTLS_REDIRECT_DEST`
# map, the by-name `cgroup_connect4` program, the per-alloc cgroup
# hierarchy, the shared `target/bpf/overdrive_bpf.o` + veth/FIB/ARP state)
# — the 0.09s "MTLS_REDIRECT_DEST must show the entry after
# program_redirect" failure that previously aborted the whole mutation run
# before any mutant was tested.
#
# trybuild binaries are excluded entirely by this profile's `default-filter`
# above, so `profile.default`'s trybuild serialization + slow-timeout
# overrides simply never apply here (the matched tests are not in the run).
