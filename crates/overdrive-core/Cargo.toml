[package]
name        = "overdrive-core"
version     = "0.0.0"
description = "Overdrive core types: newtypes, errors, injectable trait boundaries."
edition.workspace       = true
rust-version.workspace  = true
license.workspace       = true
authors.workspace       = true
repository.workspace    = true
homepage.workspace      = true
publish.workspace       = true

[package.metadata.overdrive]
crate_class = "core"

[lints]
workspace = true

[dependencies]
# Errors & serialization
thiserror.workspace  = true
serde.workspace      = true
serde_json.workspace = true
rkyv.workspace       = true
bytecheck.workspace  = true

# OpenAPI schema derivation — `JobSpecInput` carries `ToSchema` so
# `overdrive-control-plane::api` can reuse it as the typed spec field in
# `SubmitJobRequest` / `JobDescription` per ADR-0014 (shared types
# between server and CLI) and ADR-0009 (utoipa-derived OpenAPI). utoipa
# is not on the dst-lint banned-API list — it is a declarative
# macro-derive crate with no runtime I/O.
utoipa.workspace = true

# Identifiers
sha2.workspace = true
hex.workspace  = true
time.workspace = true
uuid.workspace = true

# Trait boundaries — async, I/O types, streams.
async-trait.workspace = true
futures.workspace     = true
bytes.workspace       = true
tokio.workspace       = true

# Reconciler trait's `HydrateError` wraps `libsql::Error` via `#[from]`
# per ADR-0013 pre-hydration shape. `libsql` with `default-features =
# false, features = ["core"]` is a type-dep only — no runtime I/O is
# initiated from core-class code paths. Not on the dst-lint banned-API
# list (the list covers `Instant::now`, `rand::random`, `tokio::net::*` —
# libsql is not enumerated). Real connections are opened by the
# reconciler runtime in `overdrive-control-plane`.
libsql.workspace = true

[features]
# `test-utils` — TEST-ONLY feature. Exposes
# `overdrive_core::testing::observation_store::run_lww_conformance`, the
# trait-generic LWW conformance harness exercised by every
# `ObservationStore` adapter's test suite. Per
# `docs/feature/fix-observation-lww-merge/deliver/rca.md` Cause C, the
# comparator MUST live in `overdrive-core` so both adapters call the
# same primitive; the conformance harness MUST be reachable from each
# adapter's `dev-dependencies` to enforce the trait-level invariant.
# Production builds MUST NEVER enable this feature.
test-utils = []

# `integration-tests` — workspace-wide convention. Every workspace
# member declares this feature so `cargo {check,test,mutants}
# --features integration-tests` resolves uniformly under per-package
# scoping (cargo refuses the bare feature on packages that do not
# declare it, which breaks mutation testing's per-mutant invocations).
# This crate has no integration-shaped tests of its own — the
# declaration is a deliberate no-op. See `.claude/rules/testing.md`
# §"Integration vs unit gating".
integration-tests = []

[dev-dependencies]
proptest.workspace = true
rstest.workspace   = true
# Static scan of `src/**/*.rs` for the §2.3 API-shape invariant. Used only
# by `tests/public_api_shape.rs` — never referenced from production code.
syn.workspace      = true
# Type-level separation between `IntentStore` and `ObservationStore`
# (US-03 §4.4 / US-04) is a compile-time property. `trybuild` drives
# `tests/compile_fail/*.rs` fixtures and asserts each produces the
# expected compiler diagnostic. ADR-0001 row 24 approves this dev-dep.
trybuild.workspace = true
# The trybuild fixture under `tests/compile_fail/intent_vs_observation.rs`
# constructs a real `LocalStore` via `LocalStore::open`, so the harness
# needs the store crate on its compile graph.
overdrive-store-local.path = "../overdrive-store-local"
# `tests/acceptance/unix_instant_arithmetic.rs` exercises
# `UnixInstant::from_clock` against the project's standard `Clock`
# fixture (`SimClock`). Dev-dep only — `overdrive-sim` itself depends
# on `overdrive-core`, which Cargo permits in dev-deps because dev-deps
# do not propagate to downstream consumers.
overdrive-sim.path = "../overdrive-sim"
tempfile.workspace = true
tokio              = { workspace = true }
# Used by `tests/acceptance/exec_validation.rs` to exercise the
# tagged-enum + deny_unknown_fields TOML parse path for the new
# `wire-exec-spec-end-to-end` shape (per ADR-0031 §3 acceptance
# coverage). The runtime production code does not parse TOML in
# overdrive-core — that lives in overdrive-cli.
toml.workspace     = true
