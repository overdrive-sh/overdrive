[package]
name        = "overdrive-cli"
version     = "0.0.0"
description = "Overdrive command-line client."
edition.workspace       = true
rust-version.workspace  = true
license.workspace       = true
authors.workspace       = true
repository.workspace    = true
homepage.workspace      = true
publish.workspace       = true

[package.metadata.overdrive]
crate_class = "binary"

[lib]
name = "overdrive_cli"
path = "src/lib.rs"

[[bin]]
name = "overdrive"
path = "src/main.rs"

[lints]
workspace = true

[features]
# Opt-in gate for slow / real-infra tests in this crate. Off by
# default so `cargo nextest run --workspace` stays under the 60s
# slow-test budget; CI exercises the gate in a dedicated
# `integration` job. Per `.claude/rules/testing.md`.
integration-tests = []

[dependencies]
overdrive-core.workspace           = true
overdrive-control-plane.path       = "../overdrive-control-plane"
eyre.workspace                     = true
color-eyre.workspace               = true
clap.workspace                     = true
tokio.workspace                    = true
tracing.workspace                  = true
tracing-subscriber.workspace       = true
reqwest.workspace                  = true
url.workspace                      = true
thiserror.workspace                = true
serde.workspace                    = true
serde_json.workspace               = true
toml.workspace                     = true

[dev-dependencies]
overdrive-control-plane.path = "../overdrive-control-plane"
tempfile.workspace           = true
base64.workspace             = true
serde_yaml.workspace         = true
# `rkyv` + `toml` are used ONLY by the walking-skeleton test to
# locally reproduce the server-side spec-digest computation (SHA-256
# of rkyv-archived Job bytes, per ADR-0002) so the test can assert
# byte-identity with the server's response. They are NOT used by the
# CLI itself — `toml` IS a runtime dep already for `job submit`.
rkyv.workspace               = true
