# SCAFFOLD: true — DISTILL placeholder per DWD-06. Crafter completes in place.
#
# `overdrive-sim` hosts the Sim* adapters, the turmoil harness, and the
# invariant catalogue per ADR-0004 (single crate, not split). This file is
# the minimum needed for `tests/acceptance/*.rs` to resolve the crate;
# `[dependencies]` will grow during DELIVER to include `turmoil`, `rand`,
# `async-trait`, and the `overdrive-core` / `overdrive-store-local`
# workspace crates.

[package]
name        = "overdrive-sim"
version     = "0.0.0"
edition.workspace     = true
rust-version.workspace = true
license.workspace     = true
authors.workspace     = true
repository.workspace  = true
publish               = false

[package.metadata.overdrive]
crate_class = "adapter-sim"

[dependencies]
# Sim depends on overdrive-core and — when the sim crate's own
# `canary-bug` feature is enabled — forwards that into
# `overdrive-core/canary-bug` so the `HarnessNoopHeartbeat` variant of
# `AnyReconciler` is available.
overdrive-core = { workspace = true }
async-trait.workspace    = true
bytes.workspace          = true
futures.workspace        = true
tokio.workspace          = true
parking_lot.workspace    = true
tokio-stream.workspace   = true
rand.workspace           = true
thiserror.workspace      = true
tempfile.workspace       = true
overdrive-store-local    = { path = "../overdrive-store-local" }

[features]
# `canary-bug` — TEST-ONLY feature that plants a deliberate LWW-convergence
# break in `SimObservationStore` on the canary trigger seed (0xDEAD_BEEF).
# Production builds MUST NEVER enable this feature. It exists so that the
# WS-3 acceptance scenario (see `docs/feature/phase-1-foundation/distill/
# test-scenarios.md` §1.3 and §7.2) can prove the harness catches real
# bugs — an invariant suite that cannot go red is indistinguishable from an
# empty suite. The gate is scoped to exactly one code path in
# `adapters/observation_store.rs`; grep for `#[cfg(feature = "canary-bug")]`
# to see the complete surface.
canary-bug = ["overdrive-core/canary-bug"]

# `integration-tests` — workspace-wide convention. Every workspace
# member declares this feature so `cargo {check,test,mutants}
# --features integration-tests` resolves uniformly under per-package
# scoping. This crate has no integration-shaped tests of its own — the
# declaration is a deliberate no-op. See `.claude/rules/testing.md`
# §"Integration vs unit gating".
integration-tests = []

[dev-dependencies]
# Crafter adds turmoil, proptest, and overdrive-store-local here during DELIVER.
tokio    = { workspace = true }
futures.workspace = true
proptest.workspace = true
serde_json.workspace = true
# `test-utils` exposes the trait-conformance harness at
# `overdrive_core::testing::observation_store::run_lww_conformance`.
# Per `docs/feature/fix-observation-lww-merge/deliver/rca.md` Cause B,
# every `ObservationStore` adapter exercises this harness from its
# own test suite to enforce the LWW contract at trait level.
overdrive-core = { workspace = true, features = ["test-utils"] }

[lints]
workspace = true
