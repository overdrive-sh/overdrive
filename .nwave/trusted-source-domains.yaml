# Trusted Source Domains for Evidence-Driven Research
# Used by knowledge-researcher agent to validate source credibility

# High-reputation academic and research sources (CS / systems / distributed-systems)
academic:
  description: "Peer-reviewed CS and systems research venues"
  domains:
    - "arxiv.org"
    - "ieee.org"
    - "acm.org"
    - "dl.acm.org"
    - "usenix.org"
    - "www.usenix.org"
  reputation: high
  verification_requirements:
    - peer_review_preferred
    - citation_tracking
    - author_credentials

# Official standards bodies and authoritative platform documentation
official:
  description: "Standards organizations and canonical platform documentation"
  domains:
    - "ietf.org"
    - "datatracker.ietf.org"
    - "rfc-editor.org"
    - "iso.org"
    - "nist.gov"
    - "kernel.org"
    - "docs.kernel.org"
    - "kubernetes.io"
    - "docs.docker.com"
    - "developer.hashicorp.com"
    - "nomadproject.io"
    - "www.nomadproject.io"
    - "consul.io"
    - "www.consul.io"
  reputation: high
  verification_requirements:
    - official_publication
    - version_tracking
    - standards_compliance

# Industry leaders and recognized experts
industry_leaders:
  description: "Established systems-software sources and recognized industry experts"
  domains:
    - "github.com"
    - "lwn.net"
    - "martinfowler.com"
    - "infoq.com"
    - "brendangregg.com"
    - "highscalability.com"
  reputation: medium-high
  verification_requirements:
    - cross_reference_required
    - author_expertise_validation
    - community_consensus

# Technical documentation and established platforms
technical_documentation:
  description: "Official technical documentation for platforms relevant to Overdrive"
  domains:
    - "aya-rs.dev"
    - "ebpf.io"
    - "docs.aws.amazon.com"
    - "cloud.google.com"
    - "learn.microsoft.com"
    - "readthedocs.org"
  reputation: high
  verification_requirements:
    - version_accuracy
    - official_source_confirmation

